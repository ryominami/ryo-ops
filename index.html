function renderStrategyTypeGap(tp){
  const wrap=document.createElement('div');
  wrap.innerHTML='<div class="sec-h">&#x1F4CA; 型配分</div>';
  const card=document.createElement('div');card.className='card';
  const pace=(tp.pace&&typeof tp.pace==='object')?tp.pace:{};
  const gaps=Array.isArray(tp.type_gap)?tp.type_gap:[];
  if(pace.month_actual_x===0){
    const big=document.createElement('div');big.className='type-gap-zero';
    const tgt=(pace.month_target_x==null)?'—':pace.month_target_x;
    big.innerHTML='今月 X実績 0/'+esc(String(tgt))+' — まず1本';
    card.appendChild(big);
  }
  if(!gaps.length){
    if(!card.children.length)card.innerHTML='<div class="empty-note">データなし</div>';
  }else{
    gaps.forEach(g=>{
      const hot=(g.gap_pct||0)>0;
      const row=document.createElement('div');row.className='type-gap-row'+(hot?' gap-hot':'');
      const label=TYPE_LABEL[g.type]||g.type||'';
      const actual=(g.actual_pct==null)?'—':g.actual_pct;
      const target=(g.target_pct==null)?'—':g.target_pct;
      row.innerHTML='<div class="tg-label"><span class="tg-name">'+esc(label)+'</span><span>'+
        esc(String(actual))+'% / 目標'+esc(String(target))+'%</span></div>'+
        '<div class="bar-track"><div class="bar-fill" style="width:'+Math.min(100,Math.max(0,g.actual_pct||0))+'%"></div></div>';
      card.appendChild(row);
    });
  }
  wrap.appendChild(card);
  return wrap;
}
function renderStrategy(){
  const zone=document.getElementById('strategy-body');
  if(!zone)return;
  zone.innerHTML='';
  try{
    const st=DATA.strategy;
    if(!st||typeof st!=='object'||!Array.isArray(st.weeks)){
      zone.innerHTML='<div class="card"><div class="empty-note">content_plan.yaml 未生成 &mdash; 戦略同期待ち</div></div>';
      return;
    }
    const wrap=document.createElement('div');
    const progress=(st.progress&&typeof st.progress==='object')?st.progress:{};
    const done=progress.done||0,pending=progress.pending||0,skipped=progress.skipped||0;
    const total=done+pending+skipped;
    const rate=total?Math.round(done/total*100):0;
    const cw=(st.current_week!=null)?st.current_week:'—';
    const progCard=document.createElement('div');progCard.className='card';
    progCard.innerHTML='<div class="prog-wrap">'+
      '<div class="prog-info"><span>'+esc(st.month||'今月')+' の計画進捗 &middot; 今週 Week'+esc(String(cw))+'</span><span>'+rate+'%</span></div>'+
      '<div class="prog-track"><div class="prog-fill" style="width:'+rate+'%"></div></div>'+
      '<div class="prog-num">'+done+'/'+total+' 完了 (未着手 '+pending+' &middot; スキップ '+skipped+')</div>'+
      '</div>';
    wrap.appendChild(progCard);

    wrap.appendChild(renderStrategyTypeGap(DATA.today_plan||{}));

    const plCard=renderPriorityLanes(st.priority_lanes);
    if(plCard)wrap.appendChild(plCard);

    if(!st.weeks.length){
      const e=document.createElement('div');e.className='card';
      e.innerHTML='<div class="empty-note">Week計画なし</div>';
      wrap.appendChild(e);
    }else{
      st.weeks.forEach(week=>{
        const isCurrent=(st.current_week!=null)&&(week.week===st.current_week);
        wrap.appendChild(renderStrategyWeek(week,isCurrent,st.current_week));
      });
    }
    zone.appendChild(wrap);
  }catch(e){
    console.error('renderStrategy failed',e);
    zone.innerHTML='<div class="card"><div class="empty-note">戦略タブの読み込みに失敗しました</div></div>';
  }
}

/* ================= 声 (Voice Memo) ================= */
let vRecorder=null, vChunks=[], vStream=null, vTimerInt=null, vStartTs=0, vBlob=null, vMime='', vSelectedType='', vListInt=null;
let vPendingDiscard=null, vAutoStopMsg=null, vDurSecCache=0;

/* --- IndexedDB: 未送信録音の永続化 (再読込/送信失敗からの復帰用) --- */
const VDB_NAME='ryoops_voice', VDB_STORE='pending', VDB_KEY='current';
function _vdbOpen(){
  return new Promise((resolve,reject)=>{
    if(!window.indexedDB){reject(new Error('no indexeddb'));return}
    const req=indexedDB.open(VDB_NAME,1);
    req.onupgradeneeded=()=>{ req.result.createObjectStore(VDB_STORE); };
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
}
async function _vdbPut(record){
  try{
    const db=await _vdbOpen();
    await new Promise((res,rej)=>{
      const tx=db.transaction(VDB_STORE,'readwrite');
      tx.objectStore(VDB_STORE).put(record,VDB_KEY);
      tx.oncomplete=res; tx.onerror=()=>rej(tx.error);
    });
  }catch(e){}
}
async function _vdbGet(){
  try{
    const db=await _vdbOpen();
    return await new Promise((res,rej)=>{
      const tx=db.transaction(VDB_STORE,'readonly');
      const rq=tx.objectStore(VDB_STORE).get(VDB_KEY);
      rq.onsuccess=()=>res(rq.result||null);
      rq.onerror=()=>rej(rq.error);
    });
  }catch(e){ return null; }
}
async function _vdbDelete(){
  try{
    const db=await _vdbOpen();
    await new Promise((res,rej)=>{
      const tx=db.transaction(VDB_STORE,'readwrite');
      tx.objectStore(VDB_STORE).delete(VDB_KEY);
      tx.oncomplete=res; tx.onerror=()=>rej(tx.error);
    });
  }catch(e){}
}
function _voicePersist(){
  if(!vBlob)return;
  _vdbPut({blob:vBlob,mime:vMime,durSec:vDurSecCache,memoType:vSelectedType,savedAt:Date.now()});
}

function _voiceMime(){
  const cands=['audio/mp4','audio/webm;codecs=opus','audio/webm'];
  for(const c of cands){ if(window.MediaRecorder && MediaRecorder.isTypeSupported(c)) return c; }
  return '';
}
function _voiceExt(mime){
  if(mime.indexOf('mp4')>=0)return 'm4a';
  if(mime.indexOf('webm')>=0)return 'webm';
  return 'dat';
}
function _fmtTimer(sec){
  const m=Math.floor(sec/60), s=sec%60;
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function _voiceChipInit(){
  document.querySelectorAll('#voice-chips .chip').forEach(c=>{
    c.onclick=()=>{
      document.querySelectorAll('#voice-chips .chip').forEach(x=>x.classList.remove('on'));
      c.classList.add('on');
      vSelectedType=c.dataset.type||'';
      _voicePersist();
    };
  });
}
function _voiceShowReview(show){
  document.getElementById('voice-review-card').classList.toggle('hidden',!show);
}
function _voiceLiveBanner(show){
  document.getElementById('voice-live-banner').classList.toggle('hidden',!show);
}

async function toggleRecording(){
  if(vRecorder&&vRecorder.state==='recording'){ vRecorder.stop(); return; }
  let stream;
  try{
    stream=await navigator.mediaDevices.getUserMedia({audio:true});
  }catch(e){
    toast('マイクへのアクセスが許可されていません。設定→Safari(またはChrome)→マイク で許可してください',{duration:6000});
    return;
  }
  vStream=stream;
  vMime=_voiceMime();
  vChunks=[];
  vRecorder=vMime?new MediaRecorder(stream,{mimeType:vMime}):new MediaRecorder(stream);
  vRecorder.ondataavailable=(e)=>{ if(e.data&&e.data.size>0)vChunks.push(e.data); };
  vRecorder.onerror=()=>{
    vAutoStopMsg='録音が中断されました（着信などの可能性）。ここまでを保存しました';
    if(vRecorder&&vRecorder.state!=='inactive'){ try{vRecorder.stop();}catch(err){} }
  };
  vRecorder.onstop=()=>{
    clearInterval(vTimerInt);
    _voiceLiveBanner(false);
    vStream.getTracks().forEach(t=>t.stop());
    vDurSecCache=Math.max(1,Math.floor((Date.now()-vStartTs)/1000));
    vBlob=new Blob(vChunks,{type:vMime||'audio/webm'});
    document.getElementById('voice-preview').src=URL.createObjectURL(vBlob);
    document.getElementById('voice-timer').textContent=_fmtTimer(vDurSecCache);
    _voiceShowReview(true);
    _voicePersist();
    const btn=document.getElementById('voice-rec-btn');
    btn.classList.remove('recording');
    document.getElementById('voice-hint').textContent='タップして録音開始';
    if(vAutoStopMsg){ toast(vAutoStopMsg,{duration:4000}); vAutoStopMsg=null; }
  };
  vRecorder.start();
  vStartTs=Date.now();
  _voiceShowReview(false);
  document.getElementById('voice-rec-btn').classList.add('recording');
  document.getElementById('voice-hint').textContent='タップして録音停止';
  _voiceLiveBanner(true);
  vTimerInt=setInterval(()=>{
    const sec=Math.floor((Date.now()-vStartTs)/1000);
    document.getElementById('voice-timer').textContent=_fmtTimer(sec);
  },250);
}

/* 画面ロック/アプリ切替中の録音喪失対策: 検知したら即 stop してここまでのデータを保全 */
document.addEventListener('visibilitychange',()=>{
  if(document.hidden&&vRecorder&&vRecorder.state==='recording'){
    vAutoStopMsg='画面遷移で録音を停止しました。ここまでを送信できます';
    vRecorder.stop();
  }
});
window.addEventListener('pagehide',()=>{
  if(vRecorder&&vRecorder.state==='recording'){ try{vRecorder.stop();}catch(e){} }
});

function _voiceResetUI(){
  vBlob=null; vChunks=[]; vSelectedType='';
  _voiceShowReview(false);
  document.getElementById('voice-timer').textContent='00:00';
  document.getElementById('voice-preview').removeAttribute('src');
  document.querySelectorAll('#voice-chips .chip').forEach(c=>c.classList.toggle('on',c.dataset.type===''));
}
function discardRecording(){
  if(!vBlob)return;
  const snap={blob:vBlob,mime:vMime,durSec:vDurSecCache,type:vSelectedType,
    timerText:document.getElementById('voice-timer').textContent};
  vPendingDiscard=snap;
  _voiceResetUI();
  toast('録音を破棄しました',{label:'元に戻す',duration:5000,retry:()=>{
    if(vPendingDiscard!==snap)return;
    vBlob=snap.blob; vMime=snap.mime; vDurSecCache=snap.durSec; vSelectedType=snap.type;
    document.getElementById('voice-timer').textContent=snap.timerText;
    document.getElementById('voice-preview').src=URL.createObjectURL(vBlob);
    _voiceShowReview(true);
    document.querySelectorAll('#voice-chips .chip').forEach(c=>c.classList.toggle('on',c.dataset.type===snap.type));
    vPendingDiscard=null;
    _voicePersist();
  }});
  setTimeout(()=>{ if(vPendingDiscard===snap){ vPendingDiscard=null; _vdbDelete(); } },5300);
}
async function sendVoiceMemo(){
  if(!vBlob){ toast('録音データがありません'); return; }
  if(navigator.onLine===false){
    toast('オフラインです。電波が入ったら再送してください（録音は端末に保存されています）',{duration:5000});
    return;
  }
  const btn=document.getElementById('voice-send-btn');
  btn.disabled=true;
  const origLabel=btn.innerHTML;
  btn.innerHTML='<span class="spin"></span>&#x1F4E4; 送信中…';
  const durSec=Math.max(1,vDurSecCache||1);
  const now=new Date();
  const yyyy=now.getFullYear(), mm=String(now.getMonth()+1).padStart(2,'0');
  const ext=_voiceExt(vMime);
  const uuid=(crypto.randomUUID?crypto.randomUUID():'v'+Date.now()+Math.random().toString(16).slice(2));
  const relPath=yyyy+'/'+mm+'/'+uuid+'.'+ext;
  const storagePath='voice-memos/'+relPath;
  try{
    const upRes=await fetch(SB_URL+'/storage/v1/object/voice-memos/'+relPath,{
      method:'POST',
      headers:{'apikey':SB_ANON,'Authorization':'Bearer '+SB_ANON,'Content-Type':vBlob.type||'application/octet-stream'},
      body:vBlob
    });
    if(!upRes.ok)throw new Error('upload');
    const insRes=await fetch(SB_URL+'/rest/v1/voice_memos',{
      method:'POST',
      headers:{'apikey':SB_ANON,'Authorization':'Bearer '+SB_ANON,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({storage_path:storagePath,duration_sec:durSec,memo_type:vSelectedType||null})
    });
    if(!insRes.ok)throw new Error('insert');
    toast('送信しました');
    _vdbDelete();
    _voiceResetUI();
    fetchVoiceList();
  }catch(err){
    btn.innerHTML=origLabel;
    btn.disabled=false;
    toast('送信に失敗しました。録音は端末に保存されています',{duration:5000,retry:sendVoiceMemo});
    return;
  }
  btn.disabled=false;
}

/* --- 未送信録音の復帰 (再読込/送信失敗後) --- */
async function checkPendingVoice(){
  const card=document.getElementById('voice-pending-card');
  if(!card)return;
  if(vBlob){ card.classList.add('hidden'); return; }
  const rec=await _vdbGet();
  card.classList.toggle('hidden',!(rec&&rec.blob));
}
async function resumePendingVoice(){
  const rec=await _vdbGet();
  if(!rec||!rec.blob){ document.getElementById('voice-pending-card').classList.add('hidden'); return; }
  vBlob=rec.blob; vMime=rec.mime; vDurSecCache=rec.durSec||1; vSelectedType=rec.memoType||'';
  document.getElementById('voice-timer').textContent=_fmtTimer(vDurSecCache);
  document.getElementById('voice-preview').src=URL.createObjectURL(vBlob);
  _voiceShowReview(true);
  document.querySelectorAll('#voice-chips .chip').forEach(c=>c.classList.toggle('on',c.dataset.type===vSelectedType));
  document.getElementById('voice-pending-card').classList.add('hidden');
}
async function discardPendingVoice(){
  await _vdbDelete();
  document.getElementById('voice-pending-card').classList.add('hidden');
  toast('未送信の録音を破棄しました');
}

const V_STATUS_ICON={pending:'&#x23F3;',transcribed:'&#x1F4DD;',filed:'&#x2705;',error:'&#x274C;'};
const V_TYPE_LABEL={insight:'知見',belief:'信念',diary:'日記',task:'タスク',idea:'アイデア'};
async function fetchVoiceList(){
  const el=document.getElementById('voice-list');
  try{
    const res=await fetch(SB_URL+'/rest/v1/voice_memos?select=id,status,title,transcript,memo_type,created_at&order=created_at.desc&limit=10',{
      headers:{'apikey':SB_ANON,'Authorization':'Bearer '+SB_ANON}
    });
    if(!res.ok)throw new Error('HTTP '+res.status);
    const rows=await res.json();
    el.innerHTML='';
    if(!rows.length){ el.innerHTML='<div class="empty-note">まだメモがありません</div>'; return; }
    rows.forEach(r=>{
      const row=document.createElement('div');row.className='voice-row';
      const txt=r.title||r.transcript||'(文字起こし待ち)';
      row.innerHTML='<div class="vtxt"><div>'+esc(String(txt).slice(0,40))+'</div>'+
        '<div class="vtype">'+esc(V_TYPE_LABEL[r.memo_type]||'')+'</div></div>'+
        '<span class="vst">'+(V_STATUS_ICON[r.status]||'&#x2753;')+'</span>';
      el.appendChild(row);
    });
  }catch(err){
    el.innerHTML='<div class="empty-note">読み込み失敗</div>';
  }
}

/* ================= 知見 ================= */
let curInsightTab='open';
function setInsightTab(t){curInsightTab=t;renderInsights()}

function renderInsightHealth(){
  const el=document.getElementById('insight-health');
  const h=(DATA.insights&&DATA.insights.health)||null;
  el.innerHTML='';
  if(!h){el.classList.add('hidden');return}
  el.classList.remove('hidden');
  const openN=((DATA.insights&&DATA.insights.open)||[]).length;
  const mk=(label)=>{const c=document.createElement('span');c.className='chip';c.textContent=label;return c};
  el.appendChild(mk('健全度 '+h.score+'/100'));
  if(h.broken!=null)el.appendChild(mk('broken '+h.broken));
  el.appendChild(mk('未回収 '+openN));
}
function renderInsightSeg(){
  const seg=document.getElementById('insight-seg');
  seg.innerHTML='';
  const ins=DATA.insights||{};
  const openN=(ins.open||[]).length;
  [['open','未回収 ('+openN+')'],['archived','回収済'],['beliefs','信念']].forEach(([k,label])=>{
    const b=document.createElement('button');b.className='chip'+(k===curInsightTab?' on':'');
    b.textContent=label;
    b.onclick=()=>setInsightTab(k);
    seg.appendChild(b);
  });
}
/* text = "{日付} | 本文 | 出所:... | 実証度:... | 既ノート:..." 形式が多いが、素の一文もある。
   先頭セグメントが date と一致する時だけ捨てる(=既にic-dateで表示済のため二重表示を避ける) */
function splitInsightText(item){
  const parts=(item.text||'').split(' | ').map(s=>s.trim()).filter(s=>s!=='');
  if(parts.length>1 && item.date && parts[0]===item.date)parts.shift();
  return {body:parts[0]||'',meta:parts.slice(1)};
}
function insightCard(item){
  const card=document.createElement('div');card.className='card insight-card';
  const {body,meta}=splitInsightText(item);
  card.innerHTML=
    (item.date?'<div class="ic-date">'+esc(item.date)+'</div>':'')+
    '<div class="ic-text">'+esc(body)+'</div>'+
    (meta.length?'<div class="ic-meta">'+meta.map(esc).join('<br>')+'</div>':'');
  card.onclick=()=>card.classList.toggle('open');
  return card;
}
function renderInsightList(root,items,emptyMsg){
  if(!items.length){
    const e=document.createElement('div');e.className='card';
    e.innerHTML='<div class="empty-note">'+esc(emptyMsg)+'</div>';
    root.appendChild(e);
    return;
  }
  items.forEach(it=>root.appendChild(insightCard(it)));
}
function renderInsights(){
  renderInsightHealth();
  renderInsightSeg();
  const root=document.getElementById('insights-body');
  root.innerHTML='';
  const ins=DATA.insights||{};
  if(curInsightTab==='open')renderInsightList(root,ins.open||[],'未回収の知見はありません');
  else if(curInsightTab==='archived')renderInsightList(root,ins.archived||[],'回収済みの知見はまだありません');
  else renderInsightList(root,ins.beliefs||[],'信念インボックスは空です');
}

/* ================= 記事 (article-factory 承認レール) ================= */
function articleScoreChips(a){
  const s=a.scores||{};
  const chips=[];
  if(s.voice!=null)chips.push('<span class="fc-chip">voice '+esc(s.voice)+'</span>');
  if(s.critique!=null)chips.push('<span class="fc-chip">critique '+esc(s.critique)+'</span>');
  if(s.factcheck)chips.push('<span class="fc-chip '+esc(s.factcheck)+'">fact:'+esc(s.factcheck)+'</span>');
  return chips.length?'<div class="chip-row" style="margin:8px 0">'+chips.join('')+'</div>':'';
}
function articleFiguresBlock(a){
  const figs=a.figures||[];
  if(!figs.length)return '';
  const firstImg=(figs[0]&&figs[0].src)?'<img class="art-thumb" style="max-height:80px;margin-top:6px" src="'+esc(figs[0].src)+'" loading="lazy">':'';
  return '<div class="chip-row" style="margin:6px 0"><span class="fc-chip">&#x1F5BC;&#xFE0F; 図解 '+figs.length+'枚</span></div>'+firstImg;
}
function articleExcerptBlock(a){
  if(!a.body_excerpt)return '';
  return '<details class="flow-hint"><summary>&#x1F4C4; 本文プレビュー</summary><div class="flow-body">'+esc(a.body_excerpt)+'&hellip;</div></details>';
}
/* ---- deliveries[] (multicast配達) — 記事カードのプラットフォーム別チップ ---- */
function deliveryPillClass(s){return s==='posted'?'posted':(s==='rejected'?'rejected':'draft')}
function deliveryStatusLabel(s){return s==='posted'?'公開済み':(s==='rejected'?'差し戻し':(s==='drafted'?'下書き済み':'未着手'))}
function articleDeliveryChips(a){
  const deliveries=a.deliveries||[];
  if(deliveries.length<=1)return '';
  return '<div class="chip-row deliv-row" style="margin:8px 0;gap:6px">'+
    deliveries.map((d,i)=>{
      const eff=deliveryEffectiveStatus(a,d);
      return '<button type="button" class="dchip" data-didx="'+i+'">'+
        '<span class="pill '+deliveryPillClass(eff)+'">'+esc(deliveryStatusLabel(eff))+'</span>'+
        '<span style="font-size:11px;font-weight:700">'+esc(ART_PLAT_LABEL[d.platform]||d.platform||'?')+'</span>'+
      '</button>';
    }).join('')+
  '</div><div class="dpanel-slot"></div>';
}
function articleDeliveryPanel(a,d,card){
  const panel=document.createElement('div');panel.style.marginTop='6px';
  if(d.platform==='x_post'){
    panel.innerHTML='<div class="btn-row"><button class="btn ghost" data-role="goto" style="flex:1">&#x1F4E2; 投稿タブで確認</button></div>';
    panel.querySelector('[data-role="goto"]').onclick=()=>{jumpToXDraft(d.x_draft_id)};
    return panel;
  }
  const eff=deliveryEffectiveStatus(a,d);
  if(eff==='posted'||eff==='rejected'){
    panel.innerHTML='<div class="status-note">'+(eff==='posted'?'公開済みにしました':'差し戻しました')+'（次回同期で反映）</div>';
    return panel;
  }
  const openHtml=d.edit_url
    ?'<a class="btn ghost" href="'+esc(d.edit_url)+'" target="_blank" rel="noopener" style="flex:1;text-align:center;text-decoration:none">&#x1F517; 開く</a>'
    :(d.kit_path?'<button class="btn ghost" data-role="kit" style="flex:1">&#x1F4CB; kitパスをコピー</button>':'');
  panel.innerHTML=(openHtml?'<div class="btn-row">'+openHtml+'</div>':'')+
    '<div class="btn-row" style="margin-top:6px">'+
      '<button class="btn approve" data-role="posted" style="flex:1">&#x2705; 公開済み</button>'+
      '<button class="btn reject" data-role="reject" style="flex:1">&#x274C; 差し戻し</button>'+
    '</div>';
  const kitBtn=panel.querySelector('[data-role="kit"]');
  if(kitBtn)kitBtn.onclick=(e)=>copyText(d.kit_path,e.currentTarget);
  panel.querySelector('[data-role="posted"]').onclick=()=>{
    const url=prompt((ART_PLAT_LABEL[d.platform]||d.platform)+'の公開URLを入力してください');
    if(!url)return;
    doInboxAction('article',a.slug,'mark_posted',d.platform,card,{platform:d.platform,note:url});
  };
  panel.querySelector('[data-role="reject"]').onclick=()=>{
    doInboxAction('article',a.slug,'reject',d.platform,card,{platform:d.platform});
  };
  return panel;
}
function wireArticleDeliveryChips(a,card){
  const deliveries=a.deliveries||[];
  if(deliveries.length<=1)return;
  const slot=card.querySelector('.dpanel-slot');
  card.querySelectorAll('.dchip').forEach(btn=>{
    btn.onclick=()=>{
      const wasOpen=btn.classList.contains('on');
      card.querySelectorAll('.dchip').forEach(b=>b.classList.remove('on'));
      slot.innerHTML='';
      if(wasOpen)return;
      btn.classList.add('on');
      slot.appendChild(articleDeliveryPanel(a,deliveries[Number(btn.dataset.didx)],card));
    };
  });
}
function articleOpenBtn(a){
  if(a.edit_url){
    return '<a class="btn ghost ac-open" href="'+esc(a.edit_url)+'" target="_blank" rel="noopener" style="flex:1;text-align:center;text-decoration:none">&#x1F517; 開く</a>';
  }
  if(a.kit_path){
    return '<button class="btn ghost" data-role="kit" style="flex:1">&#x1F4CB; kitパスをコピー</button>';
  }
  return '';
}
function articleReviewCard(a){
  const kindClass=a.platform==='note'?'k-note':a.platform==='tips'?'k-tips':a.platform==='brain'?'k-brain':a.platform==='x_article'?'k-xarticle':'';
  const card=document.createElement('div');card.className='card'+(kindClass?' '+kindClass:'');card.id='art-'+a.slug;
  const multi=(a.deliveries||[]).length>1;
  const actionable=a.actionable!==false;  // x_articleネイティブ下書き等、backing article.yamlが無いレコードは操作ボタンを出さない
  const price=(a.price||0)===0?'<span class="art-price free">無料</span>':'<span class="art-price">'+fmtYen(a.price)+'</span>';
  card.innerHTML=
    ((a.header||a.thumb)?'<img class="art-thumb" src="'+esc(a.header||a.thumb)+'" loading="lazy">':'')+
    '<div class="dcard-head">'+
      '<span class="badge '+esc(a.platform||'')+'">'+esc(ART_PLAT_LABEL[a.platform]||a.platform||'')+'</span>'+
      price+
    '</div>'+
    (a.title?'<div style="font-weight:700;font-size:16px;margin:6px 0 4px">'+esc(a.title)+'</div>':'')+
    (a.hook?'<div class="dcard-body">'+esc(a.hook)+'</div>':'')+
    articleScoreChips(a)+
    articleFiguresBlock(a)+
    articleExcerptBlock(a)+
    articleDeliveryChips(a)+
    (multi||!actionable?'':(
      '<div class="btn-row">'+articleOpenBtn(a)+'</div>'+
      '<div class="btn-row" style="margin-top:8px">'+
        '<button class="btn approve" data-role="posted" style="flex:1">&#x2705; 投稿済み</button>'+
        '<button class="btn reject" data-role="reject" style="flex:1">&#x274C; 差し戻し</button>'+
      '</div>'
    ))+
    (actionable?
    '<details class="flow-hint">'+
      '<summary>&#x2753; この後どうなる?</summary>'+
      '<div class="flow-body">'+(multi?
        'プラットフォームごとに公開済み/差し戻しをタップ &rarr; 全プラットフォーム公開済みで article.yaml が posted になり売上/台帳へ':
        '投稿済み &rarr; article.yaml が posted になり売上/台帳へ')+'<br>'+
      '差し戻し &rarr; 次のClaudeセッションが feedback を読んで改稿&rarr;再提出</div>'+
    '</details>':'')+
    (actionable?'<div class="btn-row" style="margin-top:8px">'+snoozeBtnHtml()+'</div>':'');
  if(multi){
    wireArticleDeliveryChips(a,card);
  }else if(actionable){
    const kitBtn=card.querySelector('[data-role="kit"]');
    if(kitBtn)kitBtn.onclick=(e)=>copyText(a.kit_path,e.currentTarget);
    card.querySelector('[data-role="posted"]').onclick=()=>{
      const url=prompt('公開URLを入力してください');
      if(!url)return;
      doInboxAction('article',a.slug,'mark_posted','',card,{note:url});
    };
    card.querySelector('[data-role="reject"]').onclick=()=>{
      const note=prompt('差し戻し理由を入力してください');
      if(note===null)return;
      doInboxAction('article',a.slug,'reject','',card,{note:note||''});
    };
  }
  if(actionable){
    wireSnoozeButton(card,actedKey('article',a.slug,''));
  }
  return card;
}
function articleWipRow(a){
  const row=document.createElement('div');row.className='card post-row';
  row.innerHTML=
    '<div class="pr-head" style="cursor:default">'+
      '<div class="pr-main">'+
        '<div class="pr-ttl">'+esc(a.title||a.slug)+'</div>'+
        '<div class="pr-sub">'+esc(ART_PLAT_LABEL[a.platform]||a.platform||'')+' &middot; QA '+esc(a.rounds||0)+'周</div>'+
      '</div>'+
      '<span class="pill '+pillClass(a.status)+'">'+esc(statusLabel(a.status))+'</span>'+
    '</div>';
  return row;
}
function articleDoneRow(a){
  const row=document.createElement('div');row.className='card post-row';
  const sub=a.status==='posted'
    ? (a.posted_date?'&middot; '+esc(a.posted_date):'')
    : ((a.feedback&&a.feedback[0])?'&middot; '+esc(a.feedback[0]):'');
  row.innerHTML=
    '<div class="pr-head" style="cursor:default">'+
      '<div class="pr-main">'+
        '<div class="pr-ttl">'+esc(a.title||a.slug)+'</div>'+
        '<div class="pr-sub">'+esc(ART_PLAT_LABEL[a.platform]||a.platform||'')+' '+sub+'</div>'+
      '</div>'+
      '<span class="pill '+pillClass(a.status)+'">'+esc(statusLabel(a.status))+'</span>'+
    '</div>'+
    (a.status==='posted'&&a.url?
      '<div style="margin-top:8px"><a href="'+esc(a.url)+'" target="_blank" rel="noopener" style="font-size:12px">'+esc(a.url)+'</a></div>':'');
  return row;
}

/* ---- Boot ---- */
function renderAll(){
  try{ renderUpdatedAt(); }catch(e){console.error('renderUpdatedAt failed',e)}
  try{ pruneActed(); }catch(e){console.error('pruneActed failed',e)}
  try{ pruneSnooze(); }catch(e){console.error('pruneSnooze failed',e)}
  try{
    renderInboxHeadband();
    renderInboxProgress();
    renderInboxHero(document.getElementById('inbox-hero-zone'));
    renderInboxCards();
    renderInboxBlocked();
  }catch(e){console.error('renderInbox failed',e)}
  try{ renderQueue(); }catch(e){console.error('renderQueue failed',e)}
  try{ renderStrategy(); }catch(e){console.error('renderStrategy failed',e)}
  try{ renderMoney(); }catch(e){console.error('renderMoney failed',e)}
  try{ renderApps(); }catch(e){console.error('renderApps failed',e)}
  try{ renderInsights(); }catch(e){console.error('renderInsights failed',e)}
  try{ updateNavBadges(); }catch(e){console.error('updateNavBadges failed',e)}
}
function boot(){
  renderAll();
  _voiceChipInit();
  checkPendingVoice();
  setInterval(()=>{ renderInboxHeadband(); renderUpdatedAt(); },60000);
  fetchFreshData(false);
  if(location.hash==='#voice')showView('more-voice');
}
if(document.getElementById('app').classList.contains('on'))boot();
</script>
