<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
<title>Ryo Ops</title>
<meta name="description" content="Ryo Ops — AIが作った投稿/記事/動画を確認して投稿する、受信箱ファーストの日次レビュー司令室。">
<meta name="theme-color" content="#0a0c10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ryo Ops">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{--bg:#0a0c10;--card:#12151d;--card2:#191d28;--bd:#262b39;--tx:#eef0f6;--sub:#969db1;
--accent:#6c8cff;--green:#34d399;--red:#f87171;--amber:#fbbf24;--radius:18px;
--k-x:#6c8cff;--k-note:#34d399;--k-tips:#38bdf8;--k-brain:#a78bfa;--k-xarticle:#cbd5e1;--k-video:#f472b6;
--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
-webkit-font-smoothing:antialiased}
a{color:var(--accent)}
button{font-family:inherit;cursor:pointer;-webkit-appearance:none;appearance:none;border:none;background:none;color:inherit}
.hidden{display:none!important}

/* Lock */
#lock{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;
justify-content:center;gap:14px;padding:24px;z-index:200;transition:opacity .25s}
#lock.off{opacity:0;pointer-events:none}
.lock-icon{font-size:44px}
#lock h2{margin:0;font-size:18px;font-weight:700}
#lock input{width:100%;max-width:280px;padding:14px 16px;border-radius:12px;border:1px solid var(--bd);
background:var(--card);color:var(--tx);font-size:16px;text-align:center}
#lock button.go{width:100%;max-width:280px;padding:14px;border-radius:12px;background:var(--accent);
color:#fff;font-weight:700;font-size:15px;min-height:48px}
.lock-err{color:var(--red);font-size:13px;min-height:18px}

/* App shell */
#app{display:none;padding-bottom:calc(84px + var(--safe-b));min-height:100vh}
#app.on{display:block}
.wrap{padding:0 14px 24px}
.view{display:none}
.view.on{display:block;animation:viewFade .15s ease}
@keyframes viewFade{from{opacity:0}to{opacity:1}}

/* Top bar (sticky) */
.topbar-wrap{position:sticky;top:0;z-index:80;background:var(--bg);padding:calc(10px + var(--safe-t)) 14px 8px;
border-bottom:1px solid transparent}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px}
.topbar h1{font-size:19px;margin:0;font-weight:800;letter-spacing:.2px}
.tb-sub{font-size:11px;color:var(--sub);font-weight:600;margin-top:2px}
.tb-actions{display:flex;gap:8px;flex:0 0 auto}
.icon-btn{width:38px;height:38px;border-radius:12px;background:var(--card2);border:1px solid var(--bd);
font-size:17px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.icon-btn:active{background:var(--bd)}
.icon-btn.spinning{animation:spin360 .6s linear}
@keyframes spin360{to{transform:rotate(360deg)}}
.tb-status{font-size:11px;color:var(--sub);margin-top:8px}
.tb-status.amber{color:var(--amber)}

/* Cards */
.card{background:var(--card);border:1px solid var(--bd);border-radius:var(--radius);padding:14px;margin-bottom:12px;
transition:opacity .25s ease,transform .25s ease,max-height .25s ease,margin .25s ease,padding .25s ease}
.card.acted-collapse,.post-row.acted-collapse{opacity:0;transform:scale(.97);max-height:0;margin-bottom:0;
padding-top:0;padding-bottom:0;overflow:hidden;border-width:0}
.sec-h{font-size:12px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.6px;
margin:18px 0 8px;display:flex;align-items:center;justify-content:space-between;gap:6px}
.sec-h:first-child{margin-top:0}
.sec-h .cnt{font-weight:700;color:var(--sub);font-size:11px}
.empty-note{color:var(--sub);text-align:center;padding:30px 14px;font-size:13px}
.card.flash{background:rgba(108,140,255,.18)}

/* kind accent (左端3pxバー) */
.card.kx{border-left:3px solid var(--k-x)}
.card.k-note{border-left:3px solid var(--k-note)}
.card.k-tips{border-left:3px solid var(--k-tips)}
.card.k-brain{border-left:3px solid var(--k-brain)}
.card.k-xarticle{border-left:3px solid var(--k-xarticle)}
.card.kvideo{border-left:3px solid var(--k-video)}

/* 受信箱: ヘッダー帯 + 進捗バー */
.ib-headband{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--sub);
font-weight:700;padding:0 2px 10px}
.ib-headband.hot{color:var(--red)}
.prog-card{margin-bottom:14px}
.prog-wrap{margin-bottom:4px}
.prog-info{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-bottom:6px}
.prog-track{height:10px;background:var(--card2);border-radius:6px;overflow:hidden;border:1px solid var(--bd)}
.prog-track.thin{height:6px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#8b7cf6);border-radius:6px;transition:width .4s}
.prog-num{font-size:11px;color:var(--sub);margin-top:5px}
.prog-celebrate{text-align:center;font-size:15px;font-weight:800;padding:6px 0;line-height:1.8}
.prog-celebrate a{color:var(--accent);font-weight:700;font-size:12px}

/* コツコツモード: 目標チップ (控えめ・進捗カード右上) + 連続日数 */
.goal-chip-row{display:flex;justify-content:flex-end;gap:4px;margin-bottom:8px}
.goal-chip{font-size:10px;font-weight:700;color:var(--sub);background:var(--card2);border:1px solid var(--bd);
border-radius:999px;padding:2px 8px;min-height:22px}
.goal-chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.streak-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.streak-chip{font-size:11px;font-weight:800;color:var(--amber)}
.streak-dots{display:flex;gap:4px}
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;background:transparent;border:1px solid var(--bd)}
.sdot.met{background:var(--accent);border-color:var(--accent)}
.sdot.some{background:var(--sub);border-color:var(--sub)}

/* 今日の一手 (hero) */
.hero-card{border:1px solid var(--accent);box-shadow:0 0 0 1px rgba(108,140,255,.15)}
.hero-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.hero-chan{font-size:11px;font-weight:800;color:var(--sub);background:var(--card2);border-radius:999px;padding:3px 9px}
.hero-price{font-size:11px;font-weight:800;color:var(--green)}
.hero-ttl{font-size:17px;font-weight:800;line-height:1.4;margin-bottom:10px}
.hero-reasons{margin:0 0 10px}
.hero-checklist{margin-bottom:4px}
.hc-item{font-size:13px;color:var(--tx);line-height:1.9;cursor:pointer}
.hc-item.checked{color:var(--sub);text-decoration:line-through}
.today-next summary{cursor:pointer;font-weight:700;font-size:13px;color:var(--sub);list-style:none;
display:flex;align-items:center;gap:6px}
.today-next summary::-webkit-details-marker{display:none}
.today-next summary::before{content:'\25B8';font-size:11px;transition:transform .15s;display:inline-block}
.today-next[open] summary::before{transform:rotate(90deg)}
.today-next-item{padding:10px 0 0;margin-top:10px;border-top:1px solid var(--bd);cursor:pointer}
.today-next-item .nm{font-weight:700;font-size:13px}
.today-next-item .na{font-size:11px;color:var(--sub);margin-top:2px}

/* 型配分 (戦略タブ) */
.type-gap-zero{font-size:16px;font-weight:800;color:var(--red);text-align:center;padding:2px 0 14px}
.type-gap-row{margin-bottom:10px}
.type-gap-row:last-child{margin-bottom:0}
.type-gap-row .tg-label{display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-bottom:4px}
.type-gap-row .tg-label .tg-name{font-weight:700;color:var(--tx)}
.type-gap-row.gap-hot .tg-label .tg-name{color:var(--amber)}
.type-gap-row.gap-hot .bar-fill{background:linear-gradient(90deg,var(--amber),#fbbf24)}

/* 解除待ち / 処理済み (details) */
.blocked-row{display:flex;justify-content:space-between;gap:8px;padding:8px 0;border-top:1px solid var(--bd);font-size:12px}
.blocked-row:first-of-type{border-top:none;padding-top:0}
.blocked-row .bl-ttl{font-weight:700}
.blocked-row .bl-un{color:var(--sub);text-align:right}
summary.proc-summary{cursor:pointer;list-style:none;font-weight:800;font-size:12px;color:var(--sub);
display:flex;justify-content:space-between;align-items:center;text-transform:uppercase;letter-spacing:.5px}
summary.proc-summary::-webkit-details-marker{display:none}
.proc-body{margin-top:10px}
.proc-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid var(--bd);font-size:12px}
.proc-row:first-child{border-top:none}
.proc-mark{width:16px;text-align:center;color:var(--sub);flex:0 0 auto}
.proc-ttl{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--sub)}
.proc-lbl{color:var(--sub);font-size:11px;flex:0 0 auto}

/* 戦略タブ (content_plan.yaml ミラー) */
.week-h{display:flex;justify-content:space-between;align-items:center;font-weight:800;font-size:13px}
.week-h .wk-range{font-weight:600;color:var(--sub);font-size:11px}
.week-card-cur{border:1px solid var(--accent)}
details.week-card summary{cursor:pointer;list-style:none;display:flex;justify-content:space-between;
align-items:center;font-weight:800;font-size:13px;padding:2px 0}
details.week-card summary::-webkit-details-marker{display:none}
details.week-card summary::before{content:'\25B8';font-size:11px;margin-right:6px;display:inline-block;transition:transform .15s}
details.week-card[open] summary::before{transform:rotate(90deg)}
details.week-card .week-items{margin-top:10px}
.week-card-cur .week-items{margin-top:12px}
.st-item{padding:10px 6px;margin:0 -6px;border-top:1px solid var(--bd);border-radius:8px;transition:background .3s}
.st-item:first-child{border-top:none;padding-top:0}
.st-item.flash{background:rgba(108,140,255,.18)}
.st-item.status-skipped .st-what{text-decoration:line-through;color:var(--sub)}
.st-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.st-what{font-size:13px;font-weight:700;flex:1;min-width:0}
.st-tags{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-top:6px}
.st-why{font-size:11px;color:var(--sub);margin-top:6px;line-height:1.6}
.st-chip{font-size:10px;font-weight:800;padding:3px 8px;border-radius:999px;white-space:nowrap}
/* needs_ryo は長文になる (解除条件の説明) — nowrap だと横スクロールを誘発するため折り返す */
.st-chip.needs-ryo{white-space:normal;text-align:left;line-height:1.5}
.st-chip.done{background:rgba(52,211,153,.15);color:var(--green)}
.st-chip.pending{background:var(--card2);color:var(--sub)}
.st-chip.skipped{background:var(--card2);color:var(--sub)}
.st-chip.delayed{background:rgba(248,113,113,.14);color:var(--red)}
.st-chip.needs-ryo{background:rgba(248,113,113,.14);color:var(--red)}

.pl-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd)}
.pl-row:last-child{border-bottom:none}
.pl-rank{font-size:10px;font-weight:800;padding:3px 7px;border-radius:999px;background:var(--card2);
color:var(--accent);flex-shrink:0}
.pl-lane{flex:1;min-width:0}
.pl-lane-name{font-size:12px;font-weight:700}
.pl-lane-role{font-size:10px;color:var(--sub);margin-top:1px}
.pl-effort{font-size:10px;color:var(--sub);text-align:right;flex-shrink:0;white-space:nowrap}
.pl-rules{margin:8px 0 0;padding-left:16px;font-size:10px;color:var(--sub);line-height:1.7}
.pl-budget{font-size:10px;color:var(--sub);margin-top:6px}

.deal-mini{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0;
border-bottom:1px solid var(--bd)}
.deal-mini:last-child{border-bottom:none}
.deal-mini .nm{font-weight:700;font-size:13px}
.deal-mini .na{font-size:12px;color:var(--sub);margin-top:2px}
.deal-mini .st{font-size:11px;background:var(--card2);border-radius:999px;padding:3px 9px;color:var(--accent);
font-weight:700;white-space:nowrap}

/* Badges */
.badge{display:inline-block;font-size:10px;font-weight:800;padding:3px 8px;border-radius:999px;
background:var(--card2);color:var(--accent);letter-spacing:.3px}
.badge.rescue{color:#f472b6}.badge.verification{color:#38bdf8}.badge.conversation{color:#a3e635}
.badge.work{color:#fbbf24}
.qbadge{font-size:11px;font-weight:800;color:var(--green)}

/* Article platform badges */
.badge.note{color:var(--k-note)}.badge.tips{color:var(--k-tips)}.badge.brain{color:var(--k-brain)}
.badge.x_article{color:var(--k-xarticle)}
.fc-chip{font-size:10px;font-weight:800;padding:3px 8px;border-radius:999px;background:var(--card2);color:var(--sub)}
.fc-chip.pass{color:var(--green)}.fc-chip.warn{color:var(--amber)}.fc-chip.fail{color:var(--red)}
.art-thumb{width:100%;max-height:130px;object-fit:cover;border-radius:12px;margin-bottom:8px;border:1px solid var(--bd)}
.art-price{font-size:11px;font-weight:800;color:var(--sub)}
.art-price.free{color:var(--green)}

/* Filter chips (受信箱 sticky) */
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.chip{font-size:12px;font-weight:700;padding:8px 14px;border-radius:999px;background:var(--card2);
border:1px solid var(--bd);color:var(--sub);min-height:36px}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip.static{cursor:default}
.chip.tap{cursor:pointer}
.chip-row.sticky{position:sticky;top:76px;z-index:60;background:var(--bg);padding:8px 0 4px;margin:0 0 8px;
flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chip-row.sticky::-webkit-scrollbar{display:none}
.chip-row.sticky .chip{flex:0 0 auto}

/* Draft card (承認待ち: フル表示) */
.dcard-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.dcard-body{font-size:15px;line-height:1.75;white-space:pre-wrap;word-break:break-word}
.dcard-thread{margin-top:8px;padding-top:8px;border-top:1px dashed var(--bd)}
.dcard-thread .tlabel{font-size:11px;color:var(--sub);font-weight:700;margin-bottom:4px}
.dcard-thread .thread-item{margin-top:10px}
.dcard-thread .thread-item:first-child{margin-top:0}
.tlabel-row{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:4px}
.tlabel-row .tlabel{margin-bottom:0}
.media-row{display:flex;gap:6px;margin:10px 0;overflow-x:auto}
.media-row img{height:64px;width:64px;object-fit:cover;border-radius:10px;border:1px solid var(--bd);flex:0 0 auto}
.media-view-row{display:flex;gap:6px;margin:10px 0;overflow-x:auto}
.mv-item{flex:0 0 auto;display:block;text-decoration:none}
.mv-item img{height:64px;width:64px;object-fit:cover;border-radius:10px;border:1px solid var(--bd);display:block}
.mv-item.mv-video{height:64px;padding:0 12px;border-radius:10px;border:1px solid var(--bd);background:var(--card2);
color:var(--tx);font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px;white-space:nowrap}
.media-warn{font-size:12px;font-weight:800;color:var(--red);background:rgba(248,113,113,.12);
border:1px solid rgba(248,113,113,.3);border-radius:10px;padding:9px 11px;margin:10px 0}
details.flow-hint{margin-top:10px}
details.flow-hint summary{cursor:pointer;list-style:none;font-size:11px;color:var(--sub);font-weight:700}
details.flow-hint summary::-webkit-details-marker{display:none}
details.flow-hint .flow-body{font-size:11px;color:var(--sub);line-height:1.9;padding:8px 10px;margin-top:6px;
background:var(--card2);border-radius:10px}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn{flex:1;min-height:48px;border-radius:14px;font-weight:700;font-size:14px;display:flex;
align-items:center;justify-content:center;gap:6px;border:1px solid var(--bd);background:var(--card2)}
.btn.approve{background:var(--green);color:#04240f;border-color:var(--green)}
.btn.reject{background:transparent;color:var(--red);border:1.5px solid var(--red)}
.btn.copy{background:var(--card2);color:var(--tx);flex:0 0 auto;padding:0 14px}
.btn.wide{flex:none;width:100%}
.btn:disabled{opacity:.5}
.btn.small{min-height:36px;font-size:12px;padding:0 12px;flex:0 0 auto}
.btn.ghost{background:none;border:1px dashed var(--bd);color:var(--sub);font-size:12px;min-height:40px}
.status-note{font-size:12px;font-weight:700;color:var(--green);text-align:center;padding:8px 0}

/* Post row (キュー/履歴: コンパクト・タップで展開) */
.post-row{padding:12px 14px}
.post-row .pr-head{display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer;min-height:32px}
.post-row .pr-main{flex:1;min-width:0}
.post-row .pr-ttl{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.post-row .pr-sub{font-size:11px;color:var(--sub);margin-top:2px}
.post-row .pr-body{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)}
.post-row.open .pr-body{display:block}
.date-h{font-size:11px;font-weight:800;color:var(--sub);margin:14px 0 6px;display:flex;justify-content:space-between}
.date-h:first-child{margin-top:0}

/* Video card */
.vcard{display:flex;gap:12px}
.vcard img.thumb{width:76px;height:76px;object-fit:cover;border-radius:12px;border:1px solid var(--bd);
background:var(--card2);flex:0 0 auto}
.vcard-main{flex:1;min-width:0}
.vcard-main .slug{font-weight:700;font-size:14px}
.vcard-main .meta{font-size:11px;color:var(--sub);margin-top:2px}
.vcard-badges{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex:0 0 auto}
.plat-pill{font-size:10px;font-weight:800;padding:3px 8px;border-radius:999px;background:var(--card2);color:var(--sub);white-space:nowrap}
.plat{margin-top:10px;border-top:1px solid var(--bd);padding-top:10px}
.plat-head{display:flex;justify-content:space-between;align-items:center;cursor:pointer;min-height:36px}
.plat-name{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.4px}
.plat-status{font-size:11px;color:var(--sub)}
.plat-cap{display:none;font-size:13px;line-height:1.6;color:var(--tx);margin-top:8px;
background:var(--card2);border-radius:10px;padding:10px;white-space:pre-wrap;word-break:break-word}
.plat-cap.open{display:block}
.tiktok-hot{background:linear-gradient(135deg,rgba(251,191,36,.15),rgba(248,113,113,.1));
border:1px solid rgba(251,191,36,.35);border-radius:12px;padding:10px;margin-top:8px}
.tiktok-hot .hh{font-size:13px;font-weight:800;color:var(--amber)}

/* Pills */
.pill{font-size:10px;font-weight:800;padding:3px 8px;border-radius:999px;white-space:nowrap}
.pill.review{background:rgba(251,191,36,.15);color:var(--amber)}
.pill.approved{background:rgba(108,140,255,.15);color:var(--accent)}
.pill.queued{background:rgba(251,191,36,.15);color:var(--amber)}
.pill.draft{background:var(--card2);color:var(--sub)}
.pill.posted{background:rgba(52,211,153,.15);color:var(--green)}
.pill.sent_to_inbox{background:rgba(251,191,36,.18);color:var(--amber)}
.pill.rejected{background:rgba(248,113,113,.14);color:var(--red)}
.pill.other{background:var(--card2);color:var(--sub)}
.dchip{display:inline-flex;align-items:center;gap:5px;background:none;border:none;padding:0;margin:0;cursor:pointer;font:inherit}
.dchip.on .pill{outline:2px solid var(--accent)}

/* Money */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.bar-row .m-label{width:52px;font-size:11px;color:var(--sub);flex:0 0 auto}
.bar-track{flex:1;height:20px;background:var(--card2);border-radius:6px;overflow:hidden;border:1px solid var(--bd);
position:relative}

/* ---- Auth (salted SHA-256, same scheme/password as x-preview) ---- */
const H='878a3d842d2c56f1398de3090d65daf2fe7b9445743be4dccc330591f9bb6cc1';
const S='x-preview-2026-salt';
async function _sha256(s){const b=new TextEncoder().encode(s);const h=await crypto.subtle.digest('SHA-256',b);
  return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,'0')).join('')}
async function unlock(){
  const v=document.getElementById('pw').value;
  const e=document.getElementById('lockErr');
  e.textContent='確認中…';
  await new Promise(r=>setTimeout(r,300));
  const hv=await _sha256(S+v);
  if(hv===H){
    localStorage.setItem('ryoops_h',H);
    document.getElementById('lock').classList.add('off');
    document.getElementById('app').classList.add('on');
    e.textContent='';
    boot();
  }else{
    e.textContent='パスワードが違います';
    document.getElementById('pw').value='';
    setTimeout(()=>e.textContent='',2000);
  }
}
/* v6: 認証保存を localStorage 化 (PWA/ブラウザを閉じても再入力不要)。
   読み取りは localStorage → 無ければ sessionStorage の順でフォールバックし、
   旧版 (sessionStorage のみ書き込んでいた) の既存ログイン状態も破壊しない。
   書き込みは常に localStorage のみ。 */
if(localStorage.getItem('ryoops_h')===H || sessionStorage.getItem('ryoops_h')===H){
  document.getElementById('lock').classList.add('off');
  document.getElementById('app').classList.add('on');
}

\n❌ wrangler r2 object put ← 個別ファイルだとpublic URLに反映されず404\n↓\n✅ rclone copy file r2:bucket/ で解決\n\n公式CLIなのにバグってる。同じ症状で詰んだ人いる？\n\n[画像: エラーログ before / 成功 after の2枚]"],"media":[],"created":"2026-05-20","posted_date":"","related_article":"","media_view":[],"media_missing":true},{"id":"2026-05-04-gpt-image2-short-drama-4walls","path":"10_X-Marketing/drafts/posts/2026-05-04-gpt-image2-short-drama-4walls.md","title":"2026-05-04-gpt-image2-short-drama-4walls","post_type":"post-drafts","status":"legacy","quality":"","body":"| # | モード | フック | 推奨配信 |\n|---|---|---|---|\n| 1 | **C 融合（本命）** | 4つの壁を1枚チェックリストにまとめる救済図解 | 5/4 12:00 or 5/5 7:00 |\n| 2 | B 純救済 | キャラ一貫性に絞った深掘り（参照添付 + 新規チャット再投） | 5/5 12:00 |\n| 3 | B 純救済 | 出力ムラを潰すハイブリッド（GPT Image 2 → NB2 Edit） | ストック |\n\n---","thread":[],"media":["null","図解1【生成済】: 「GPT Image 2でショートドラマ ぶつかる4つの壁」チェックリスト","図解2【未着手】: Before/After（参照なし4シーン顔バラバラ → 参照あり統一）visual-director発注候補","https://v3b.fal.media/files/b/0a98d20f/68MFU35mewvmsMZDMS24p_L5ROcmuE.png"],"created":"2026-05-04","posted_date":"","related_article":"","media_view":[{"kind":"image","src":"https://v3b.fal.media/files/b/0a98d20f/68MFU35mewvmsMZDMS24p_L5ROcmuE.png","label":"68MFU35mewvmsMZDMS24p_L5ROcmuE.png"}],"media_missing":false},{"id":"2026-04-26-existing-summer-soft-vlog","path":"10_X-Marketing/drafts/posts/2026-04-26-existing-summer-soft-vlog.md","title":"2026-04-26-existing-summer-soft-vlog","post_type":"post-drafts-with-reply-chain","status":"legacy","quality":"","body":"AI動画にテキスト入れる時、毎回デジタル感が出てた。\n\nRemotion + Google Fonts の Caveat (英語手書き) と Klee One (日本語やわらか) を重ねて、\nwashi tape ・ハッシュタグステッカー・微回転（-2°〜+5°）で、Instagram旅Vlogみたいな手書き編集に振った。\n\n「夏のかけら」というMVを置いておきます。\n画像とプロンプトはリプ欄に。","thread":["4章のヒーロー画像（GPT Image 2 で T2I 生成）。\n朝の空港 / 古宇利の海 / 壺屋やちむん通り / サンセットビーチ。\n4枚とも Kodak Portra 400 + Fujifilm Pro 400H 質感プリセットで光が揃う。","4章のGPT Image 2プロンプト、共通部品＋章別パートで構成しました。\n\n▼ 共通質感プリセット（全章末尾に貼る）\n\"Faded Kodak Portra 400 + Fujifilm Pro 400H aesthetic, candid smartphone snapshot, handheld slight motion blur, fine grain, 35mm lens feel, creamy soft skin, milky highlights, slightly tilted composition. Photo-realistic, NOT illustration.\"\n\n▼ Ch1 朝・那覇空港 (5:47)\n\"Young Japanese couple at Naha Airport at 5:47 AM dawn. Soft golden first light through floor-to-ceiling windows. Girl in oversized white linen shirt holding iced latte. Boy in cream tee with navy cap backwards. Empty terminal, faded JAL/ANA signage softly blurred.\"\n\n▼ Ch2 昼・古宇利ビーチ (13:22)\n\"Same couple on Kouri Beach at 1:22 PM. Bright cobalt-blue Okinawan ocean, vivid white sand. Selfie angle: boy in front (close-up smile), girl walking toward water in background, white loose tee tucked into denim shorts, hair flying. Bright midday sun, palm shadows, ocean blue saturation pulled cyan.\"\n\n▼ Ch3 夕・壺屋やちむん通り (17:45)\n\"Same couple holding hands walking down a narrow Tsuboya pottery alley in Naha at 5:45 PM golden hour. Vintage red Coca-Cola vending machine glowing on the left, weathered shisa stone lion guardian on the wall. Honey-orange light, long shadows. Girl in white floral sundress, boy in black tee + cargo shorts.\"\n\n▼ Ch4 夜・サンセットビーチ (22:03)\n\"Same couple in cotton yukata (girl mint-wave / boy navy-stripe) sitting on dark sand at Sunset Beach at 10:03 PM. Both holding senko-hanabi sparklers, golden sparks falling. Distant moon over Pacific, paper lanterns on a fishing boat far out. Cinestill 800T + Kodak Portra 800 night film, halation around sparkler glow, deep teal shadows.\"\n\nquality=high / image_size=portrait_16_9 / 4枚並列で約2分・$0.20 でした。","Vlog風オーバーレイの仕掛けは @remotion/google-fonts で5本のフォントをロードするだけ:\n\nimport { loadFont as loadCaveat } from '@remotion/google-fonts/Caveat';\nimport { loadFont as loadKleeOne } from '@remotion/google-fonts/KleeOne';\nimport { loadFont as loadHachi } from '@remotion/google-fonts/HachiMaruPop';\n\n▼ 役割分担\n- Caveat → 英字手書き（dates, hashtags, EN副題）\n- KleeOne → 日本語やわらか毛筆（メインキャプション）\n- HachiMaruPop → 丸文字ポップ吹き出し（中央の「ついた〜」「ぶらぶら」）\n\n▼ 人間味の演出（4つだけ）\n1. washi tape: rgba(248,215,165,0.55) を1枚敷いて transform: rotate(2deg)\n2. 全要素に -2°〜+5° の微回転をランダムに振る\n3. Spring物理アニメで「ぴょこ」と着地（damping:14, stiffness:90）\n4. 強調語の下に弧型下線（borderRadius:50% rotate:-1deg）でhand-drawn感\n\nこれだけで「人が編集した感」になる。","60秒MVの章構成（参考用）:\n\nCh1 朝 / Ch2 昼 / Ch3 夕 / Ch4 夜 = 各15秒\n↓\ntitle 3s（夏のかけら）→ 15s × 4章 → reveal 5s（thanks for watching ♡）\n合計 64秒\n\nメタ告白の落としを「ぜんぶ、AIが見てた夢でした」に振ったら、急に余韻が出た。"],"media":["https://v3b.fal.media/files/b/0a97bab8/r9Gl_APme3OvNxJpPRP-8_existing_summer_mv_vlog.mp4","https://v3b.fal.media/files/b/0a97bab5/bfk7Lb95NJOtGzlFlkzfH_ch1_airport_dawn.png","https://v3b.fal.media/files/b/0a97bab6/3ItFKf7LtsXeKAit8q1jf_ch2_cobalt_beach.png","https://v3b.fal.media/files/b/0a97bab7/lFPssYIiBY4wNSOFZPITw_ch3_amber_alley.png","https://v3b.fal.media/files/b/0a97bab7/wYU_sMAHXRMBKuPgjY8FE_ch4_sparkler_night.png"],"created":"2026-04-26","posted_date":"","related_article":"","media_view":[{"kind":"video","src":"https://v3b.fal.media/files/b/0a97bab8/r9Gl_APme3OvNxJpPRP-8_existing_summer_mv_vlog.mp4","label":"r9Gl_APme3OvNxJpPRP-8_existing_summer_mv_vlog.mp4"},{"kind":"image","src":"https://v3b.fal.media/files/b/0a97bab5/bfk7Lb95NJOtGzlFlkzfH_ch1_airport_dawn.png","label":"bfk7Lb95NJOtGzlFlkzfH_ch1_airport_dawn.png"},{"kind":"image","src":"https://v3b.fal.media/files/b/0a97bab6/3ItFKf7LtsXeKAit8q1jf_ch2_cobalt_beach.png","label":"3ItFKf7LtsXeKAit8q1jf_ch2_cobalt_beach.png"},{"kind":"image","src":"https://v3b.fal.media/files/b/0a97bab7/lFPssYIiBY4wNSOFZPITw_ch3_amber_alley.png","label":"lFPssYIiBY4wNSOFZPITw_ch3_amber_alley.png"},{"kind":"image","src":"https://v3b.fal.media/files/b/0a97bab7/wYU_sMAHXRMBKuPgjY8FE_ch4_sparkler_night.png","label":"wYU_sMAHXRMBKuPgjY8FE_ch4_sparkler_night.png"}],"media_missing":false},{"id":"2026-04-26-gpt-image2-golden-week-mv","path":"10_X-Marketing/drafts/posts/2026-04-26-gpt-image2-golden-week-mv.md","title":"2026-04-26-gpt-image2-golden-week-mv","post_type":"post-drafts","status":"legacy","quality":"","body":"| # | モード | バズフック型 | 推奨配信 |\ ra glides through a dimly lit Japanese art museum, warm spotlights on wooden floors, serene atmosphere. Camera approaches Hokusai's Great Wave ukiyo-e painting in ornate gold frame. As camera crosses the frame threshold, seamless morphing transition: flat brushstrokes dissolve into volumetric 3D ocean. Massive turquoise waves crash with realistic water physics, spray catches golden hour sunlight, Mount Fuji emerges through mist. Camera continues forward, low-angle tracking shot skimming the wave surface.\n\n個人的にこれが一番映画的だった✨","③Top-View Miniature（俯瞰ジオラマ追跡）\n\nCinematic masterpiece, 8k. Extreme overhead top-down view, miniature tilt-shift diorama effect with shallow depth of field bokeh. A delicate glowing golden paper crane flies through an exquisitely detailed miniature Japanese garden. The crane soars over a tiny stone lantern, dips between red maple leaves, circles around a moss-covered rock, then glides across a crystal-clear koi pond where orange fish scatter beneath. Camera smoothly tracks the crane in continuous one-take. Warm afternoon sun creates long miniature shadows. Dust particles float in light beams.","プロンプトの品質を底上げするキーワード:\n\n・cinematic masterpiece, 8k → 全体品質の引き上げ\n・chiaroscuro lighting → ドラマチックな明暗対比\n・volumetric → 霧・光線・煙に立体感\n・golden hour → 黄金色の柔らかい光\n・ethereal glow → 幻想的な発光\n・dust particles → 空気感の演出\n・tilt-shift bokeh → ミニチュア感\n\nこれらを「カメラワーク指定」と組み合わせるのがコツ。\n3本の合計コスト: $1.05（¥158）🎬"],"media":["https://v3b.fal.media/files/b/0a94dc17/ouGunbygGu109BaEq4j6u_output.mp4","https://v3b.fal.media/files/b/0a94dc18/aT2ir9H_5zbSoST0Ytknz_output.mp4","https://v3b.fal.media/files/b/0a94dc19/wDc6SjKLFiGI1PpeMA7s4_output.mp4"],"created":"2026-04-04","posted_date":"","related_article":"","media_view":[{"kind":"video","src":"https://v3b.fal.media/files/b/0a94dc17/ouGunbygGu109BaEq4j6u_output.mp4","label":"ouGunbygGu109BaEq4j6u_output.mp4"},{"kind":"video","src":"https://v3b.fal.media/files/b/0a94dc18/aT2ir9H_5zbSoST0Ytknz_output.mp4","label":"aT2ir9H_5zbSoST0Ytknz_outpu e Trends RSS geo=JPは認証不要で生存(実測200・概算ボリューム付き)=日本トレンドの最強無料cronソース。pytrendsは2025-04アーカイブ死亡、後継はtrendspyg | 出所: Trend Radar設計調査(Web実測) | 実証度: 実機1回 | 既ノート: trend_radar_harness **[束ね待ち・score10・2026-07-10 insight-harvester 記事化枠超過]**"},{"date":"2026-07-07","text":"2026-07-07 | YouTube急上昇は2025-07廃止済でmostPopularは音楽/映画/ゲームチャート寄りに変質(1unit)。汎用velocity検知はsearch.list publishedAfter24h×viewCount順(100units)自作が定石。ニコニコSnapshot API v2は認証不要JSONで生存(RSSは26-04死亡) | 出所: Trend Radar設計調査(Web実測) | 実証度: 実機1回 | 既ノート: trend_radar_harness **[束ね待ち・score9・2026-07-10 insight-harvester 記事化枠超過]**"},{"date":"2026-07-07","text":"2026-07-07 | Thariq「Field Guide to Fable」8テクニックで棚卸→Ryoハーネスは6つ既実装、残穴は quiz-gate検収(設計Fable/実装Sonnet体制の構造弱点)とGTM未知の未知(posted=0/conversion 0行)のみ | 出所: 会話(記事分析) | 実証度: 理論 | 既ノート: Thariq_unknowns記事×Ryoシステム棚卸_2026-07-07 **[束ね待ち・score6・2026-07-10 insight-harvester X単発枠超過]**"},{"date":"2026-07-07","text":"2026-07-07 | スキル archive 台帳の候補23本中7本が 07-06 に archive 実行済みだったのに台帳は「未実行」と自称したままドリフト — 候補台帳は status 欄+実ディレクトリ weekly 突合が無いと必ず腐る (HANDOFF 肥大と同型の「台帳の腐敗」パターン) | 出所: スキル棚卸し実測 | 実証度: 実機1回 | 既ノート: トークン抑制とスケジュール自動化計画_2026-07-07 **[束ね待ち・score6・2026-07-10 insight-harvester X単発枠超過]**"},{"date":"2026-07-07","text":"2026-07-07 | 07-04記録「codex exec 恒久ハング」の原因確定 = OAuth refresh token 失効 (`already used. Please log out and sign in again`)。execはエラーを吐きながら止まらず900s timeout×2、死活チェックは応答時間でなく stderr の refresh token エラー grep が確実。修理=`codex logout && codex login` (Ryo手番)。story-critique等 codex依存レーン全部に影響中 | 出所: hyoui-eval 審査障害の切り分け | 実証度: 実機3回 | 既ノート: なし **[束ね待ち・score9・2026-07-10 insight-harvester 記事化枠超過→_product_backlog ハーネス規律クラスタで商品性は確保済]**"},{"date":"2026-07-06","text":"2026-07-06 | `claude -p` を自動化パイプラインから呼ぶ時は `--setting-sources \"\" --no-session-persistence` + vault外cwd が必須 — 無指定だと user/project hooks (Renoise通知・critique催促等) がセッション注入され、モデルが本来タスクでなくhookへの応答を返す+起動300s超に激重化。フラグ適用で15s/正常YAML (20倍改善) | 出所: voice-memo-system 検収 | 実証度: 実機3回(失敗2様態+修正確認) | 既ノート: なし **[束ね待ち・score10・2026-07-10 insight-harvester 記事化枠超過]**"},{"date":"2026-07-06","text":"2026-07-06 | ゲート系lintの落とし穴: 標準ライブラリ簡易YAMLパーサは `null` を文字列\"null\"として返し truthy 判定→G1未通過なのに vacuous PASS になる。ゲート実装は「未通過fixture」を必ずテストケースに含めること (正常系self-testだけでは検出不能だった) | 出所: product-content-funnel 検収 | 実証度: 実機1回(再現+修正確認) | 既ノート: なし **[束ね待ち・score10・2026-07-10 insight-harvester 記事化枠超過→_product_backlog ハーネス規律クラスタで商品性は確保済]**"},{"date":"2026-07-06","text":"2026-07-06 | 「AIで作れる」と「実務で回る」の差は成果物でなくゲート構造 — 可逆作業(生成/照合)はAI・不可逆判断(事実/価格/公開)は人間、を approved フラグと exit code で物理強制すると1ソース4チャネル一貫制作が回る (core_message.yaml SSOT方式) | 出所: product-content-funnel 設計 | 実証度: E2Eダミー1周 | 既ノート: なし **[束ね待ち・score9・2026-07-10 insight-harvester 記事化枠超過→_product_backlog ハーネス規律クラスタで商品性は確保済]**"},{"date":"2026-07-05","text":"2026-07-05 | [ops] kamui GPT Image 2 に「現在はスローモードです」= 低優先度キュー (slowq_ prefix の request_id、実測 最長13分待ち→正常完走) が存在 — kandaquantum 上限エラーとは別物でフォールバック不要。sub-agent はこの待ち時間で「待機宣言→ターン終了→死亡」する (5/5体再現)。処方: 「ターンを終えた瞬間に死ぬ。status ツールを間隔なしで連打せよ (30回可)」の明示指示で完走率100%に回復"},{"date":"2026-07-04","text":"2026-07-04 | オーケストレータ型サブエージェントは「子の結果待ち」で3回連続停止する一方、子の成果ファイルは死亡判定後に遅延着地していた — 対策: 親に監視させず (a)フィニッシャーは自力逐次型 (Agent tool禁止) (b)引き継ぎ前にファイルシステム実測で着地確認。winner_corpus 8本は結局全着地"},{"date":"2026-07-04","text":"2026-07-04 | [ops] cross-AI批評レーン二重障害: Codex CLI 0.125=login正常なのにexecが自明プロンプトにも90s+恒久ハング(エラーなし・要再認証or再インストール検証) / Gemini CLI=oauth_creds 2025-07-01失効でブラウザ再認証要求→非対話環境で不能。フォールバック=critique-lens(Sonnet)4並列で Phase 1.5 を代替可能と実証 (構造/商業/態度/五原則、行レベル指摘の質は十分)。教訓: 評価レーンのCLI認証は SessionStart ops-health に死活チェック追加すべき"},{"date":"2026-07-03","text":"2026-07-03 | 大衆の涙の最頻構造は「谷底の意味反転」= 状況(死/喪失)を覆さず意味づけ+光色だけでvalenceを反転 (鬼滅「心を燃やせ」/OPメリー号の感謝反転/CM反復語の方向反転がジャンル横断で同型) — reception_corpus 132生声から蒸留。記事化ポテンシャル大"},{"date":"2026-07-03","text":"2026-07-03 | [ops] hermes x_search が Grok API 403 (spending-limit) で全滅する障害モードを確認 — 検知法: 9分無応答ハング。対処: WebSearch/WebFetch (映画.com/Filmarks/知恵袋の日付付き一次レビュー) フォールバックで口コミ採掘は完遂可能"},{"date":"2026-07-03","text":"2026-07-03 | [ops] サブエージェントは長時間コマンドが自動背景化されると「通知待ち」でターンを終える癖がある (5/5体で再現) — 対策: プロンプトに「ファイル完成まで停止禁止」+死んだら SendMessage で蹴る、または最初から同期timeout明示。生声を分析前にファイル書き出しさせる順序も途中死保険として有効"},{"date":"2026-07-03","text":"2026-07-03 スキル棚卸で「参照数≠稼働」が定量化: story-critique 参照81件/実行5回、166本中34日間の実行実績があるのは十数本のみ — ドキュメント上の存在感と実働は別指標で見ないと棚卸を誤る (skill_dashboard.html) **[束ね待ち・score7・2026-07-10 insight-harvester X単発枠超過]**"},{"date":"2026-07-02","text":"2026-07-02 | 156スキル vs conversion_log 0行・deal_ledger lead 0件 — 律速は生産力でなく「値段付きask数/週」。是正はハーネス追加でなくask周辺の全自動化 (ask_kit_202607=送信ボタンだけ残す) | 出所: 敵対的vault監査の会話 | 実証度: 台帳実測 | 既ノート: マネタイズ観点_供給リッチ需要プア **[束ね待ち・score6・2026-07-10 insight-harvester X単発枠超過]**"},{"date":"2026-07-02","text":"2026-07-02 | LLM評価器は「判定」させず「属性の報告」だけさせてローカル機械比較すると誤判定が激減する (キャラQC/HEX照合) | 出所: character-consistency-critique 設計 | 実証度: 設計+KAGIUTA傍証 | 既ノート: なし **[束ね待ち・score6・2026-07-10 insight-harvester X単発枠超過]**"},{"date":"2026-07-02","text":"2026-07-02 | Windows自動化の最恐罠=.cmdのUTF-8日本語。cmd.exeはCP932固定パース(chcp 65001無効・実証)で行吸い込み→Task 5本が2週間silent死。ログすら書けない故障はexit code監視でしか見えない | 出所: ハーネス診断→修理 | 実証度: 実機再現+修理完了 | 既ノート: lessons.md 2026-07-02 **[束ね待ち・score10・2026-07-10 insight-harvester 記事化枠超過→_product_backlog ハーネス規律クラスタで商品性は確保済]**"},{"date":"2026-07-02","text":"2026-07-02 | スキルdescription(常駐context)は114本が500字超で計19万字の常駐税だった。frontmatter=索引/本文=JITの分離規律は「増えた後の監査」が必要 — Sonnet並列7体で1パス刈り込み可能 | 出所: ハーネス診断 | 実証度: 実測 | 既ノート: なし **[束ね待ち・score9・2026-07-10 insight-harvester 記事化枠超過→_product_backlog ハーネス規律クラスタで商品性は確保済]**"},{"date":"2026-07-02","text":"2026-07-02 | 自己進化執筆ループの設計則: 測定は機械(script+閾値json外部化)・解釈だけLLM・還流先を先に固定(voice-failures/winning_patterns/banger/勝ち基準)。「学習する仕組み」は生成器を増やさず既存ループに入口(コーパス)と出口(実測還流)を接続するだけで成立する | 出所: X自己進化システム構築 | 実証度: 設計+集計段は578投稿で実走 | 既ノート: なし **[束ね待ち・score9・2026-07-10 insight-harvester 記事化枠超過→_product_backlog ハーネス規律クラスタで商品性は確保済]**"}],"archived":[{"date":"2026-07-10","text":"✅ 2026-07-10 ベンチマーク解剖: 伸びてるAI映像アカウントの共通核は「シリーズ・レギュラーキャラで次を待たせる」(DUMMY CREATiON=Vegetable Village / Neural Viz=Monoverse) — 単発クオリティ勝負ではなく反復登場の設計。うちの週3本にシリーズ枠1本を新設 → 回収済 (反映済: tiktok strategy シリーズ枠新設)"},{"date":"2026-07-10","text":"✅ 2026-07-10 TikTokアルゴ深掘り: 英語圏アルゴ解説ブログの大半はAI生成ファームの循環引用 — 「初期プール200-500人」「follower-firstテスト」等の具体数値が同一文言で反復=独立検証ゼロで棄却。一次寄りソース (公式/TechCrunch/Buffer実データ) が絡む項目だけ採用する調査規律が要る → TikTok×Reels深掘り調査_定説検証と実例解剖_2026-07 → 回収済 (ノート化済: TikTok×Reels深掘り調査_定説検証と実例解剖_2026-07)"},{"date":"2026-07-10","text":"✅ 2026-07-10 TikTok市場調査: 日本は「ツール解説」より「AI作品先行+作り方チラ見せ」が規模を出す (DUMMY CREATiON TT17万/IG61万 vs 解説系数万再生帯) — X負け型「作品自慢」がTikTokでは勝ち型に反転するプラットフォーム差 → TikTok×Reels市場調査_アルゴと勝ち型_2026-07 → 回収済 (ノート化済: TikTok×Reels市場調査_アルゴと勝ち型_2026-07)"},{"date":"2026-07-10","text":"✅ 2026-07-10 動画ブラッシュアップループ実測: Gemini 2.5 Pro批評→反映で75→93点(+18)。ただしアニメ中間フレームの破綻(目玉焼き問題)は機械が見逃しPM目視stillが検出 — 解析は「代表フレーム批評」・目視は「遷移中間の破綻」と役割分担するのが正 → SNS編集演出テクニック体系_UI演出とフック設計_2026-07-10 → 回収済 (ノート化済: SNS編集演出テクニック体系_UI演出とフック設計_2026-07-10)"},{"date":"2026-07-10","text":"✅ 2026-07-10 gemini TTS Charonに「キャスターのように」指示すると実測1.5倍遅くなる+稀に中間4.6s無音の暴走 → silencedetectで検出→atrim連結+atempo1.15が安定レシピ (ambient-explainer news-trendプリセットに焼き込み済) → 回収済 (焼き込み済: ambient-explainer news-trend プリセット)"},{"date":"2026-07-10","text":"✅ 2026-07-10 ambient-explainer型 (AI背景動画+ガラスUIオーバーレイ解説) 確立 — scenario.json 1枚駆動・背景欠落でもグラデフォールバックで常時レンダ可能な設計が量産の鍵 → 回収済 (実装済: ambient-explainer スキル)"},{"date":"2026-07-10","text":"✅ 2026-07-10 テーマ独自化の勝ち筋=ジャンルごと離れる (予約実用CM→情緒プロダクトフィルム)。「下を向かせる道具が見上げさせる」型の逆説構造+実物とUI内オブジェクトの同一フレーム呼応 (月×月齢カード) は再利用可能な企画パターン → SNS編集演出テクニック体系_UI演出とフック設計_2026-07-10 → 回収済 (ノート化済: SNS編集演出テクニック体系_UI演出とフック設計_2026-07-10)"},{"date":"2026-07-10","text":"✅ 2026-07-10 kamuicode GPT Image 2のスローモード待機キューは**全エージェント共有・上限10件** (7 sub-agent並列29枚で実測)。超過分は「待機キュー上限」エラー=月間上限と別物、空き待ち再submitで回復。i2i Edit実測1.5〜6分/枚。sub-agentはキュー待ち中にidle化する→PMのSendMessage nudgeが唯一のクロック。仕組み化済み→ `article-visual-pack` スキル → 回収済 (仕組み化済: article-visual-pack スキル)"},{"date":"2026-07-10","text":"✅ 2026-07-10 Kling公式MCP無料枠の実測: 右下透かし(クロップ除去可)・同時1タスク・v3.0は6cr/s。実写プレートは「no text/no people/calm motion」指定でUI合成台として最適化できる → 詳細 SNS編集演出テクニック体系_UI演出とフック設計_2026-07-10 → 回収済 (ノート化済: SNS編集演出テクニック体系_UI演出とフック設計_2026-07-10)"},{"date":"2026-07-10","text":"✅ 2026-07-10 フォン・イン・ビデオ広告の文法=「UIは説明せず操作して見せる」(タップ→状態変化→CTAの3拍)。library ui/カテゴリ12部品+PhoneAdDemoで部品化 → SNS編集演出テクニック体系_UI演出とフック設計_2026-07-10 → 回収済 (ノート化済: SNS編集演出テクニック体系_UI演出とフック設計_2026-07-10)"},{"date":"2026-07-05","text":"✅ 2026-07-05 絵コンテ28枚量産の検収で混入バグ3型を実測 (GPT Image 2 Edit・28枚中4枚NG=14%): ①字幕焼き込み (勝手に英語字幕を描く) ②同一キャラ増殖 (ソヨ×3) ③背景に設定外の群衆。対策=全ボードプロンプトに negative 固定句「no text/subtitles, no duplicated characters, no background crowd」を標準装備 + 被写体キャラの明示列挙。リテイクは同 registry 参照で1発修正 ensemble_dna_2026-07-04 → 回収済 (ノート化済: ensemble_dna_2026-07-04)"},{"date":"2026-07-05","text":"✅ 2026-07-05 [ops] fal-file-uploader の .env パスが消滅済み旧vault (`Knowledge management/Creation/`) を指したまま9ヶ月放置 → sub-agentが自力回避していた。SKILL.md+スクリプト2本を vault直下 `.env` に修理。「メモリ>SKILL.md鮮度逆転」と同型: パス系設定は vault 移行時に grep 一括検証すべき → 回収済 (処置済: .env 修理済 (fal-file-uploader))"},{"date":"2026-07-04","text":"✅ 2026-07-04 脚本批評で法則: 「世界のルールを売りにする作品は、脚本がルールを1ヶ所破ると全信頼が崩れる」— ルール宣言型IPは機械チェック化できる項目 (持ち帰り品数/視点違反/発光回数) を脚本ごとにカウント検証すべき。ep01で「持ち帰り1つ」法則を自分で破っていた (パンくず+かけら=2品) のをlensが検出 ensemble_dna_2026-07-04 → 回収済 (ノート化済: ensemble_dna_2026-07-04)"},{"date":"2026-07-04","text":"✅ 2026-07-04 キャラ生成24案全却下で法則発見: AI臭の正体は「役割の定番×種族素材の定番」の二重定番 (丸フェルトマスコット/青い小鳥はDNA忠実なほど平均に収束)。突破口はプロンプト改良でなく素材・存在の発明 (パン生地でできた子/手紙が目を覚ました紙の子) — 素材が物語装置を兼ねる (クープ発光=無口キャラの感情表現/透ける筆跡=出自)。実証: 再設計4案×2キャラでRyo即決。記事ネタ: AIキャラデザが平均に収束する理由と素材発明プロトコル ensemble_dna_2026-07-04 → 回収済 (ノート化済: ensemble_dna_2026-07-04)"},{"date":"2026-07-04","text":"✅ 2026-07-04 初回開催コンテストは過去受賞作が無い→基準線は「隣接ジャンルの定評作 (パルクール金字塔/自治体PRバズ/音ハメ編集/AI映画祭) を横断解剖」+「審査員の実名背景から加点を逆算 (judge_profile.yaml)」で代替できる。副産物: 内部で使っていた6軸ルーブリックが公式4軸と不整合と判明 — コンテスト批評は要項原文の再確認が先 (PARKOUR実戦) → 回収済 (実装済: winner-study + judge_profile.yaml)"},{"date":"2026-07-03","text":"✅ 2026-07-03 [bug-fix] YAML 1.1でキー `no:` はブールFalseにパースされる(PyYAML) — スキーマ設計でno/yes/on/offをキー名に使わない。cut_noに改名して回避 → 回収済 (処置済: cut_no 改名で回避)"},{"date":"2026-07-03","text":"✅ 2026-07-03 「感情を動かす」は機械採点できる — 各カットにvalence×arousal座標を付与すれば運動量Σ|Δ|/反転回数/山の位置/余韻を数値検証可能(LLM=測定器・判定=スクリプト)。感情文法v1.0として理論化、閾値はqc_rubric.yamlに外部化し較正ログで自己洗練 → 回収済 (実装済: 感情文法v1.0 (qc_rubric.yaml 外部化))"},{"date":"2026-07-03","text":"✅ 2026-07-03 絵コンテの文字崩れは「画像に文字を焼き込む」設計自体が原因 — キーフレームをtext-freeスプライトで生成し文字/メタデータ/感情曲線を全部HTML側でレンダすると構造的にゼロになる(emotional-storyboard-oneshotで実装)。生成AIの弱点はプロンプトでなくアーキテクチャで回避する一般パターン → 回収済 (実装済: emotional-storyboard-oneshot)"},{"date":"2026-07-03","text":"✅ 2026-07-03 AIの絵コンテが平均点に収束するのは生成モデルが「最もありそうな次」=既視感の最大化装置だから — 対策は指示でなく工程: ①taste corpus few-shot(実際に感情が動いた実例で分布の錨) ②平均案を明示的に書いてから理由付き逸脱≥3 ③交換テスト(平均的代替に置換して死なない要素は元から平均)。X執筆のcreator_corpusと同型パターンの映像版(scene-study) → 回収済 (実装済: scene-study / taste corpus 工程)"},{"date":"2026-07-04","text":"✅ 2026-07-04 ヒットの再現性は理論でなく「較正された予測」から生まれる — 学習4レーン(理論/大衆実測/受賞作実測/Ryo体感)だけでは全て他人の作品由来で、自作での答え合わせ(事前予測→実測→乖離だけを較正信号にする)が閉じて初めて設計力になる。quant-lab事前登録ドクトリンの映像転用=hit-ledger。「提出後にprediction編集禁止」が生命線 (後付け解釈=当たった気がする、の排除) → 回収済 (実装済: hit-ledger スキル)"},{"date":"2026-07-10","text":"✅ 棄却 (score2) 2026-07-10 Fable 5を音声電話アプリで試したところ、次のやるべきことが明確になった — 数値・再現手順なしの感想レベルで棄却"},{"date":"2026-07-06","text":"✅ 棄却 (score1) 2026-07-06 Fable5で音声インターフェース対応のメモアプリを構築、期待以上にうまく動作した — 数値・再現手順なしの感想レベルで棄却"},{"date":"2026-07-10","text":"✅ 棄却 (score3) 2026-07-10 gemini CLI v0.1.3はOAuth失効でone-shotがハング(exit 124) — 外部CLI依存ゲートは生死確認→即フォールバック設計。一次性/需要レンズ弱く単発ops知見のため棄却"},{"date":"2026-07-06","text":"✅ 2026-07-06 LLM分類サブルーチンに「現在値をヒントとして渡す」と修復ループが死ぬ — ヒントは人間由来入力専用に限定、自動修復パスは常にNoneが正解 (score7・一次2/再現2/需要1/鮮度2) → X単発 multicast 3ch drafts 2026-07-10-llm-hint-loop-trap"},{"date":"2026-07-07","text":"✅ 2026-07-07 「スキルは立派なのに実装が別の道を歩く」乖離検出法=UIコードとスキル正本のツール選定を突合。96日放置の矛盾が実装照合で初めて見えた (score7・一次2/再現2/需要1/鮮度2) → X単発 multicast 3ch drafts 2026-07-10-skill-impl-drift-audit"},{"date":"2026-07-07","text":"✅ 2026-07-07 MCPセットアップ解説はコモディティ化、需要はhooks/subagent委譲/メモリ設計/権限制御へ移動。売れ筋形式は「キット+仕組み一式」(score7・一次1/再現1/需要3/鮮度2) → X単発 multicast 3ch drafts 2026-07-10-mcp-setup-commodity-shift"},{"date":"2026-07-10","text":"✅ 2026-07-10 Tips MCPは本文imageブロックの外部URLを保存時に自動でstatic.tips.jpへ再ホストする(G2・8枚実測)。有料化検出はpreviewエラー経由 (score7・一次2/再現2/需要1/鮮度2) → X単発 multicast 3ch drafts 2026-07-10-tips-mcp-image-rehost"},{"date":"2026-07-07","text":"✅ 2026-07-07 AI SFXの2026市場: Video→Foley第一=Mirelo v1.5(ブラインド優位67-77%・ゼロプロンプト鉄則)、Text→SFX第一=ElevenLabs。現場主流はV2A一次生成→T2A仕上げの二段構成 (score8・一次1/再現1/需要3/鮮度3) → X単発 multicast 3ch drafts 2026-07-10-sfx-market-mirelo-elevenlabs"},{"date":"2026-07-06","text":"✅ 2026-07-06 WSLで`python3 -m venv`をvault直下(/mnt/c drvfs)に作ると大量小ファイルI/Oが極端に遅い(pip install --upgrade pipで15分超)。`~/.venvs/<name>`+symlinkで1分未満に改善 (score11・一次3/再現3/需要3/鮮度2) → 記事化 wsl_venv_drvfs_speed_fix_2026-07-10"},{"date":"2026-07-10","text":"✅ 2026-07-10 noteの画像キャプション欄はdraft_save後の非同期正規化で消される — 正解は「正規化後body再GET→figcaption注入→再draft_save」の2段。7記事22図解で実証、ツール=note_captions2.py (score11・一次3/再現3/需要3/鮮度2) → 記事化 note_api_automation_3_traps_2026-07-10 (note draft_save知見と統合1本)"}],"beliefs":[{"date":"2026-07-04","text":"2026-07-04 | \"テーマは無言で届く設計。結末にタグラインを文字で出さない (didactic=蛇足)\" | 出所: KAGIUTA仕上げ確定判断 (タグライン「声がなくても、返事はできる。」の意図削除・retrospective_kagiuta_260704 で収穫) | 候補カテゴリ: 制作/美学 | → draft済 05_Beliefs/_drafts/テーマは無言で届く設計_didactic排除"},{"date":"2026-07-03","text":"2026-07-03 | \"本当に魅力的なアニメや映像は感情移入できて、入り込める作品、何かに共感するような作品だと思う。平均ではなく、より高みで突出した映像やストーリーを\" | 出所: 絵コンテシステム構築の対話 (ワンピース/鬼滅/VIVANT/リブートを例に) | 候補カテゴリ: 制作/美学 | → draft済 05_Beliefs/_drafts/突出した映像美学_共感より高み"},{"date":"2026-07-03","text":"2026-07-03 | \"これから本当に差がつくのは、AIに何を作らせるかではなく、AIにどう映像を理解させるかだ。Fableは単なる脚本作成ツールではなく、AIに映像の構成力や感情設計を教え込むための新しい制作パートナーになり得る\" | 出所: 同上 (scene_corpus 構想の原点) | 候補カテゴリ: 制作/AI活用 | → draft済 05_Beliefs/_drafts/AIに映像理解を教える_Fable制作パートナー論"},{"date":"2026-07-02","text":"2026-07-02 | \"どんどんQCチェックが洗練されてくる仕組みはどんどん取り入れていきたい\" | 出所: character-consistency-critique 新設直後の会話 (known_failures/tol が育つ設計への反応) | 候補カテゴリ: 制作/仕組み化 | → draft済 05_Beliefs/_drafts/QCチェック洗練を積極採用"},{"date":"2026-06-15","text":"2026-06-15 | \"「AIで作りました」自体に価値はない。生成で売るな、上流(企画→構成→制作→編集→SNS)を握って『課題解決の発注』として受注しろ。安さは武器であって売りではない\" | 出所: マネタイズ観点の対話 | 候補カテゴリ: 働き方/事業 | 拡張候補 → AI映像受託_生成で売るな上流を握れ_ドクトリン | → draft済 05_Beliefs/_drafts/AI映像受託_生成で売るな上流を握れ"},{"date":"2026-06-15","text":"2026-06-15 | \"全てのフォルダが一体となって資産形成していく仕組みにしたい。検証やチャットで出た信念・想いも貯めて資産にする\" | 出所: 本セッション | 候補カテゴリ: 働き方/知識経営 | → draft済 05_Beliefs/_drafts/知識資産形成システム_全フォルダ連動"},{"date":"","text":"\"Knowledge\""},{"date":"","text":"トリガー: 会話/検証で「自分は〜だと思う」「〜であるべき」「〜が大事」等、**価値判断・信条** が出た時"},{"date":"","text":"形式: `- [ ] {日付} | \"{Ryoの言葉の引用}\" | 出所: {どの会話/検証} | 候補カテゴリ: {仕事/制作/学び/人/働き方}`"},{"date":"","text":"解釈・脚色しない。発言(事実)だけ残す。"}],"health":null},"today_plan":{"date":"2026-07-11","week":2,"pace":{"last_posted":null,"days_gap":null,"month_actual_x":0,"month_target_x":20},"type_gap":[{"type":"rescue","target_pct":40,"actual_pct":0,"gap_pct":40},{"type":"verification","target_pct":30,"actual_pct":0,"gap_pct":30},{"type":"conversation","target_pct":15,"actual_pct":0,"gap_pct":15},{"type":"work","target_pct":15,"actual_pct":0,"gap_pct":15}],"picks":[{"kind":"article","ref":"260710_note_g2-map","title":"AIエージェント映像制作 完全地図 2026【MCPの選び方から、1本目の動画、品質が安定するまで】","channel":"note","price":1980,"score":75,"action_label":"下書きを開く","action_url":"https://note.com/ryo_873/n/n962fc39ac860/edit","reasons":["下書き承認待ち・fact-check pass(+20)","Week1計画 (遅延中): Week1計画: トレンド鮮度が落ちる前にG2公開(+45)","有料商品(¥1,980)(+10)"],"checklist":["下書きを開く","サムネ/価格を確認する","公開する","✅公開済みをタップする"],"rank":1},{"kind":"article","ref":"260710_tips_g2-map","title":"AIエージェント映像制作 完全地図 2026【MCPの選び方から、1本目の動画、品質が安定するまで】","channel":"tips","price":1980,"score":75,"action_label":"下書きを開く","action_url":"https://tips.jp/a/138608/edit","reasons":["下書き承認待ち・fact-check pass(+20)","Week1計画 (遅延中): Week1計画: トレンド鮮度が落ちる前にG2公開(+45)","有料商品(¥1,980)(+10)"],"checklist":["下書きを開く","サムネ/価格を確認する","公開する","✅公開済みをタップする"],"rank":2},{"kind":"article","ref":"260710_note_f17v2-mcp","title":"MCPは、繋いで終わりじゃない — 公式MCP時代に差がつく3つのこと","channel":"note","price":0,"score":65,"action_label":"下書きを開く","action_url":"https://note.com/ryo_873/n/ndfd87cbab8f /* ---- ローカル処理済み状態 (ryoops_acted_v1) ----
   受信箱の承認/却下/スキップをタップした瞬間にここへ書き込み、次回同期までの
   「リロードすると承認待ちに戻って見える」混乱を解消する。データ側 status が
   確定反映されたら pruneActed() で該当キーを消す (72h 経過時も同様)。 */
const ACTED_KEY='ryoops_acted_v1';
function _actedMap(){
  try{return JSON.parse(localStorage.getItem(ACTED_KEY)||'{}')}catch(e){return {}}
}
function _actedSave(map){ localStorage.setItem(ACTED_KEY, JSON.stringify(map)) }
function actedKey(kind,target,platform){ return kind+'|'+target+'|'+(platform||'') }
function isActed(kind,target,platform){ return _actedMap()[actedKey(kind,target,platform)]||null }
function setActed(kind,target,platform,action){
  const map=_actedMap();
  map[actedKey(kind,target,platform)]={action,ts:Date.now()};
  _actedSave(map);
}
/* 現在のDATA上、まだ acted 上書きが必要か (=サーバ側がまだ review 相当のまま) を判定。
   false を返したキーはサーバ確定とみなし削除する。 */
function actedStillNeeded(kind,target,platform){
  if(kind==='x_draft'){
    const d=(DATA.x_drafts||[]).find(x=>x.id===target);
    return !!(d && d.status==='review');
  }
  if(kind==='video_platform'){
    const v=(DATA.video_releases||[]).find(x=>x.slug===target);
    const info=v&&(v.platforms||{})[platform];
    return !!(info && info.status==='review');
  }
  if(kind==='article'){
    const a=(DATA.articles||[]).find(x=>x.slug===target);
    if(!a)return false;
    if(platform){
      const d=(a.deliveries||[]).find(x=>x.platform===platform);
      return !!(d && (d.status==='pending'||d.status==='drafted'));
    }
    return a.status==='review'||a.status==='draft';
  }
  return false;
}
function pruneActed(){
  const map=_actedMap();
  const now=Date.now();
  let changed=false;
  Object.keys(map).forEach(key=>{
    const entry=map[key];
    const parts=key.split('|');
    const kind=parts[0],target=parts[1],platform=parts[2];
    const tooOld=(now-(entry.ts||0))>72*3600*1000;
    if(tooOld || !actedStillNeeded(kind,target,platform)){ delete map[key]; changed=true; }
  });
  if(changed)_actedSave(map);
}

/* ---- Toast ---- */
let toastTimer=null;
function toast(msg,opts){
  const t=document.getElementById('toast');
  t.innerHTML='';
  const span=document.createElement('span');span.textContent=msg;t.appendChild(span);
  if(opts&&opts.retry){
    const b=document.createElement('button');b.textContent=opts.label||'再試行';
    b.onclick=()=>{t.classList.remove('show');opts.retry()};
    t.appendChild(b);
  }
  t.classList.add('show');
  clearTimeout(toastTimer);
  const dur=(opts&&opts.duration)?opts.duration:(opts&&opts.retry?5000:2200);
  toastTimer=setTimeout(()=>t.classList.remove('show'),dur);
}

function flashCopyBtn(btn){
  if(!btn)return;
  if(btn.dataset.origHtml==null)btn.dataset.origHtml=btn.innerHTML;
  btn.innerHTML='&#x2705;';
  clearTimeout(btn._copyFlashT);
  btn._copyFlashT=setTimeout(()=>{btn.innerHTML=btn.dataset.origHtml},1200);
}
async function copyText(text,btn){
  try{
    await navigator.clipboard.writeText(text);
    toast('コピーしました');
    flashCopyBtn(btn);
    return;
  }catch(e){}
  try{
    const ta=document.createElement('textarea');
    ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('コピーしました');
    flashCopyBtn(btn);
    return;
  }catch(e){}
  if(navigator.share){
    try{await navigator.share({text});return}catch(e){}
  }
  toast('コピーに失敗しました');
}

/* ---- Supabase write-back ---- */
const inflight=new Set();
async function sendAction(kind,target,action,extra,onOk,onFail){
  const key=kind+'|'+target+'|'+(extra&&extra.platform||'')+'|'+action;
  if(inflight.has(key))return;
  inflight.add(key);
  try{
    const body=Object.assign({kind,target,action},extra||{});
    const res=await fetch(SB_URL+'/rest/v1/mobile_actions',{
      method:'POST',
      headers:{
        'apikey':SB_ANON,'Authorization':'Bearer '+SB_ANON,
        'Content-Type':'application/json','Prefer':'return=minimal'
      },
      body:JSON.stringify(body)
    });
    if(!res.ok)throw new Error('HTTP '+res.status);
    inflight.delete(key);
    if(onOk)onOk();
  }catch(err){
    inflight.delete(key);
    toast('通信エラー：'+(err.message||'失敗'),{retry:()=>sendAction(kind,target,action,extra,onOk,onFail)});
    if(onFail)onFail();
  }
}

/* ---- Countdown ---- */
function countdown(iso){
  if(!iso)return null;
  const target=new Date(iso).getTime();
  if(isNaN(target))return null;
  const diff=target-Date.now();
  if(diff<=0)return '期限超過';
  const d=Math.floor(diff/86400000);
  const h=Math.floor((diff%86400000)/3600000);
  if(d>0)return 'あと '+d+'日 '+h+'時間';
  const m=Math.floor((diff%3600000)/60000);
  return 'あと '+h+'時間 '+m+'分';
}

function videoPlatformEntries(statusPred){
  const out=[];
  (DATA.video_releases||[]).forEach(v=>{
    Object.entries(v.platforms||{}).forEach(([p,info])=>{
      if(statusPred(info&&info.status))out.push({v,p,info});
    });

function deliveryEffectiveStatus(a,d){
  const ov=isActed('article',a.slug,d.platform||'');
  if(ov)return ov.action==='mark_posted'?'posted':'rejected';
  return d.status;
}
function inboxTotals(){
  const xReview=(DATA.x_drafts||[]).filter(d=>d.status==='review');
  const artReview=(DATA.articles||[]).filter(a=>a.status==='review');
  const vidReview=videoPlatformEntries(s=>s==='review');
  const total=xReview.length+artReview.length+vidReview.length;
  let done=0;
  xReview.forEach(d=>{ if(isActed('x_draft',d.id,''))done++ });
  artReview.forEach(a=>{
    if((a.deliveries||[]).length>1){
      const allDone=(a.deliveries||[]).every(dl=>{
        const eff=deliveryEffectiveStatus(a,dl);
        return eff==='posted'||eff==='rejected';
      });
      if(allDone)done++;
    }else if(isActed('article',a.slug,'')){ done++ }
  });
  vidReview.forEach(({v,p})=>{ if(isActed('video_platform',v.slug,p))done++ });
  return {total,done};

function renderInboxProgress(){
  const el=document.getElementById('inbox-progress');
  if(!el)return;
  const {goal,entries,dayPlan}=resolveDayPlan();
  const overall=inboxTotals();
  const goalChipsRow=renderGoalChipsHtml(goal);
  const streakRow=renderStreakRowHtml();

  if(goal===0){
    /* G=0 (全部) = v7と完全同等の文言・分岐 (回帰必須)。ヘッダ行 (目標チップ+連続日数) のみ追加 */
    if(overall.total===0){
      el.innerHTML='<div class="card prog-card">'+goalChipsRow+streakRow+
        '<div class="empty-note">&#x1F4ED; 受信箱は空です</div></div>';
      wireGoalChips(el);
      return;
    }
    if(overall.done>=overall.total){
      el.innerHTML='<div class="card prog-card">'+goalChipsRow+streakRow+
        '<div class="prog-celebrate">&#x1F389; 受信箱ゼロ！<br>'+
        '<a href="#" data-role="goq">キューを見る →</a></div></div>';
      wireGoalChips(el);
      const goq=el.querySelector('[data-role="goq"]');
      if(goq)goq.onclick=(e)=>{e.preventDefault();showView('queue')};
      return;
    }
    const pct0=Math.round(overall.done/overall.total*100);
    el.innerHTML='<div class="card prog-card">'+goalChipsRow+streakRow+
      '<div class="prog-info"><span>今日のレビュー 残り '+(overall.total-overall.done)+'件</span><span>'+overall.done+'/'+overall.total+'</span></div>'+
      '<div class="prog-track thin"><div class="prog-fill" style="width:'+pct0+'%"></div></div>'+
    '</div>';
    wireGoalChips(el);
    return;
  }

  /* G>0: コツコツモード (今日のぶん) */
  if(overall.total===0){
    el.innerHTML='<div class="card prog-card">'+goalChipsRow+streakRow+
      '<div class="empty-note">&#x1F4ED; 受信箱ゼロ！</div></div>';
    wireGoalChips(el);
    return;
  }
  const {total,done}=dayPlanProgress(entries,dayPlan);
  const selectableAll=entries.filter(e=>!e.acted&&!e.viewOnly&&!e.snoozed);
  const inSetKeys=new Set((dayPlan&&dayPlan.keys)||[]);
  const outsideCount=selectableAll.filter(e=>!inSetKeys.has(e.key)).length;

  if(total===0||done>=total){
    const info=computeStreakInfo();
    el.innerHTML='<div class="card prog-card">'+goalChipsRow+streakRow+
      '<div class="prog-celebrate">&#x1F389; 今日のぶん完了！ ('+info.todayDone+'件処理・連続'+info.streak+'日)</div>'+
      '<div style="text-align:center;font-size:11px;color:var(--sub);margin-bottom:10px">今週合計 '+info.weekTotal+'件</div>'+
      (outsideCount>0?'<div class="btn-row"><button class="btn ghost wide" data-role="more">&#xFF0B; もう'+getGoal()+'件</button></div>':'')+
      '<div style="text-align:center;margin-top:8px"><a href="#" data-role="goq" style="font-size:12px">キューを見る →</a></div>'+
    '</div>';
    wireGoalChips(el);
    const moreBtn=el.querySelector('[data-role="more"]');
    if(moreBtn)moreBtn.onclick=()=>{ addMoreBatch(); };
    const goq=el.querySelector('[data-role="goq"]');
    if(goq)goq.onclick=(e)=>{e.preventDefault();showView('queue')};
    return;
  }

  const pct=Math.round(done/total*100);
  el.innerHTML='<div class="card prog-card">'+goalChipsRow+streakRow+
    '<div class="prog-info"><span>今日のぶん '+done+'/'+total+'</span></div>'+
    '<div class="prog-track thin"><div class="prog-fill" style="width:'+pct+'%"></div></div>'+
    (outsideCount>0?'<div class="prog-num">ほか'+outsideCount+'件は今日のぶんに入れていません</div>':'')+
  '</div>';
  wireGoalChips(el);
}

/* ---- 受信箱カード一覧の構築 (優先順位: X review desc → 記事review → X記事ネイティブ下書き → 動画review) ---- */
function buildInboxEntries(){
  const entries=[];
  const xs=(DATA.x_drafts||[]).filter(d=>d.status==='review')
    .slice().sort((a,b)=>String(b.created||'').localeCompare(String(a.created||'')));
  xs.forEach(d=>{
    const key=actedKey('x_draft',d.id,'');
    const ov=isActed('x_draft',d.id,'');
    entries.push({
      filterKind:'x', key, acted:!!ov, snoozed:isSnoozed(key),
      doneLabel: ov?(ov.action==='approve'?'承認済み':'却下済み'):null,
      title:(d.body||d.title||'').slice(0,40),
      build:()=>xReviewCard(d)
    });
  });
  const arts=(DATA.articles||[]).filter(a=>a.status==='review');
  arts.forEach(a=>{
    const key=actedKey('article',a.slug,'');
    const multi=(a.deliveries||[]).length>1;
    let acted=false, doneLabel=null;
    if(multi){
      acted=(a.deliveries||[]).every(dl=>{const eff=deliveryEffectiveStatus(a,dl);return eff==='posted'||eff==='rejected'});
      if(acted)doneLabel='全プラットフォーム処理済み';
    }else{
      const ov=isActed('article',a.slug,'');
      acted=!!ov;
      if(ov)doneLabel=ov.action==='mark_posted'?'投稿済み':'差し戻し済み';
    }
    entries.push({filterKind:'article',key,acted,snoozed:isSnoozed(key),doneLabel,title:a.title||a.slug,build:()=>articleReviewCard(a)});
  });
  const xNative=(DATA.articles||[]).filter(a=>a.status==='draft');
  xNative.forEach(a=>{
    entries.push({filterKind:'article',acted:false,snoozed:false,doneLabel:null,viewOnly:true,title:a.title||a.slug,build:()=>articleReviewCard(a)});
  });
  const vids=videoPlatformEntries(s=>s==='review');
  vids.forEach(({v,p,info})=>{
    const key=actedKey('video_platform',v.slug,p);
    const ov=isActed('video_platform',v.slug,p);
    entries.push({
      filterKind:'video', key, acted:!!ov, snoozed:isSnoozed(key),
      doneLabel: ov?(ov.action==='approve'?'承認済み':'スキップ済み'):null,
      title:(v.title||v.slug)+' ('+(PLAT_LABEL[p]||p)+')',
      build:()=>videoPlatCard(v,p,info)
    });
  });
  return entries;
}

/* ================= コツコツモード: 今日のぶん (daily set) ================= */
/* 日次セット ryoops_dayplan_v1 = {date, keys:[actedKey形式...], batches}。
   date≠TODAY なら破棄して再選定。G=0 (全部) の時はセット自体を使わない (v7と完全同等)。
   例外: today_plan.picks[0] が記事でreview中ならセット先頭に固定 (今日の一手と矛盾させない)。 */
function buildFreshDayPlan(g,entries){
  const selectable=entries.filter(e=>!e.acted&&!e.viewOnly&&!e.snoozed);
  const keys=[];
  const tp=DATA.today_plan;
  const heroPick=(tp&&Array.isArray(tp.picks))?tp.picks[0]:null;
  let heroKey=null;
  if(heroPick&&heroPick.kind==='article'&&heroPick.ref){
    const wanted=actedKey('article',heroPick.ref,'');
    if(selectable.some(e=>e.key===wanted))heroKey=wanted;
  }
  if(heroKey)keys.push(heroKey);
  for(const e of selectable){
    if(keys.length>=g)break;
    if(e.key===heroKey)continue;
    keys.push(e.key);
  }
  return {date:TODAY,keys,batches:1};
}
/* G/セット/entries を1回に解決する共通入口。localStorage 例外時は G=0 相当 (v7全表示) にフォールバック。 */
function resolveDayPlan(){
  const entries=buildInboxEntries();
  try{
    const g=getGoal();
    if(g===0)return {goal:0,entries,dayPlan:null};
    let dp=null;
    try{ const raw=localStorage.getItem('ryoops_dayplan_v1'); dp=raw?JSON.parse(raw):null; }catch(e){ dp=null; }
    if(!dp||typeof dp!=='object'||dp.date!==TODAY||!Array.isArray(dp.keys)){
      dp=buildFreshDayPlan(g,entries);
      try{ localStorage.setItem('ryoops_dayplan_v1',JSON.stringify(dp)); }catch(e){}
    }
    /* データ同期でセット内アイテムが消滅した(status確定)分は除去・補充しない (自然減=ラッキー扱い) */
    const byKey={};
    entries.forEach(e=>{ if(e.key)byKey[e.key]=e; });
    const keptKeys=dp.keys.filter(k=>byKey[k]);
    if(keptKeys.length!==dp.keys.length){
      dp=Object.assign({},dp,{keys:keptKeys});
      try{ localStorage.setItem('ryoops_dayplan_v1',JSON.stringify(dp)); }catch(e){}
    }
    return {goal:g,entries,dayPlan:dp};
  }catch(e){
    console.error('resolveDayPlan failed, falling back to G=0',e);
    return {goal:0,entries,dayPlan:null};
  }
}
function dayPlanProgress(entries,dayPlan){
  const dp=dayPlan||{keys:[]};
  const byKey={};
  entries.forEach(e=>{ if(e.key)byKey[e.key]=e; });
  let done=0;
  dp.keys.forEach(k=>{ const e=byKey[k]; if(e&&e.acted)done++; });
  return {total:dp.keys.length,done};
}
/* snooze専用: セットから対象keyを外し、次の未選定候補を1件補充 (「＋もう3件」とは別動線・自然減とも別) */
function removeKeyFromDayPlanAndBackfill(key){
  try{
    let dp=null;
    try{ dp=JSON.parse(localStorage.getItem('ryoops_dayplan_v1')||'null'); }catch(e){ dp=null; }
    if(!dp||dp.date!==TODAY||!Array.isArray(dp.keys))return;
    const idx=dp.keys.indexOf(key);
    if(idx===-1)return;
    dp.keys.splice(idx,1);
    const entries=buildInboxEntries();
    const already=new Set(dp.keys);
    const candidate=entries.find(e=>e.key&&!e.acted&&!e.viewOnly&&!e.snoozed&&!already.has(e.key));
    if(candidate)dp.keys.push(candidate.key);
    localStorage.setItem('ryoops_dayplan_v1',JSON.stringify(dp));
  }catch(e){}
}
function addMoreBatch(){
  try{
    const g=getGoal();
    if(g<=0)return;
    let dp=null;
    try{ dp=JSON.parse(localStorage.getItem('ryoops_dayplan_v1')||'null'); }catch(e){ dp=null; }
    if(!dp||dp.date!==TODAY||!Array.isArray(dp.keys))return;
    const entries=buildInboxEntries();
    const already=new Set(dp.keys);
    const selectable=entries.filter(e=>e.key&&!e.acted&&!e.viewOnly&&!e.snoozed&&!already.has(e.key));
    dp.keys=dp.keys.concat(selectable.slice(0,g).map(e=>e.key));
    dp.batches=(dp.batches||1)+1;
    localStorage.setItem('ryoops_dayplan_v1',JSON.stringify(dp));
  }catch(e){}
  refreshInboxUI();
}
function refreshInboxUI(){
  renderInboxProgress();
  renderInboxCards();
  updateNavBadges();
}

/* ---- 積み重ね (ryoops_hist_v1 = {'YYYY-MM-DD':{done,goal,met}}・31日超はprune) ---- */
function bumpStreakHistory(){
  try{
    const hist=JSON.parse(localStorage.getItem('ryoops_hist_v1')||'{}');
    const g=getGoal();
    const cur=hist[TODAY]||{done:0,goal:g,met:false};
    cur.done=(cur.done||0)+1;
    cur.goal=g;
    cur.met = g>0 ? cur.done>=g : cur.done>0;
    hist[TODAY]=cur;
    const cutoff=new Date(new Date(TODAY+'T00:00:00').getTime()-31*86400000);
    Object.keys(hist).forEach(k=>{
      const kd=new Date(k+'T00:00:00');
      if(isNaN(kd.getTime())||kd<cutoff)delete hist[k];
    });
    localStorage.setItem('ryoops_hist_v1',JSON.stringify(hist));
  }catch(e){}
}
function computeStreakInfo(){
  try{
    const hist=JSON.parse(localStorage.getItem('ryoops_hist_v1')||'{}');
    const todayEntry=hist[TODAY]||{done:0,goal:getGoal(),met:false};
    let streak=0;
    let cursor=new Date(TODAY+'T00:00:00');
    if(!todayEntry.met)cursor=new Date(cursor.getTime()-86400000);
    while(true){
      const y=cursor.getFullYear(),m=String(cursor.getMonth()+1).padStart(2,'0'),d=String(cursor.getDate()).padStart(2,'0');
      const e=hist[y+'-'+m+'-'+d];
      if(e&&e.met){ streak++; cursor=new Date(cursor.getTime()-86400000); }
      else break;
    }
    const dots=[];
    let weekTotal=0;
    for(let i=6;i>=0;i--){
      const dcur=new Date(new Date(TODAY+'T00:00:00').getTime()-i*86400000);
      const y=dcur.getFullYear(),m=String(dcur.getMonth()+1).padStart(2,'0'),d=String(dcur.getDate()).padStart(2,'0');
      const e=hist[y+'-'+m+'-'+d];
      dots.push(e?(e.met?'met':(e.done>0?'some':'none')):'none');
      if(e)weekTotal+=(e.done||0);
    }
    return {streak,todayDone:todayEntry.done||0,todayMet:!!todayEntry.met,dots,weekTotal};
  }catch(e){
    return {streak:0,todayDone:0,todayMet:false,dots:['none','none','none','none','none','none','none'],weekTotal:0};
  }
}

function renderInboxFilterChips(total,counts){
  const el=document.getElementById('inbox-filter-chips');
  if(!el)return;
  el.innerHTML='';
  const defs=[['all','すべて',total],['x','&#x1D54F; 投稿',counts.x],['article','&#x1F4F0; 記事',counts.article],['video','&#x1F3AC; 動画',counts.video]];
  defs.forEach(([k,label,n])=>{
    const b=document.createElement('button');b.className='chip'+(curInboxFilter===k?' on':'');
    b.innerHTML=label+' ('+n+')';
    b.onclick=()=>{curInboxFilter=k;renderInboxCards()};
    el.appendChild(b);
  });
}

function renderInboxCards(){
  const {goal,entries,dayPlan}=resolveDayPlan();
  /* viewOnly (X記事ネイティブ下書き・actionable=false) は要対応件数に含めず折りたたみ別枠へ —
     進捗バー/navバッジ (inboxTotals/dayPlanProgress) との件数一致を保つ。
     snoozed (⏭あとで) は復帰日まで完全非表示 (却下と誤認させない=処理済みにも入れない)。 */
  let visible=entries.filter(e=>!e.acted&&!e.viewOnly&&!e.snoozed);
  const viewOnly=entries.filter(e=>e.viewOnly);
  const chipsEl=document.getElementById('inbox-filter-chips');

  if(goal>0){
    /* コツコツモード: セット外は描画しない・フィルタ行も非表示 (3枚にフィルタは不要=画面を減らす) */
    const inSet=new Set((dayPlan&&dayPlan.keys)||[]);
    visible=visible.filter(e=>inSet.has(e.key));
    if(chipsEl){ chipsEl.classList.add('hidden'); chipsEl.innerHTML=''; }
  }else{
    if(chipsEl)chipsEl.classList.remove('hidden');
    const counts={x:0,article:0,video:0};
    visible.forEach(e=>counts[e.filterKind]++);
    renderInboxFilterChips(visible.length,counts);
  }

  const root=document.getElementById('inbox-cards');
  if(!root)return;
  root.innerHTML='';
  const filtered = goal===0
    ? visible.filter(e=>curInboxFilter==='all'||e.filterKind===curInboxFilter)
    : visible;
  if(!filtered.length){
    const msg=visible.length?'このフィルタの項目はありません':'受信箱は空です';
    root.innerHTML='<div class="card"><div class="empty-note">'+esc(msg)+'</div></div>';
  }else{
    filtered.forEach(e=>root.appendChild(e.build()));
  }
  if(viewOnly.length&&(goal>0||curInboxFilter==='all'||curInboxFilter==='article')){
    const det=document.createElement('details');det.className='card';
    det.innerHTML='<summary class="proc-summary">&#x1F4C4; X記事ネイティブ下書き (閲覧のみ) <span class="cnt">'+viewOnly.length+'件</span></summary>';
    const body=document.createElement('div');body.style.marginTop='10px';
    viewOnly.forEach(e=>body.appendChild(e.build()));
    det.appendChild(body);
    root.appendChild(det);
  }
  renderInboxProcessed(entries.filter(e=>e.acted));
}

/* ---- 受信箱アクション後の挙動: 縮退→再描画→次カードへauto-scroll ---- */
function doInboxAction(kind,target,action,platform,cardEl,extra){
  const btnRow=cardEl&&cardEl.querySelector('.btn-row');
  if(btnRow)btnRow.querySelectorAll('button,a').forEach(b=>b.disabled=true);
  sendAction(kind,target,action,extra||{},()=>{
    setActed(kind,target,platform||'',action);
    afterInboxAction(cardEl);
  },()=>{ if(btnRow)btnRow.querySelectorAll('button,a').forEach(b=>b.disabled=false) });
}
function afterInboxAction(cardEl){
  bumpStreakHistory();
  if(cardEl)cardEl.classList.add('acted-collapse');
  if(navigator.vibrate)navigator.vibrate(10);
  setTimeout(()=>{
    refreshInboxUI();
    scrollToNextPendingCard();
  },260);
}
function scrollToNextPendingCard(){
  const root=document.getElementById('inbox-cards');
  const first=root&&root.querySelector('.card,.post-row');
  if(first)first.scrollIntoView({behavior:'smooth',block:'start'});
}

/* ---- ⏭あとで (snooze) — 罪悪感なしの先送り。Supabase送信なし・完全ローカル ---- */
function snoozeBtnHtml(){
  return '<button class="btn ghost" data-role="snooze">&#x23ED;&#xFE0F; あとで (明日出す)</button>';
}
function wireSnoozeButton(card,entryKey){
  const btn=card&&card.querySelector('[data-role="snooze"]');
  if(!btn)return;
  btn.onclick=()=>doSnoozeAction(entryKey,card);
}
function doSnoozeAction(key,cardEl){
  snoozeEntry(key);
  if(getGoal()>0)removeKeyFromDayPlanAndBackfill(key);
  if(cardEl)cardEl.classList.add('acted-collapse');
  if(navigator.vibrate)navigator.vibrate(10);
  toast('明日また出します');
  setTimeout(()=>{
    refreshInboxUI();
    scrollToNextPendingCard();
  },260);
}

/* ================= X下書きカード ================= */
function draftFullText(d){
  let t=d.body||'';
  (d.thread||[]).forEach((r,i)=>{t+='\n\n---リプ'+(i+1)+'---\n\n'+r});
  return t;
}
function mediaViewBlock(d){
  if(Array.isArray(d.media_view)){
    let html='';
    const items=d.media_view.filter(m=>m&&typeof m==='object'&&m.src);
    if(items.length){
      html+='<div class="media-view-row">'+items.map(m=>{
        const src=m.src||'';
        if(m.kind==='video'){
          return '<a class="mv-item mv-video" href="'+esc(src)+'" target="_blank" rel="noopener">&#x1F3AC; '+esc(m.label||'動画')+'</a>';
        }
        return '<a class="mv-item mv-image" href="'+esc(src)+'" target="_blank" rel="noopener"><img src="'+esc(src)+'" loading="lazy" alt="'+esc(m.label||'')+'"></a>';
      }).join('')+'</div>';
    }
    if(d.media_missing){
      html='<div class="media-warn">&#x26A0;&#xFE0F; 画像/動画 未添付 (添付必須)</div>'+html;
    }
    return html;
  }
  if(d.media&&d.media.length){
    return '<div class="media-row">'+d.media.map(m=>'<img src="'+esc(m)+'" loading="lazy">').join('')+'</div>';
  }
  return '';
}
function threadBlockHtml(thread){
  if(!thread||!thread.length)return '';
  return '<div class="dcard-thread">'+thread.map((r,i)=>
    '<div class="thread-item">'+
      '<div class="tlabel-row"><span class="tlabel">リプ'+(i+1)+'</span>'+
      '<button class="btn copy small" data-reply="'+i+'">&#x1F4CB; リプ'+(i+1)+'</button></div>'+
      '<div class="dcard-body">'+esc(r)+'</div>'+
    '</div>').join('')+'</div>';
}
function wireThreadCopy(root,thread,stopProp){
  root.querySelectorAll('[data-reply]').forEach(btn=>{
    const i=Number(btn.dataset.reply);
    btn.onclick=(e)=>{if(stopProp)e.stopPropagation();copyText((thread&&thread[i])||'',e.currentTarget)};
  });
}

      '<div class="btn-row">'+

        '</div>':'')+
    '</div>';
  row.querySelector('.pr-head').onclick=()=>row.classList.toggle('open');
  row.querySelector('[data-role="c"]').onclick=(e)=>{e.stopPropagation();copyText(d.body||'',e.currentTarget)};
  wireThreadCopy(row,d.thread,true);
  row.querySelector('[data-role="d"]').onclick=(e)=>{e.stopPropagation();requestPlatformDrafts(d,e.target)};

/* ================= 動画カード (プラットフォーム横断) ================= */
function videoPlatCard(v,p,info){
  const card=document.createElement('div');card.className='card kvideo';
  const durTxt=v.duration_s?Math.round(v.duration_s)+'s':'';
  card.innerHTML=
    '<div class="vcard">'+
      (v.thumb?'<img class="thumb" src="'+esc(v.thumb)+'" loading="lazy">':'<div class="thumb"></div>')+
      '<div class="vcard-main">'+
        '<div class="slug">'+esc(v.title||v.slug||'')+'</div>'+
        '<div class="meta">'+esc(durTxt)+(v.created?' &middot; '+esc(v.created):'')+'</div>'+
      '</div>'+
      '<div class="vcard-badges">'+
        '<span class="plat-pill">'+(PLAT_ICON[p]||'')+' '+esc(PLAT_LABEL[p]||p)+'</span>'+
        '<span class="pill '+pillClass(info.status)+'">'+esc(statusLabel(info.status))+'</span>'+
      '</div>'+
    '</div>';
  if(info.caption){
    const capHead=document.createElement('div');capHead.className='plat-head';
    capHead.innerHTML='<span class="plat-name">キャプション</span><span class="plat-status">&#x25BE; タップで表示</span>';
    const cap=document.createElement('div');cap.className='plat-cap';cap.textContent=info.caption;
    capHead.onclick=()=>cap.classList.toggle('open');
    card.appendChild(capHead);card.appendChild(cap);
  }
  const btns=document.createElement('div');btns.className='btn-row';
  if(info.status==='review'){
    btns.innerHTML='<button class="btn approve" data-role="a">&#x2705; 承認</button>'+
      '<button class="btn reject" data-role="r">&#x23ED;&#xFE0F; スキップ</button>'+
      '<button class="btn copy" data-role="c">&#x1F4CB;</button>';
    btns.querySelector('[data-role="a"]').onclick=()=>doInboxAction('video_platform',v.slug,'approve',p,card,{platform:p});
    btns.querySelector('[data-role="r"]').onclick=()=>doInboxAction('video_platform',v.slug,'reject',p,card,{platform:p});
    btns.querySelector('[data-role="c"]').onclick=()=>copyText(info.caption||'');
    card.appendChild(btns);
    const snoozeRow=document.createElement('div');snoozeRow.className='btn-row';snoozeRow.style.marginTop='8px';
    snoozeRow.innerHTML=snoozeBtnHtml();
    card.appendChild(snoozeRow);
    wireSnoozeButton(card,actedKey('video_platform',v.slug,p));
  }else if(info.status==='sent_to_inbox'){
    const hot=document.createElement('div');hot.className='tiktok-hot';
    hot.innerHTML='<div class="hh">'+esc(PLAT_LABEL[p]||p)+'アプリで公開待ち</div>'+
      '<div class="btn-row"><button class="btn wide" data-role="rec">&#x1F517; 投稿URLを記録</button></div>';
    hot.querySelector('[data-role="rec"]').onclick=(e)=>{
      const url=prompt(p+'の投稿URLを入力してください');
      if(!url)return;
      e.target.disabled=true;
      sendAction('video_platform',v.slug,'mark_posted',{platform:p,note:url},()=>{
        hot.innerHTML='<div class="status-note">記録しました（次回同期で反映）</div>';
      },()=>{e.target.disabled=false});
    };
    card.appendChild(hot);
  }else if(info.caption){
    btns.innerHTML='<button class="btn copy" data-role="c" style="flex:1">&#x1F4CB; キャプションをコピー</button>';
    btns.querySelector('[data-role="c"]').onclick=()=>copyText(info.caption||'');
    card.appendChild(btns);
  }
  /* 本文+動画URLが揃っているカード (例: DAILY AI TREND) 用の再生+コピー+X投稿導線 */
  if(info.body&&v.video_url){
    const mediaRow=document.createElement('div');mediaRow.className='btn-row';mediaRow.style.flexWrap='wrap';
    mediaRow.innerHTML=
      '<button class="btn copy" data-role="bc">&#x1F4CB; 本文コピー</button>'+
      '<a class="btn ghost" data-role="xi" target="_blank" rel="noopener">&#x1D54F; 投稿画面へ</a>'+
      '<a class="btn ghost" href="'+esc(v.video_url)+'" target="_blank" rel="noopener">&#x2B07;&#xFE0F;</a>';
    mediaRow.querySelector('[data-role="bc"]').onclick=()=>copyText(info.body||'');
    mediaRow.querySelector('[data-role="xi"]').href='https://x.com/intent/post?text='+encodeURIComponent(info.body||'');
    card.appendChild(mediaRow);
    const vid=document.createElement('video');
    vid.controls=true;vid.playsInline=true;vid.preload='none';
    if(v.thumb)vid.poster=v.thumb;
    vid.src=v.video_url;
    vid.style.cssText='width:100%;border-radius:12px;margin-top:8px;display:block';
    card.appendChild(vid);
  }
  return card;
}

/* ================= キュー ================= */
let curQueueHistFilter='all';

function renderQueue(){
  renderQueueOnetap();
  renderQueueDrafts();
  renderQueueHistory();
}
function renderQueueOnetap(){
  const root=document.getElementById('queue-onetap');
  if(!root)return;
  root.innerHTML='';
  const xs=(DATA.x_drafts||[]).filter(d=>['approved','queued'].includes(d.status));
  const vids=videoPlatformEntries(s=>s==='sent_to_inbox');
  if(!xs.length && !vids.length){
    root.innerHTML='<div class="card"><div class="empty-note">ワンタップ待ちはありません</div></div>';
    return;
  }
  xs.forEach(d=>root.appendChild(xPostRow(d)));
  vids.forEach(({v,p,info})=>root.appendChild(videoPlatCard(v,p,info)));
}
function renderQueueDrafts(){
  const root=document.getElementById('queue-drafts');
  if(!root)return;
  root.innerHTML='';
  const ds=(DATA.x_drafts||[]).filter(d=>d.status==='draft');
  if(!ds.length){ root.innerHTML='<div class="card"><div class="empty-note">下書きはありません</div></div>'; return }
  ds.forEach(d=>root.appendChild(xPostRow(d)));
}
function queueHistoryItems(){
  const items=[];
  (DATA.x_drafts||[]).filter(d=>['posted','archived','legacy','rejected'].includes(d.status)).forEach(d=>{
    items.push({kind:'x', date:d.posted_date||d.created||'', build:()=>xPostRow(d)});
  });
  (DATA.articles||[]).filter(a=>a.status==='posted'||a.status==='rejected').forEach(a=>{
    items.push({kind:'article', date:a.posted_date||a.created||'', build:()=>articleDoneRow(a)});
  });
  (DATA.articles||[]).filter(a=>a.status==='factory_wip').forEach(a=>{
    items.push({kind:'article', date:a.created||'', build:()=>articleWipRow(a)});
  });
  videoPlatformEntries(s=>s==='posted').forEach(({v,p,info})=>{
    items.push({kind:'video', date:v.created||'', build:()=>videoPlatCard(v,p,info)});
  });
  return items;
}
function renderQueueHistory(){
  const chipsEl=document.getElementById('queue-hist-chips');
  const items=queueHistoryItems();
  const counts={x:0,article:0,video:0};
  items.forEach(it=>counts[it.kind]++);
  if(chipsEl){
    chipsEl.innerHTML='';
    [['all','すべて',items.length],['x','&#x1D54F;',counts.x],['article','記事',counts.article],['video','動画',counts.video]].forEach(([k,l,n])=>{
      const b=document.createElement('button');b.className='chip'+(curQueueHistFilter===k?' on':'');
      b.innerHTML=l+' ('+n+')';
      b.onclick=()=>{curQueueHistFilter=k;renderQueueHistory()};
      chipsEl.appendChild(b);
    });
  }
  const root=document.getElementById('queue-history');
  if(!root)return;
  root.innerHTML='';
  const filtered=items.filter(it=>curQueueHistFilter==='all'||it.kind===curQueueHistFilter);
  if(!filtered.length){ root.innerHTML='<div class="card"><div class="empty-note">履歴はありません</div></div>'; return }
  const groups={};
  filtered.forEach(it=>{(groups[it.date||'日付不明']=groups[it.date||'日付不明']||[]).push(it)});
  Object.keys(groups).sort().reverse().forEach(date=>{
    const h=document.createElement('div');h.className='date-h';
    h.innerHTML='<span>'+esc(date)+'</span><span>'+groups[date].length+'件</span>';
    root.appendChild(h);
    groups[date].forEach(it=>root.appendChild(it.build()));
  });
}

/* ================= 戦略 (content_plan.yaml ミラー + 型配分) ================= */
const STRATEGY_STATUS_LABEL={done:'完了',pending:'未着手',skipped:'スキップ'};
function strategyStatusLabel(s){return STRATEGY_STATUS_LABEL[s]||s||''}

function renderStrategyItem(item,delayed){
  const row=document.createElement('div');
  const status=item.status||'pending';
  row.className='st-item status-'+status+(delayed?' is-delayed':'');
  row.dataset.stId=item.id||'';
  const tags=[];
  if(item.channel)tags.push('<span class="hero-chan">'+esc(item.channel)+'</span>');
  if(typeof item.price==='number'&&item.price>0)tags.push('<span class="hero-price">'+fmtYen(item.price)+'</span>');
  if(delayed)tags.push('<span class="st-chip delayed">&#x23F0; 遅延</span>');
  if(item.needs_ryo)tags.push('<span class="st-chip needs-ryo">&#x26D4; '+esc(item.needs_ryo)+'</span>');
  if(item.link)tags.push('<button class="btn ghost small" data-role="link">&#x1F517; 開く</button>');
  row.innerHTML=
    '<div class="st-head"><div class="st-what">'+esc(item.what||'(無題)')+'</div>'+
    '<span class="st-chip '+esc(status)+'">'+esc(strategyStatusLabel(status))+'</span></div>'+
    (tags.length?'<div class="st-tags">'+tags.join('')+'</div>':'')+
    (item.why?'<div class="st-why">'+esc(item.why)+'</div>':'');
  const linkBtn=row.querySelector('[data-role="link"]');
  if(linkBtn){
    const url=item.link;
    linkBtn.onclick=(e)=>{e.stopPropagation();window.open(url,'_blank','noopener')};
  }
  return row;
}
function renderStrategyWeek(week,isCurrent,currentWeekNum){
  const items=Array.isArray(week.items)?week.items:[];
  const body=document.createElement('div');body.className='week-items';
  if(!items.length){
    body.innerHTML='<div class="empty-note">アイテムなし</div>';
  }else{
    items.forEach(item=>{
      const delayed=(typeof week.week==='number'&&typeof currentWeekNum==='number'&&
        week.week<currentWeekNum&&item.status==='pending');
      body.appendChild(renderStrategyItem(item,delayed));
    });
  }
  const wkLabel='Week'+esc(String(week.week!=null?week.week:'?'));
  if(isCurrent){
    const wrap=document.createElement('div');wrap.className='card week-card-cur';
    wrap.innerHTML='<div class="week-h"><span>'+wkLabel+' (今週)</span><span class="wk-range">'+esc(week.date_range||'')+'</span></div>';
    wrap.appendChild(body);
    return wrap;
  }
  const det=document.createElement('details');det.className='card week-card';
  det.innerHTML='<summary><span>'+wkLabel+'</span><span class="wk-range">'+esc(week.date_range||'')+'</span></summary>';
  det.appendChild(body);
  return det;
}
function renderPriorityLanes(pl){
  if(!pl||!Array.isArray(pl.lanes)||!pl.lanes.length)return null;
