<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
<title>Ryo Ops</title>
<meta name="description" content="Ryo Ops — 総合戦略司令室。今日の一手から戦略・売上まで、迷わず意思決定するためのモバイル司令塔。">
<meta name="theme-color" content="#0b0d12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ryo Ops">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{--bg:#0b0d12;--card:#151821;--card2:#1b1f2b;--bd:#262b38;--tx:#e8eaf0;--sub:#8b91a3;
--accent:#5b7cfa;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--radius:16px;
--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
-webkit-font-smoothing:antialiased}
a{color:var(--accent)}
button{font-family:inherit;cursor:pointer;-webkit-appearance:none;appearance:none;border:none;background:none;color:inherit}
.hidden{display:none!important}

/* Lock */
#lock{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;
justify-content:center;gap:14px;padding:24px;z-index:200;transition:opacity .25s}
#lock.off{opacity:0;pointer-events:none}
.lock-icon{font-size:44px}
#lock h2{margin:0;font-size:18px;font-weight:700}
#lock input{width:100%;max-width:280px;padding:14px 16px;border-radius:12px;border:1px solid var(--bd);
background:var(--card);color:var(--tx);font-size:16px;text-align:center}
#lock button.go{width:100%;max-width:280px;padding:14px;border-radius:12px;background:var(--accent);
color:#fff;font-weight:700;font-size:15px;min-height:44px}
.lock-err{color:var(--red);font-size:13px;min-height:18px}

/* App shell */
#app{display:none;padding-top:calc(14px + var(--safe-t));padding-bottom:calc(84px + var(--safe-b));min-height:100vh}
#app.on{display:block}
.wrap{padding:0 14px}
.top{display:flex;align-items:center;justify-content:space-between;padding:0 14px 14px}
.top h1{font-size:19px;margin:0;font-weight:800;letter-spacing:.2px}
.top small{color:var(--sub);font-size:11px}
.top-sub{font-size:11px;color:var(--sub);font-weight:600;margin-top:2px}

.view{display:none}
.view.on{display:block}

/* Cards */
.card{background:var(--card);border:1px solid var(--bd);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.card.dim{opacity:.45}
.sec-h{font-size:12px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.6px;
margin:18px 0 8px;display:flex;align-items:center;justify-content:space-between;gap:6px}
.sec-h:first-child{margin-top:0}
.sec-h .cnt{font-weight:700;color:var(--sub);font-size:11px}
.empty-note{color:var(--sub);text-align:center;padding:30px 14px;font-size:13px}

/* Today: big tiles */
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.tile{background:var(--card);border:1px solid var(--bd);border-radius:var(--radius);padding:18px 14px;
text-align:center;min-height:88px;display:flex;flex-direction:column;justify-content:center;gap:4px}
.tile .n{font-size:32px;font-weight:800;line-height:1}
.tile .n.zero{color:var(--sub)}
.tile .n.hot{color:var(--amber)}
.tile .l{font-size:12px;color:var(--sub);font-weight:600}

/* Today: 今日の一手 (today_plan) */
.today-pace{font-size:12px;color:var(--sub);font-weight:700;text-align:center;margin:0 2px 10px}
.today-pace.hot{color:var(--red)}
.today-hero{border:1px solid var(--accent);box-shadow:0 0 0 1px rgba(91,124,250,.15)}
.hero-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.hero-chan{font-size:11px;font-weight:800;color:var(--sub);background:var(--card2);border-radius:999px;padding:3px 9px}
.hero-price{font-size:11px;font-weight:800;color:var(--green)}
.hero-ttl{font-size:17px;font-weight:800;line-height:1.4;margin-bottom:10px}
.hero-reasons{margin:0 0 10px}
.hero-checklist{margin-bottom:4px}
.hc-item{font-size:13px;color:var(--tx);line-height:1.9}
.today-next summary{cursor:pointer;font-weight:700;font-size:13px;color:var(--sub);list-style:none;
display:flex;align-items:center;gap:6px}
.today-next summary::-webkit-details-marker{display:none}
.today-next summary::before{content:'\25B8';font-size:11px;transition:transform .15s;display:inline-block}
.today-next[open] summary::before{transform:rotate(90deg)}
.today-next-item{padding:10px 0 0;margin-top:10px;border-top:1px solid var(--bd);cursor:pointer}
.today-next-item .nm{font-weight:700;font-size:13px}
.today-next-item .na{font-size:11px;color:var(--sub);margin-top:2px}
.type-gap-zero{font-size:16px;font-weight:800;color:var(--red);text-align:center;padding:2px 0 14px}
.type-gap-row{margin-bottom:10px}
.type-gap-row:last-child{margin-bottom:0}
.type-gap-row .tg-label{display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-bottom:4px}
.type-gap-row .tg-label .tg-name{font-weight:700;color:var(--tx)}
.type-gap-row.gap-hot .tg-label .tg-name{color:var(--amber)}
.type-gap-row.gap-hot .bar-fill{background:linear-gradient(90deg,var(--amber),#fbbf24)}
.blocked-row{display:flex;justify-content:space-between;gap:8px;padding:8px 0;border-top:1px solid var(--bd);font-size:12px}
.blocked-row:first-of-type{border-top:none;padding-top:0}
.blocked-row .bl-ttl{font-weight:700}
.blocked-row .bl-un{color:var(--sub);text-align:right}

/* 戦略タブ (content_plan.yaml ミラー) */
.week-h{display:flex;justify-content:space-between;align-items:center;font-weight:800;font-size:13px}
.week-h .wk-range{font-weight:600;color:var(--sub);font-size:11px}
.week-card-cur{border:1px solid var(--accent)}
details.week-card summary{cursor:pointer;list-style:none;display:flex;justify-content:space-between;
align-items:center;font-weight:800;font-size:13px;padding:2px 0}
details.week-card summary::-webkit-details-marker{display:none}
details.week-card summary::before{content:'\25B8';font-size:11px;margin-right:6px;display:inline-block;transition:transform .15s}
details.week-card[open] summary::before{transform:rotate(90deg)}
details.week-card .week-items{margin-top:10px}
.week-card-cur .week-items{margin-top:12px}
.st-item{padding:10px 6px;margin:0 -6px;border-top:1px solid var(--bd);border-radius:8px;transition:background .3s}
.st-item:first-child{border-top:none;padding-top:0}
.st-item.flash{background:rgba(91,124,250,.18)}
.st-item.status-skipped .st-what{text-decoration:line-through;color:var(--sub)}
.st-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.st-what{font-size:13px;font-weight:700;flex:1;min-width:0}
.st-tags{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-top:6px}
.st-why{font-size:11px;color:var(--sub);margin-top:6px;line-height:1.6}
.st-chip{font-size:10px;font-weight:800;padding:3px 8px;border-radius:999px;white-space:nowrap}
.st-chip.done{background:rgba(34,197,94,.15);color:var(--green)}
.st-chip.pending{background:var(--card2);color:var(--sub)}
.st-chip.skipped{background:var(--card2);color:var(--sub)}
.st-chip.delayed{background:rgba(239,68,68,.14);color:var(--red)}
.st-chip.needs-ryo{background:rgba(239,68,68,.14);color:var(--red)}

.prog-wrap{margin-bottom:4px}
.prog-info{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-bottom:6px}
.prog-track{height:10px;background:var(--card2);border-radius:6px;overflow:hidden;border:1px solid var(--bd)}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#8b7cf6);border-radius:6px;transition:width .4s}
.prog-num{font-size:11px;color:var(--sub);margin-top:5px}

.deal-mini{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0;
border-bottom:1px solid var(--bd)}
.deal-mini:last-child{border-bottom:none}
.deal-mini .nm{font-weight:700;font-size:13px}
.deal-mini .na{font-size:12px;color:var(--sub);margin-top:2px}
.deal-mini .st{font-size:11px;background:var(--card2);border-radius:999px;padding:3px 9px;color:var(--accent);
font-weight:700;white-space:nowrap}

.cpp-box{display:flex;align-items:center;gap:12px}
.cpp-box .cnt{font-size:22px;font-weight:800;color:var(--amber)}
.cpp-box .lb{font-size:12px;color:var(--sub)}

/* Badges */
.badge{display:inline-block;font-size:10px;font-weight:800;padding:3px 8px;border-radius:999px;
background:var(--card2);color:var(--accent);letter-spacing:.3px}
.badge.rescue{color:#f472b6}.badge.verification{color:#38bdf8}.badge.conversation{color:#a3e635}
.badge.work{color:#fbbf24}
.qbadge{font-size:11px;font-weight:800;color:var(--green)}

/* Article platform badges */
.badge.note{color:#22c55e}.badge.tips{color:#38bdf8}.badge.brain{color:#a78bfa}
.badge.x_article{background:#000;color:#fff}
.fc-chip{font-size:10px;font-weight:800;padding:3px 8px;border-radius:999px;background:var(--card2);color:var(--sub)}
.fc-chip.pass{color:var(--green)}.fc-chip.warn{color:var(--amber)}.fc-chip.fail{color:var(--red)}
.art-thumb{width:100%;max-height:130px;object-fit:cover;border-radius:12px;margin-bottom:8px;border:1px solid var(--bd)}
.art-price{font-size:11px;font-weight:800;color:var(--sub)}
.art-price.free{color:var(--green)}

/* Segmented control (platform tabs) */
.seg{display:flex;gap:6px;background:var(--card);border:1px solid var(--bd);border-radius:14px;
padding:5px;margin-bottom:10px;position:sticky;top:calc(6px + var(--safe-t));z-index:60}
.seg button{flex:1;min-height:40px;border-radius:10px;font-size:13px;font-weight:800;color:var(--sub);
display:flex;align-items:center;justify-content:center;gap:5px}
.seg button.on{background:var(--accent);color:#fff}
.seg .b-cnt{font-size:10px;font-weight:800;background:rgba(245,158,11,.9);color:#231a02;
border-radius:999px;min-width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;padding:0 4px}
.seg button.on .b-cnt{background:#fff;color:var(--accent)}

/* Time filter chips */
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.chip{font-size:12px;font-weight:700;padding:8px 14px;border-radius:999px;background:var(--card2);
border:1px solid var(--bd);color:var(--sub);min-height:36px}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip-row.time{margin:0 0 12px}

/* Draft card (承認待ち: フル表示) */
.dcard-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.dcard-body{font-size:14px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
.dcard-thread{margin-top:8px;padding-top:8px;border-top:1px dashed var(--bd)}
.dcard-thread .tlabel{font-size:11px;color:var(--sub);font-weight:700;margin-bottom:4px}
.media-row{display:flex;gap:6px;margin:10px 0;overflow-x:auto}
.media-row img{height:64px;width:64px;object-fit:cover;border-radius:10px;border:1px solid var(--bd);flex:0 0 auto}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn{flex:1;min-height:44px;border-radius:12px;font-weight:700;font-size:14px;display:flex;
align-items:center;justify-content:center;gap:6px;border:1px solid var(--bd);background:var(--card2)}
.btn.approve{background:var(--green);color:#04240f;border-color:var(--green)}
.btn.reject{background:var(--card2);color:var(--red)}
.btn.copy{background:var(--card2);color:var(--tx);flex:0 0 auto;padding:0 14px}
.btn.wide{flex:none;width:100%}
.btn:disabled{opacity:.5}
.btn.small{min-height:36px;font-size:12px;padding:0 12px;flex:0 0 auto}
.btn.ghost{background:none;border:1px dashed var(--bd);color:var(--sub);font-size:12px;min-height:38px}
.status-note{font-size:12px;font-weight:700;color:var(--green);text-align:center;padding:8px 0}

/* Post row (キュー/過去: コンパクト・タップで展開) */
.post-row{padding:12px 14px}
.post-row .pr-head{display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer;min-height:32px}
.post-row .pr-main{flex:1;min-width:0}
.post-row .pr-ttl{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.post-row .pr-sub{font-size:11px;color:var(--sub);margin-top:2px}
.post-row .pr-body{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)}
.post-row.open .pr-body{display:block}
.date-h{font-size:11px;font-weight:800;color:var(--sub);margin:14px 0 6px;display:flex;justify-content:space-between}
.date-h:first-child{margin-top:0}

/* Video card */
.vcard{display:flex;gap:12px}
.vcard img.thumb{width:76px;height:76px;object-fit:cover;border-radius:12px;border:1px solid var(--bd);
background:var(--card2);flex:0 0 auto}
.vcard-main{flex:1;min-width:0}
.vcard-main .slug{font-weight:700;font-size:14px}
.vcard-main .meta{font-size:11px;color:var(--sub);margin-top:2px}
.plat{margin-top:10px;border-top:1px solid var(--bd);padding-top:10px}
.plat-head{display:flex;justify-content:space-between;align-items:center;cursor:pointer;min-height:36px}
.plat-name{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.4px}
.plat-status{font-size:11px;color:var(--sub)}
.plat-cap{display:none;font-size:13px;line-height:1.6;color:var(--tx);margin-top:8px;
background:var(--card2);border-radius:10px;padding:10px;white-space:pre-wrap;word-break:break-word}
.plat-cap.open{display:block}
.tiktok-hot{background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(239,68,68,.1));
border:1px solid rgba(245,158,11,.35);border-radius:12px;padding:10px;margin-top:8px}
.tiktok-hot .hh{font-size:13px;font-weight:800;color:var(--amber)}

/* Pills */
.pill{font-size:10px;font-weight:800;padding:3px 8px;border-radius:999px;white-space:nowrap}
.pill.review{background:rgba(245,158,11,.15);color:var(--amber)}
.pill.approved{background:rgba(91,124,250,.15);color:var(--accent)}
.pill.queued{background:rgba(245,158,11,.15);color:var(--amber)}
.pill.draft{background:var(--card2);color:var(--sub)}
.pill.posted{background:rgba(34,197,94,.15);color:var(--green)}
.pill.sent_to_inbox{background:rgba(245,158,11,.18);color:var(--amber)}
.pill.rejected{background:rgba(239,68,68,.14);color:var(--red)}
.pill.other{background:var(--card2);color:var(--sub)}

/* Money */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.bar-row .m-label{width:52px;font-size:11px;color:var(--sub);flex:0 0 auto}
.bar-track{flex:1;height:20px;background:var(--card2);border-radius:6px;overflow:hidden;border:1px solid var(--bd);
position:relative}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#8b7cf6);border-radius:6px}
.bar-fill.over{background:linear-gradient(90deg,var(--green),#4ade80)}
.bar-num{font-size:11px;color:var(--sub);width:110px;flex:0 0 auto;text-align:right}
.stage-h{display:flex;justify-content:space-between;align-items:center;margin:16px 0 8px}
.stage-h .st-name{font-size:13px;font-weight:800}
.stage-h .st-cnt{font-size:11px;color:var(--sub)}
.deal-card{padding:12px;background:var(--card2);border-radius:12px;margin-bottom:8px}
.deal-card .nm{font-weight:700;font-size:14px}
.deal-card .cl{font-size:12px;color:var(--sub)}
.deal-card .qt{font-size:15px;font-weight:800;color:var(--green);margin-top:4px}
.deal-card .na{font-size:12px;color:var(--tx);margin-top:6px;background:var(--card);border-radius:8px;padding:6px 8px}
.conv-row{display:flex;justify-content:space-between;font-size:12px;padding:7px 0;border-bottom:1px solid var(--bd)}
.conv-row:last-child{border-bottom:none}
.cpp-lines{font-size:13px;line-height:1.9;padding-left:18px;margin:6px 0}

/* Apps (リンク集) */
.app-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.app-card{display:flex;flex-direction:column;gap:6px;background:var(--card);border:1px solid var(--bd);
border-radius:var(--radius);padding:14px;text-decoration:none;color:var(--tx);min-height:96px}
.app-card:active{background:var(--card2)}
.app-card .ai{font-size:26px;line-height:1}
.app-card .an{font-size:13px;font-weight:800}
.app-card .ad{font-size:11px;color:var(--sub);line-height:1.5}
.app-card .ah{font-size:10px;color:var(--accent);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.app-card.local{border-style:dashed}
.app-card.local .ah{color:var(--sub)}
.app-launch{font-size:11px;background:var(--card2);border-radius:8px;padding:6px 8px;color:var(--sub);
font-family:ui-monospace,Menlo,monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Toast */
.toast{position:fixed;left:50%;bottom:calc(90px + var(--safe-b));transform:translateX(-50%) translateY(10px);
background:#1e2230;color:#fff;padding:11px 20px;border-radius:999px;font-size:13px;font-weight:700;
opacity:0;transition:.25s;pointer-events:none;z-index:150;box-shadow:0 6px 20px rgba(0,0,0,.4);
display:flex;align-items:center;gap:10px;max-width:88vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast button{color:var(--accent);font-weight:800;font-size:12px;pointer-events:auto}

/* Bottom nav */
nav.btm{position:fixed;left:0;right:0;bottom:0;display:flex;background:rgba(21,24,33,.92);
backdrop-filter:blur(14px);border-top:1px solid var(--bd);padding-bottom:var(--safe-b);z-index:120}
nav.btm .bt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
min-height:56px;color:var(--sub);font-size:10px;font-weight:700;position:relative}
nav.btm .bt .bi{font-size:20px}
nav.btm .bt.on{color:var(--accent)}
nav.btm .bt .dot{position:absolute;top:4px;right:calc(50% - 20px);width:8px;height:8px;border-radius:50%;
background:var(--amber);display:none}
nav.btm .bt .dot.show{display:block}

/* Voice */
#view-voice{padding-bottom:110px}
.voice-fab-wrap{position:fixed;left:50%;bottom:calc(68px + var(--safe-b));transform:translateX(-50%);
z-index:110;display:none;flex-direction:column;align-items:center;gap:6px}
.voice-fab-wrap.show{display:flex}
.voice-fab-wrap .voice-timer{font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--tx);
background:rgba(11,13,18,.85);padding:3px 10px;border-radius:999px}
.voice-live-banner{font-size:11px;font-weight:800;color:#fff;background:rgba(239,68,68,.92);
padding:5px 12px;border-radius:999px;white-space:nowrap}
.voice-rec-btn{width:76px;height:76px;border-radius:50%;background:var(--accent);border:4px solid rgba(91,124,250,.25);
display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 6px 20px rgba(0,0,0,.4)}
.voice-rec-btn.recording{background:var(--red);border-color:rgba(239,68,68,.3);animation:voicePulse 1.4s infinite}
@keyframes voicePulse{0%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}70%{box-shadow:0 0 0 18px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}
.voice-hint{font-size:11px;color:var(--tx);background:rgba(11,13,18,.85);padding:3px 10px;border-radius:999px}
.voice-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0;
border-bottom:1px solid var(--bd)}
.voice-row:last-child{border-bottom:none}
.voice-row .vtxt{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.voice-row .vtype{font-size:10px;color:var(--sub);margin-top:2px}
.voice-row .vst{font-size:16px;flex:0 0 auto}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;
border-radius:50%;animation:vspin .7s linear infinite;margin-right:6px;vertical-align:-2px}
@keyframes vspin{to{transform:rotate(360deg)}}

/* Insights (知見) */

/* ---- Auth (salted SHA-256, same scheme/password as x-preview) ---- */
const H='878a3d842d2c56f1398de3090d65daf2fe7b9445743be4dccc330591f9bb6cc1';
const S='x-preview-2026-salt';
async function _sha256(s){const b=new TextEncoder().encode(s);const h=await crypto.subtle.digest('SHA-256',b);
  return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,'0')).join('')}
async function unlock(){
  const v=document.getElementById('pw').value;
  const e=document.getElementById('lockErr');
  e.textContent='確認中…';
  await new Promise(r=>setTimeout(r,300));
  const hv=await _sha256(S+v);
  if(hv===H){
    localStorage.setItem('ryoops_h',H);
    document.getElementById('lock').classList.add('off');
    document.getElementById('app').classList.add('on');
    e.textContent='';
    boot();
  }else{
    e.textContent='パスワードが違います';
    document.getElementById('pw').value='';
    setTimeout(()=>e.textContent='',2000);
  }
}
/* v6: 認証保存を localStorage 化 (PWA/ブラウザを閉じても再入力不要)。
   読み取りは localStorage → 無ければ sessionStorage の順でフォールバックし、
   旧版 (sessionStorage のみ書き込んでいた) の既存ログイン状態も破壊しない。
   書き込みは常に localStorage のみ (docs/EDIT_LAB_V6_UPSCALE_RYOOPS.md §2)。 */
if(localStorage.getItem('ryoops_h')===H || sessionStorage.getItem('ryoops_h')===H){
  document.getElementById('lock').classList.add('off');
  document.getElementById('app').classList.add('on');
}

とつ抜けてた。\n\nブラインド比較で優位67-77%、しかもプロンプト不要が鉄則。\n\nテキストから効果音(Text→SFX)はElevenLabsが30秒/ループ/48kHz対応で一強。\n\n今の主流はV2Aで土台作ってT2Aで仕上げる二段構成だった。","thread":["ゼロプロンプトが鉄則、というのが地味に効く発見だった。凝った指示を書くほど精度が落ちる系のツールで、逆に「何も渡さない」が正解になるパターン。"],"media":[],"created":"2026-07-10","posted_date":""},{"id":"2026-07-10-skill-impl-drift-audit","path":"10_X-Marketing/drafts/posts/2026-07-10-skill-impl-drift-audit.md","title":"2026-07-10-skill-impl-drift-audit","post_type":"rescue","status":"review","quality":"","body":"ハーネスをたくさん作ってると、「スキルのドキュメントは立派なのに、実際のUIコードは別のツールを使ってる」みたいな乖離が起きる。\n\nこれ、スキル間をいくら見比べても見つからない。見つかったのは、UIコードとスキル正本のツール選定を直接突合したとき。\n\n96日間放置されてた矛盾がそれで初めて見えた。","thread":["仕様と実装のズレは「知らない間に起きる」ものだから、定期的に実装側から逆引きする監査を仕込んでおくのが一番効く気がしてる。"],"media":[],"created":"2026-07-10","posted_date":""},{"id":"2026-07-10-tips-mcp-image-rehost","path":"10_X-Marketing/drafts/posts/2026-07-10-tips-mcp-image-rehost.md","title":"2026-07-10-tips-mcp-image-rehost","post_type":"rescue","status":"review","quality":"","body":"Tipsに記事を自動投稿しようとして、画像アップロードのE2E組むのめんどくさいなと思ってたら、実は要らなかった。\n\nTips MCPは本文に外部URL(fal.mediaなど)の画像を挿すだけで、保存時に自動でstatic.tips.jpへ再ホストしてくれる。\n\n8枚の画像で実測、URL直挿しでそのまま通った。","thread":["noteは真逆で外部URLの画像を黙って剥ぎ取ってくる。同じ「記事の下書き自動化」でもプラットフォームで挙動が全然違うのが地味にハマりどころだった。"],"media":[],"created":"2026-07-10","posted_date":""},{"id":"2026-07-09-seedream5pro-chardesign","path":"10_X-Marketing/drafts/posts/2026-07-09-seedream5pro-chardesign.md","title":"2026-07-09-seedream5pro-chardesign","post_type":"verification","status":"archived","quality":"4/5","body":"さっそくキャラデザで使ってみたけど、これかなり良い…！ 複数モデルで並べて比べても、線と配色と設計意図の拾い方が個人的に一番しっくりきた。そのまま参照に使えるレベルで、キャラ作りがだいぶ楽になってきた🎨","thread":[],"media":[],"created":"2026-07-09","posted_date":""},{"id":"2026-07-03-daily-1-face-consistency-refs","path":"10_X-Marketing/drafts/posts/2026-07-03-daily-1-face-consistency-refs.md","title":"2026-07-03-daily-1-face-consistency-refs","post_type":"rescue","status":"archived","quality":"4/5","body":"「キャラ登録したのに顔が毎回変わる」という声をSora2界隈で見かけた。自分も60秒超の物語で148クリップ回した時、同じ壁 12-ai-cannot-write-folder","path":"10_X-Marketing/drafts/posts/2026-06-12-ai-cannot-write-folder.md","title":"2026-06-12-ai-cannot-write-folder","post_type":"rescue","status":"archived","quality":"","body":"Obsidianに「AIが書き込めないフォルダ」をhookで作ってみた。\n\nAIのノートと手書きメモが混ざると「これ自分の経験だっけ?」が分からなくなる。\n\nで、256ノートを監査して物理分離したら、発信素材の純度が別物になった✍️\n\nAIメモと自分のメモ、分けてる?","thread":["ちなみに分離した後、AIに「離れたノート2枚を強制的に掛け合わせて仮説を出す」スキルを足したら、今朝さっそく自分では思いつかない接続を提案してきた。手書き知見が混ざってないからこそ、掛け算の出どころが信用できる。","ちなみに分離した後、AIに「離れたノート2枚を強制的に掛け合わせて仮説を出す」スキルを足したら、今朝さっそく自分では思いつかない接続を提案してきた。手書き知見が混ざってないからこそ、掛け算の出どころが信用できる。"],"media":["T","O","D",":"," ","p","a","e","r","b","n","-","i","f","o","g","h","c","で","『","3","層","分","離","』","図","解","1","枚","(","0","_","N","t","s","/","A","I","L","k","の","構","造",")"],"created":"2026-06-12","posted_date":""},{"id":"2026-06-12-course-launch-wave1","path":"10_X-Marketing/drafts/posts/2026-06-12-course-launch-wave1.md","title":"2026-06-12-course-launch-wave1","post_type":"launch","status":"archived","quality":"","body":"AIで作った動画が、なぜか毎回\"ホームビデオ\"っぽくなる——あれ、センスの問題じゃない。\n\nプロ品質との分岐点は、画づくりより前の「設計（カット割り・カメラ・一貫性の固定）」にある。生成のガチャを、設計で殺せる。\n\n何が分岐点だったかを言語化してみた。\n\nあなたの動画が\"素人っぽく見える\"のは、どの瞬間だと思いますか？","thread":[],"media":[],"created":"2026-06-12","posted_date":""},{"id":"2026-06-11-grok-v15-cinematic","path":"10_X-Marketing/drafts/posts/2026-06-11-grok-v15-cinematic.md","title":"2026-06-11-grok-v15-cinematic","post_type":"verification","status":"archived","quality":"","body":"Grok Imagine の動画v1.5、英語圏だと話題なのに日本語の検証はまだ少ない。\n気になって回してみたら、I2V専用で duration 15 がそのまま通る。15秒・720p、しかも音声トラックまで一緒に出てくる。\n雨のネオン街で刀を構えるカット、動きが滑らかで破綻しなかった。\n次は芝居＋セリフでも試したい。","thread":["作り方はシンプル。\n1. Grok Imagine T2I で 16:9 の元画像(サイバーパンク・ネオン・被写体1体)\n2. その1枚を Grok Imagine Video v1.5 (I2V) に渡す\n3. プロンプトは「動き＋カメラ＋タイミング」中心に簡潔(duration 15 / 720p)\n※参照は画像1枚のみ。複数キャラ参照が要るなら Seedance 2.0 R2V か Vidu Q3。","詰まりやすい点:\n・出力アスペクトは入力画像の比に追従する。16:9が欲しいなら16:9画像を入れる(縦絵を入れると縦動画になる)\n・音声は出るけど日本語TTSの精度は要確認。気になれば ElevenLabs/Gemini TTS で作り直し→lipsync差し替え","このクオリティが画像1枚＋1プロンプトで出るのは普通に便利。\n次はキャラの芝居＋セリフ尺(10秒前後)で、A-roll候補になるか試したい。"],"media":[],"created":"2026-06-11","posted_date":""},{"id":"2026-05-29-data-driven-gap-batch","path":"10_X-Marketing/drafts/posts/2026-05-29-data-driven-gap-batch.md","title":"2026-05-29-data-driven-gap-batch","post_type":"post-drafts","status":"legacy","quality":"","body":"Vidu Q3、泣き顔のシーンだけ何回投げても生成拒否されて、半年くらい放置してた。\n\n犯人は \"tears\" \"trembling\" みたいな感情語。ネガティブ表現がフィルタで弾かれてたっぽい。\n\n「光をためた瞳」みたいに前向きに言い換えたら、普通に通るようになった。\n\n同じところで止まってた人、プロンプト側を疑うと早いかも。","thread":["完全プロンプト（コピペ可）:\n\n[ここにSeedance 2.0 R2Vの実プロンプト全文を貼る]\n\nモデル: Seedance 2.0 R2V\n参照: キャラ正面1枚 + 背景1枚\n出力: 1080p / 5s\nコツ: 動詞は1つに絞ると破綻しにくい","AI動画作ってて、いちばん時間が溶けるのってどこだろう。\n\n・プロンプトの試行錯誤\n・キャラの一貫性キープ\n・モデル選びと課金管理\n・書き出し/編集まわり\n\n自分は最近ずっと「一貫性」なんだけど、みんなどう？"],"media":[],"created":"2026-05-29","posted_date":""},{"id":"2026-05-20-aiehon-style-3patterns","path":"10_X-Marketing/drafts/posts/2026-05-20-aiehon-style-3patterns.md","title":"2026-05-20-aiehon-style-3patterns","post_type":"","status":"archived","quality":"","body":"え、トーキングヘッド動画、まだ画角固定で作ってない…？！\n\nAI喋り動画で5秒以上飽きさせない黄金値は\n「画角変化 ±30」だよ。\nアップ=130 / 引き=70 を 5-7秒ごとに交互。\n10秒に1回は画像インサートも入れる。テストにでます。\n\n[画像: before/after 2枚並列 — 固定画角 vs ±30振り]","thread":["3日間422で詰んでた。原因これだった。\n\n❌ wrangler r2 object put ← 個別ファイルだとpublic URLに反映されず404\n↓\n✅ rclone copy file r2:bucket/ で解決\n\n公式CLIなのにバグってる。同じ症状で詰んだ人いる？\n\n[画像: エラーログ before / 成功 after の2枚]"],"media":[],"created":"2026-05-20","posted_date":""},{"id":"2026-05-04-gpt-image2-short-drama-4walls","path":"10_X-Marketing/drafts/posts/2026-05-04-gpt-image2-short-drama-4walls.md","title":"2026-05-04-gpt-image2-short-drama-4walls","post_type":"post-drafts","status":"legacy","quality":"","body":"| # | モード | フック | 推奨配信 |\n|---|---|---|---|\n| 1 | **C 融合（本命）** | 4つの壁を1枚チェックリストにまとめる救済図解 | 5/4 12:00 or 5/5 7:00 |\n| 2 | B 純救済 | キャラ一貫性に絞った深掘り（参照添付 + 新規チャット再投） | 5/5 12:00 |\n| 3 | B 純救済 | 出力ムラを潰すハイブリッド（GPT Image 2 → NB2 Edit） | ストック |\n\n---","thread":[],"media":["null","図解1【生成済】: 「GPT Image 2でショートドラマ ぶつかる4つの壁」チェックリスト","図解2【未着手】: Before/After（参照なし4シーン顔バラバラ → 参照あり統一）visual-director発注候補","https://v3b.fal.media/files/b/0a98d20f/68MFU35mewvmsMZDMS24p_L5ROcmuE.png"],"created":"2026-05-04","posted_date":""},{"id":"2026-04-26-existing-summer-soft-vlog","path":"10_X-Marketing/drafts/posts/2026-04-26-existing-summer-soft-vlog.md","title":"2026-04-26-existing-summer-soft-vlog","post_type":"post-drafts-with-reply-chain","status":"legacy","quality":"","body":"AI動画にテキスト入れる時、毎回デジタル感が出てた。\n\nRemotion + Google Fonts の Caveat (英語手書き) と Klee One (日本語やわらか) を重ねて、\nwashi tape ・ハッシュタグステッカー・微回転（-2°〜+5°）で、Instagram旅Vlogみたいな手書き編集に振った。\n\n「夏のかけら」というMVを置いておきます。\n画像とプロンプトはリプ欄に。","thread":["4章のヒーロー画像（GPT Image 2 で T2I 生成）。\n朝の空港 / 古宇利の海 / 壺屋やちむん通り / サンセットビーチ。\n4枚とも Kodak Portra 400 + Fujifilm Pro 400H 質感プリセットで光が揃う。","4章のGPT Image 2プロンプト、共通部品＋章別パートで構成しました。\n\n▼ 共通質感プリセット（全章末尾に貼る）\n\"Faded Kodak Portra 400 + Fujifilm Pro 400H aesthetic, candid smartphone snapshot, handheld slight motion blur, fine grain, 35mm lens feel, creamy soft skin, milky highlights, slightly tilted composition. Photo-realistic, NOT illustration.\"\n\n▼ Ch1 朝・那覇空港 (5:47)\n\"Young Japanese couple at Naha Airport at 5:47 AM dawn. Soft golden first light through floor-to-ceiling windows. Girl in oversized white linen shirt holding iced latte. Boy in cream tee with navy cap backwards. Empty terminal, faded JAL/ANA signage softly blurred.\"\n\n▼ Ch2 昼・古宇利ビーチ (13:22)\n\"Same couple on Kouri Beach at 1:22 PM. Bright cobalt-blue Okinawan ocean, vivid white sand. Selfie angle: boy in front (close-up smile), girl walking toward water in background, white loose tee tucked into denim shorts, hair flying. Bright midday sun, palm shadows, ocean blue saturation pulled cyan.\"\n\n▼ Ch3 夕・壺屋やちむん通り (17:45)\n\"Same couple holding hands walking down a narrow Tsuboya pottery alley in Naha at 5:45 PM golden hour. Vintage red Coca-Cola vending machine glowing on the left, weathered shisa stone lion guardian on the wall. Honey-orange light, long shadows. Girl in white floral sundress, boy in black tee + cargo shorts.\"\n\n▼ Ch4 夜・サンセットビーチ (22:03)\n\"Same couple in cotton yukata (girl mint-wave / boy navy-stripe) sitting on dark sand at Sunset Beach at 10:03 PM. Both holding senko-hanabi sparklers, golden sparks falling. Distant moon over Pacific, paper lanterns on a fishing boat far out. Cinestill 800T + Kodak Portra 800 night film, halation around sparkler glow, deep teal shadows.\"\n\nquality=high / image_size=portrait_16_9 / 4枚並列で約2分・$0.20 でした。","Vlog風オーバーレイの仕掛けは @remotion/google-fonts で5本のフォントをロードするだけ:\n\nimport { loadFont as loadCaveat } from '@remotion/google-fonts/Caveat';\nimport { loadFont as loadKleeOne } from '@remotion/google-fonts/KleeOne';\nimport { loadFont as loadHachi } from '@remotion/google-fonts/HachiMaruPop';\n\n▼ 役割分担\n- Caveat → 英字手書き（dates, hashtags, EN副題）\n- KleeOne → 日本語やわらか毛筆（メインキャプション）\n- HachiMaruPop → 丸文字ポップ吹き出し（中央の「ついた〜」「ぶらぶら」）\n\n▼ 人間味の演出（4つだけ）\n1. washi tape: rgba(248,215,165,0.55) を1枚敷いて transform: rotate(2deg)\n2. 全要素に -2°〜+5° の微回転をランダムに振る\n3. Spring物理アニメで「ぴょこ」と着地（damping:14, stiffness:90）\n4. 強調語の下に弧型下線（borderRadius:50% rotate:-1deg）でhand-drawn感\n\nこれだけで「人が編集した感」になる。","60秒MVの章構成（参考用）:\n\nCh1 朝 / Ch2 昼 / Ch3 夕 / Ch4 夜 = 各15秒\n↓\ntitle 3s（夏のかけら）→ 15s × 4章 → reveal 5s（thanks for watching ♡）\n合計 64秒\n\nメタ告白の落としを「ぜんぶ、AIが見てた夢でした」に振ったら、急に余韻が出た。"],"media":["https://v3b.fal.media/files/b/0a97bab8/r9Gl_APme3OvNxJpPRP-8_existing_summer_mv_vlog.mp4","https://v3b.fal.media/files/b/0a97bab5/bfk7Lb95NJOtGzlFlkzfH_ch1_airport_dawn.png","https://v3b.fal.media/files/b/0a97bab6/3ItFKf7LtsXeKAit8q1jf_ch2_cobalt_beach.png","https://v3b.fal.media/files/b/0a97bab7/lFPssYIiBY4wNSOFZPITw_ch3_amber_alley.png","https://v3b.fal.media/files/b/0a97bab7/wYU_sMAHXRMBKuPgjY8FE_ch4_sparkler_night.png"],"created":"2026-04-26","posted_date":""},{"id":"2026-04-26-gpt-image2-golden-week-mv","path":"10_X-Marketing/drafts/posts/2026-04-26-gpt-image2-golden-week-mv.md","title":"2026-04-26- acy","quality":"","body":"| # | モード | バズフック型 | テーマ | 痛み | 推奨配信 |\n|---|---|---|---|---|---|\n| 1 | A 純トレンド | 時間プレッシャー＋リスト宣言 | Sora終了18時間前・7モデル用途別ベスト | #2 | 7:00 |\n| 2 | **C 融合（本命）** | 失敗回数告白＋数字対比＋テンプレ配布 | Klingキャラ崩れ × 4Kリリースでも通る型 | #1 | 12:00 |\n| 3 | B 純救済 | コスト実測公開＋公式vs実測対比 | 動画AIクレジット実測（料金表のウソ） | #3 | 21:00 |\n| 4 | B 純救済 | 失敗体験告白＋テンプレ配布 | Vidu Q3 NGワード置換マップ | #4 | ストック |\n| 5 | B 純救済 | 半年絶望→突破物語＋7パターン | Remotion音ズレ × WSL2環境問題 | #5 | ストック |\n\n→ モード配分: A=1 / B=3 / C=1 → **B+C=80%** ✅\n\n---","thread":[],"media":[],"created":"2026-04-25","posted_date":""},{"id":"2026-04-08-p1-seedance-vs-kling-t2v","path":"10_X-Marketing/drafts/posts/2026-04-08-p1-seedance-vs-kling-t2v.md","title":"2026-04-08-p1-seedance-vs-kling-t2v","post_type":"","status":"legacy","quality":"","body":"- プロンプト: 雨の東京路地×ネオン×シネマティック（完全同一）\n- Seedance 1.5 Pro: FAL API, 720p, 5s, 音声あり\n- Kling V3 Pro: FAL API, 1080p, 5s, 音声あり","thread":["Seedance話題だから、Kling V3 Proと同一プロンプトでT2V比較してみた\n\n同じ「雨の東京路地×ネオン」で生成した結果:\n\nSeedance → ネオン反射が鮮明で色が派手。MV映え\nKling → 被写界深度が映画的。フォグの空気感が別格\n\n正直、同じプロンプトでここまでスタイル変わるとは思わなかった\n\n用途で選ぶのが結局一番早い。みんなはどっち派？","検証データ:\nSeedance 1.5 Pro: 720p/24fps/音声あり/5s\nKling V3 Pro: 1080p/24fps/音声あり/5s\n\n解像度はKlingが上。ただSeedanceの雨反射の質感は720pでもかなり良い。2.0がRunwayで無制限になったから、次はそっちも比較してみたい"],"media":[],"created":"2026-04-08","posted_date":""},{"id":"2026-04-08-p4-ai-video-flag","path":"10_X-Marketing/drafts/posts/2026-04-08-p4-ai-video-flag.md","title":"2026-04-08-p4-ai-video-flag","post_type":"","status":"legacy","quality":"","body":"---","thread":["ちなみに現時点で気になるポイント:\n\n・Topazアプスケ後もAI判定されるのか\n・Remotionで編集した動画は？\n・実写+AI合成のハイブリッドは？\n\n判定基準がどこまで精密かで、影響の大きさが全然変わりそう。","補足:\n\n・YouTube/TikTokは既にAIラベル義務化の流れ\n・Xが自動判定に踏み切ったのは一歩先\n・クリエイター側は「隠す」より「活かす」にシフトしたほうが健全\n\n透明性の波は止まらないと思う。","考えてみると:\n\n・写真加工アプリも最初は「加工=ズルい」って言われてた\n・今は誰もフィルター使うことに抵抗ない\n・AI動画も同じ道をたどる気がする\n\n5年後には「AI使ってない方が珍しい」になってるかも。"],"media":[],"created":"2026-04-08","posted_date":""},{"id":"2026-04-07-P1-seedance2-multiref","path":"10_X-Marketing/dra ral: https://x.com/GilangR90760584/status/2040065641340911868 (❤️1,083 👀1M)\n- Veo無料化: https://x.com/MustafyOf/status/2040042901288227037 (❤️512 🔖518)\n\n---","thread":["Kling 3.0（無料66cr/日）の強み:\n\n・カメラワーク制御が圧倒的\n・アクション/物理表現が自然\n・10秒まで生成可能\n・無料プランでも4K60fps出力\n\n苦手: 顔の表情の細かい変化、日本語セリフ\n\n僕のメインツール。CM制作でも使ってる🎬","Veo 3.1（Google Vids無料）の強み:\n\n・自然な物理表現（水・布・髪）\n・Google認証だけで即使える\n・ネイティブ音声同期\n・8秒まで生成\n\n苦手: カメラワーク指定の精度\n\n初心者の最初の1本には最適だと思う✨","用途別おすすめ:\n\nアクション/カメラワーク → Kling 3.0\n自然な動き/初心者 → Veo 3.1\n有料でもキャラ一貫性 → Vidu Q3\n\n無料2ツールを「用途で使い分け」するだけで、\n月$0でかなり遊べる。\n\nどっち派？🎬"],"media":[],"created":"2026-04-05","posted_date":""},{"id":"2026-04-05-P2-seedance-jp-workaround","path":"10_X-Marketing/drafts/posts/2026-04-05-P2-seedance-jp-workaround.md","title":"2026-04-05-P2-seedance-jp-workaround","post_type":"","status":"legacy","quality":"","body":"- US/JP制限: https://x.com/bindureddy/status/2040457599376904692 (🔖39)\n- 日本語レビュー: https://x.com/Hoshimiko_AIart/status/2040401464649302295 (🔖202)\n\n---","thread":["① CapCut Dreamina経由\n・メリット: CapCutアプリで完結。編集まで1本道\n・デメリット: UIが英語\n・料金: 無料枠あり\n\n② Pollo経由\n・メリット: Seedance含む複数モデルを一つのUIで\n・デメリット: キューで待つことあり\n・料金: 月$12〜\n\n③ fal.ai MCP経由（自分のメイン）\n・メリット: Claude Codeから自然言語で叩ける\n・デメリット: API従量課金\n・料金: 5秒720p $0.26","日本語セリフの品質を同じ台本で比較してみた:\n\nSeedance 2.0: ★★★☆☆（発音やや不自然）\nVidu Q3: ★★★★☆（安定）\nKling 3.0: ★★☆☆☆（英語寄り）\n\n日本語音声のベストはまだVidu Q3かなという印象。\nSeedance 2.0は映像品質は高いけど、セリフは英語の方が得意🎬"],"media":[],"created":"2026-04-05","posted_date":""},{"id":"2026-04-05-P3-jp-voice-comparison","path":"10_X-Marketing/drafts/posts/2026-04-05-P3-jp-voice-comparison.md","title":"2026-04-05-P3-jp-voice-comparison","post_type":"","status":"legacy","quality":"","body":"- Hoshimiko日本語レビュー: https://x.com/Hoshimiko_AIart/status/2040401464649302295 (🔖202)\n- Seedanceプロンプト: https://x.com/jboogx_creative/status/2040177902118228149 (🔖452)\n- Ryo独自検証データ\n\n---","thread":["日本語セリフ音声品質 詳細比較:\n\nVidu Q3（有料$0.90/10s）\n・発音: ★★★★☆ 日本語ネイティブに近い\n・抑揚: ★★★★☆ 自然な感情表現\n・口パク: ★★★☆☆ やや遅延あり\n\nSeedance 2.0（無料〜$0.26/5s）\n・発音: ★★★☆☆ 英語訛りあり\n・抑揚: ★★☆☆☆ 機械的\n・口パク: ★★★★☆ 同期は良い\n\nKling 3.0（無料66cr/日）\n・発音: ★★☆☆☆ 英語寄り\n・抑揚: ★★☆☆☆ 平坦\n・口パク: ★★★★★ 最も精密","用途別おすすめ（日本語セリフ目的）:\n\n【ストーリー動画/会話劇】 → Vidu Q3\n発音の自然さが物語の没入感に直結\n\n【映像重視/SNSショート】 → Seedance 2.0\n映像品質は最高。セリフは字幕で補完\n\n【アクション/BGM重視】 → Kling 3.0\nセリフより映像・物理演出で魅せる\n\n日本語音声が必要ならVidu Q3が現状の答えかな🎬","日本語セリフを自然にするプロンプトTips:\n\n・カタカナ英語は発音記号で指定\n・感情を英語で添える（\"speaking softly with determination\"）\n・キャラ名を事前定義（名前・声質）\n・セリフは短く切る（10-15文字単位）\n\nこれで品質が一段上がる。\n同じ台本で試してみてほしい🎬"],"media":[],"created":"2026-04-05","posted_date":""},{"id":"2026-04-04-P1-seedance-mcp","path":"10_X-Marketing/drafts/posts/2026-04-04-P1-seedance-mcp.md","title":"2026-04-04-P1-seedance-mcp","post_type":"","status":"legacy","quality":"","body":"- https://x.com/higgsfield/status/2039535191098802315 (❤️2,600 🔖1,386 👀4.3M)\n\n---","thread":[],"media":[],"created":"2026-04-04","posted_date":""},{"id":"2026-04-04-P1-technique-hq","path":"10_X-Marketing/drafts/posts/2026-04-04-P1-technique-hq.md","title":"2026-04-04-P1-technique-hq","post_type":"","status":"legacy","quality":"","body":"- Timeline Markers: @doctorwasif\n- Art World Step-In: @Kling_ai公式\n- Top-View Miniature: @onofumi_AI\n- 品質ブースター: Ryo独自のvocabulary.md知見","thread":["①Timeline Markers（秒数制御 + 明暗演出）\n\nCinematic masterpiece, 8k, professional lighting. 0-3s: slow motion close-up of a young samurai's face, chiaroscuro lighting, rain droplets frozen in mid-air, eyes reflecting firelight, camera slowly pulling back. 3-6s: medium shot, time resumes, samurai draws katana in one fluid motion, cherry blossom petals swirl in golden hour backlight, camera tracks in circular orbit. 6-10s: extreme wide angle, supernatural shockwave erupts from the blade strike, volumetric dust illuminated by ethereal glow, camera rapidly zooms out.\n\nKling V3 Pro / 10秒 / 16:9 / 音声ON","②Art World Step-In 浮世絵版（2D→3D没入トランジション）\n\nCinematic masterpiece, 8k, professional lighting. Camera glides through a dimly lit Japanese art museum, warm spotlights on wooden floors, serene atmosphere. Camera approaches Hokusai's Great Wave ukiyo-e painting in ornate gold frame. As camera crosses the frame threshold, seamless morphing transition: flat brushstrokes dissolve into volumetric 3D ocean. Massive turquoise waves crash with realistic water physics, spray catches golden hour sunlight, Mount Fuji emerges through mist. Camera continues forward, low-angle tracking shot skimming the wave surface.\n\n個人的にこれが一番映画的だった✨","③Top-View Miniature（俯瞰ジオラマ追跡）\n\nCinematic masterpiece, 8k. Extreme overhead top-down view, miniature tilt-shift diorama effect with shallow depth of field bokeh. A delicate glowing golden paper crane flies through an exquisitely detailed miniature Japanese garden. The crane soars over a tiny stone lantern, dips between red maple leaves, circles around a moss-covered rock, then glides across a crystal-clear koi pond where orange fish scatter beneath. Camera smoothly tracks the crane in continuous one-take. Warm afternoon sun creates long miniature shadows. Dust particles float in light beams.","プロンプトの品質を底上げするキーワード:\n\n・cinematic masterpiece, 8k → 全体品質の引き上げ\n・chiaroscuro lighting → ドラマチックな明暗対比\n・volumetric → 霧・光線・煙に立体感\n・golden hour → 黄金色の柔らかい光\n・ethereal glow → 幻想的な発光\n・dust particles → 空気感の演出\n・tilt-shift bokeh → ミニチュア感\n\nこれらを「カメラワーク指定」と組み合わせるのがコツ。\n3本の合計コスト: $1.05（¥158）🎬"],"media":["https://v3b.fal.media/files/b/0a94dc17/ouGunbygGu109BaEq4j6u_output.mp4","https://v3b.fal.media/files/b/0a94dc18/aT2ir9H_5zbSoST0Ytknz_output.mp4","https://v3b.fal.media/files/b/0a94dc19/wDc6SjKLFiGI1PpeMA7s4_output.mp4"],"created":"2026-04-04","posted_date":""},{"id":"2026-04-04-P1-technique-round2","path":"10_X-Marketing/drafts/posts/2026-04-04-P1-technique-round2.md","title":"2026-04-04-P1-technique-round2","post_type":"","status":"legacy","quality":"","body":"- Through-Wall: @techhalla (❤️3,148 🔖2,394 👀4.5M)\n- Time-Freeze: @CharaspowerAI (❤️1,312 🔖1,328)\n- Macro Cherry: Ryo独自（wabi-sabi × cinematography）","thread":["①壁通過ワンテイク\n\nCinematic masterpiece, 8k, professional lighting. Continuous single-take camera smoothly passing through solid walls. Camera starts in a rain-soaked neon Tokyo alley at night, chiaroscuro lighting from flickering signs. Camera glides forward, passes directly through a concrete wall with seamless dissolution effect, enters a steamy ramen kitchen where a chef throws noodles in slow motion, camera continues through steam clouds and another wall, emerging into a serene tatami room where an old samurai meditates by candlelight.\n\nポイント: \"passes through solid wall\" + 各部屋の色温度を変える🎬","②時間停止POV\n\nCinematic masterpiece, 8k, professional lighting. POV first-person walking shot through a frozen moment in time. The entire world is suspended: rain droplets hang motionless in mid-air catching neon light reflections, a woman's hair is frozen mid-flip, a cat leaps between rooftops suspended in space, splashing puddle water forms a crystalline crown shape frozen solid. Camera slowly walks forward through this frozen tableau, weaving between suspended raindrops. Chiaroscuro lighting, golden hour light breaks through storm clouds.\n\nポイント: \"frozen moment in time\" + 具体的な静止物を列挙する✨","③桜マクロ × 侘寂\n\nCinematic masterpiece, 8k. Extreme close-up of a single cherry blossom petal falling in ultra slow motion through beams of golden hour sunlight. Camera tracks the petal as it descends, rotating gently. The petal passes through alternating zones of warm light and cool shadow, creating chiaroscuro contrast. Volumetric god rays stream through branches. The petal lands on a still pond, creating perfectly concentric ripples catching ethereal golden reflections. Dust particles float in sunbeams. Serene, contemplative, Japanese wabi-sabi aesthetic.\n\nポイント: \"wabi-sabi aesthetic\" + 光と影の交互ゾーンで日本的な美意識を演出","プロンプトで「不可能な映像」を作るコツ:\n\n物理法則を破る指示:\n・\"passes through solid wall\" — 壁通過\n・\"frozen moment in time\" — 時間停止\n・\"ultra slow motion\" — 超スロー\n\nそれを映画的にする品質ブースター:\n・chiaroscuro lighting — 明暗のドラマ\n・volumetric god rays — 光線の立体感\n・dust particles — 空気の存在感\n・golden hour — 黄金の光\n\nRound 1と合わせて6技法×プロンプト全文。保存しておくと便利🔖\n6本合計コスト: $2.10（¥315）"],"media":["https://v3b.fal.media/files/b/0a94dc52/W2bNnFR9dFlOE0wJSLzBZ_output.mp4","https://v3b.fal.media/files/b/0a94dc53/C63mxi02apJhNaG_cLKtT_output.mp4","https://v3b.fal.media/files/b/0a94dc53/o4V9mWLFjcjTydrAeUIvg_output.mp4"],"created":"2026-04-04","posted_date":""},{"id":"2026-04-04-P2-claude-video-mcp","path":"10_X-Marketing/drafts/posts/2026-04-04-P2-claude-video-mcp.md","title":"2026-04-04-P2-claude-video-mcp","post_type":"","status":"legacy","quality":"","body":"- https://x.com/om_patel5/status/2039939578694438979 (❤️2,366 🔖5,228)\n- https://x.com/SuguruKun_ai/status/2039997135664648215 (❤️952 🔖1,213)\n\n---","thread":["具体的なフロー:\n\n① NB2 Editでシーン画像生成（$0.03）\n② 同じ画像をKling/Vidu/Veo等に並列I2V送信\n③ FFmpegで品質自動チェック（scene>0.4で破綻検出）\n④ ベストテイク選定\n⑤ Remotionで字幕+エフェクト追加（$0）\n\n60秒アニメの合計コスト: 約$2.73（¥410）\n\nリンクはリプ欄の下に🔗"],"media":[],"created":"2026-04-04","posted_date":""},{"id":"2026-04-04-P3-article-promo","path":"10_X-Marketing/drafts/posts/2026-04-04-P3-article-promo.md","title":"2026-04-04-P3-article-promo","post_type":"x-post","status":"legacy","quality":"","body":"X Article「AI動画生成7モデル完全比較」のプロモーション投稿。\nブックマーク需要が高いテーマなので「保存して見返す」動機を刺激する。\n\n---","thread":["- 図解2（コスト比較グラフ）\n- 図解3（用途別マップ）\n- 参考リンク一覧"],"media":[],"created":"2026-04-04","posted_date":""},{"id":"2026-04-04-P3-overseas-techniques","path":"10_X-Marketing/drafts/posts/2026-04-04-P3-overseas-techniques.md","title":"2026-04-04-P3-overseas-techniques","post_type":"","status":"legacy","quality":"","body":"- Timeline Markers: https://x.com/doctorwasif/status/2039221897116725724 (❤️91 🔖40)\n- Art World Step-In: https://x.com/Kling_ai/status/2038949432985637063 (❤️494 🔖109)\n- Top-View Miniature: https://x.com/onofumi_AI/status/2038213681067274555 (❤️621 🔖385)","thread":["①Timeline Markers:\n「0-3s: handheld medium shot, samurai walks calmly | 3-6s: wind picks up, ground cracks with golden light | 6-10s: supernatural transformation, shockwave, wide angle pull-back」\n\nポイント: 秒数で区切ると、1本の動画内で「静→動→爆発」の感情曲線が作れる。","②Art World Step-In（浮世絵版で検証）:\n「camera pushes through framed ukiyo-e woodblock print, flat painted world transforms into living 3D environment」\n\n浮世絵の大波が3Dで動き出す。日本の名画でやると海外ウケもかなりよさそう✨","③Top-View Miniature:\n「top-down overhead view, miniature scale diorama, tiny paper crane flies through Japanese room, tilt-shift bokeh effect, continuous one-take」\n\nティルトシフトで本物のミニチュアみたいになる。Kling V3の物理表現がここで活きてる。\n\nコスト: 3本で$1.05（¥158）\n全てClaude Code + MCP経由で生成🎬"],"media":["https://v3b.fal.media/files/b/0a94d9fd/FOZgh47rWxdQasO9uavyb_output.mp4","https://v3b.fal.media/files/b/0a94d9fd/tSJf-xUMmdpvZTPqCXJR6_output.mp4","https://v3b.fal.media/files/b/0a94d9fd/0FTK-aHwHHU0_xgc2vvSn_output.mp4"],"created":"2026-04-04","posted_date":""},{"id":"2026-04-04-P4-obsidian-memory","path":"10_X-Marketing/drafts/posts/2026-04-04-P4-obsidian-memory.md","title":"2026-04-04-P4-obsidian-memory","post_type":"","status":"legacy","quality":"","body":"- https://x.com/tom_doerr/status/2039906409387610408 (❤️1,377 🔖2,350)\n\n---","thread":[],"media":[],"created":"2026-04-04","posted_date":""},{"id":"2026-04-03-P2-nb2-kling-workflow","path":"10_X-Marketing/drafts/posts/2026-04-03-P2-nb2-kling-workflow.md","title":"2026-04-03-P2-nb2-kling-workflow","post_type":"","status":"legacy","quality":"","body":"- 元Disney/PrimeVideoクリエイターが「NB画像→Kling動画」のハイブリッドWFを公開\n- 海外で定番化しつつあるが、日本語圏ではまだ解説が少ない\n- Ryoは既にこのフローで制作しており、コスト感も実測済み\n- ソース: https://x.com/drpeepee/status/2039811667979297181\n\n---","thread":[],"media":[],"created":"2026-04-03","posted_date":""},{"id":"2026-04-03-P3-cinema-techniques","path":"10_X-Marketing/drafts/posts/2026-04-03-P3-cinema-techniques.md","title":"2026-04-03-P3-cinema-techniques","post_type":"","status":"legacy","quality":"","body":"同一画像から5種類の映画的カメラワークをプロンプトだけで指定し、\nKling 3.0がどこまで再現できるかを検証。\n海外クリエイター（PrimeVideo/Disney出身者）が始めたアプローチを\n日本語圏で先行検証する。" an.yaml (week×item×match×why) に蒸留し既存キューと突合するだけで、LLM不要・$0・理由付きの「今日の一手」が決定論で出せる (Ryo Ops実装・rank1=G2のWeek1遅延検出が初出力) | 出所: Strategy Command構築 | 実証度: 実機1回 | 既ノート: なし"},{"date":"2026-07-10","text":"2026-07-10 | Tips MCPは本文imageブロックの外部URL (fal.media) を**保存時に自動で static.tips.jp へ再ホスト**する (G2・8枚で実測) — Tipsは画像アップロードE2E不要・URL直挿しでOK。有料化は電話番号+口座登録が前提 (previewエラーで検出可) | 出所: G2 Tips投入 | 実証度: 実機1回 | 既ノート: なし"},{"date":"2026-07-10","text":"2026-07-10 | noteのdraft_saveは外部srcの`<img>`を**黙って剥ぎ取る** (Tipsと真逆・`<p><\/p>`だけ残る)。正解=①presigned_post→②S3直POST→③`<figure><img src=assets.st-note.com/img/KEY>`+image_keys出現順、サムネは`/api/v1/image_upload/note_eyecatch`で**縦横比1280:670厳守** (16:9は422、ffmpeg crop→scaleで変換)。7記事29枚+サムネ7本で完走、ツール化=`12_Contents_making/tools/note_image_push.py` | 出所: note下書き画像修正 | 実証度: 実機7本 | 既ノート: なし"},{"date":"2026-07-10","text":"2026-07-10 | noteの画像キャプション欄=figure内`<figcaption>`だが、draft_save後にnoteが**非同期でfigureを正規化 (alt剥がし・width620化)** するため、保存直後のmarkupに注入すると空にされる — 正解は「正規化後のbodyをGET→figcaption注入→再draft_save」の2段。alt消失後の図解対応付けはbody出現順マッピング一択。7記事22図解で実証、ツール=`tools/note_captions2.py` | 出所: noteキャプション実装 | 実証度: 実機7本 | 既ノート: なし"},{"date":"2026-07-10","text":"2026-07-10 | gemini CLI v0.1.3はOAuth失効でone-shotが認証待ちのままハング(exit 124)・`~/.gemini/settings.json`の重量級MCP登録が起動オーバーヘッド — 外部CLI依存ゲートは「生死確認→即フォールバック」設計が正解(fact-gateは当面WebSearch第一) | 出所: fact-gate実装 | 実証度: 実機1回 | 既ノート: なし"},{"date":"2026-07-10","text":"2026-07-10 | PyYAMLは無クォート日付をdatetime.date型へ自動変換しjson.dumpがcrash — YAML→JSON中継スクリプトは文字列化防御(_yaml_str)必須(mobile_ops build_data.pyで実害→修正済) | 出所: RyoOps記事タブ実装 | 実証度: 実機 | 既ノート: なし"},{"date":"2026-07-10","text":"2026-07-10 | バイラル数字は裏取り前に算数チェックが最速 — 「Anthropic社内Obsidian 8893ノード/4729リンク」は密度0.53/ノート=過半が孤立の疎グラフで「密な知識銀河」主張と自己矛盾。実際はポルト在住編集者の個人vaultをX釣りアカが「社内基盤流出」と改変 (Community Notes misleading判定・キャプション差し替え変種も存在)。一次情報裏取り(§3)の前段に「数字の内部整合チェック」を置くと$0で即棄却できる → ハーネス環境監査_Obsidianバイラル検証_2026-07-10"},{"date":"2026-07-10","text":"2026-07-10 | vault初のグラフ全数調査: 実ノート4,327・リンク5,395・密度1.25・完全孤立0 (MOC 3本が被リンク網で担保)。最大の負債はbroken wikilink約1,420本(全リンクの26%) — 主因は log.md/13_AI_Lab から Claude memory slug (project_*) への**越境リンク** = vault と memory の名前空間衝突という構造問題で、個別修正でなく規約側の手当てが必要 → ハーネス環境監査_Obsidianバイラル検証_2026-07-10"},{"date":"2026-07-10","text":"2026-07-10 | 単一HTML静的サイトへのモーション層追加は「markup+CSS担当」と「JSエンジン担当」の2 Sonnet並列+事前契約書 (class名/data属性/window API を先に固定) で編集衝突ゼロ・一発合流できた。鍵は `html.motion-ok` ゲート — JS/CDN が死んでも全コンテンツ表示の静的サイトに退化する設計。副産物: v1由来の `body{cursor:none}` 無条件+`.cursor`常時表示は (pointer:fine) 非対応環境で幽霊カーソル化 — カスタムカーソルは「初回 pointermove で body class 付与」駆動が正解 | 出所: Movie-portfolio v2 実装 | 実証度: puppeteer 4パス実測 | 既ノート: なし"},{"date":"2026-07-07","text":"2026-07-07 | MCPセットアップ解説はコモディティ化が言説一致 (公式MCP出揃い)、需要は hooks/subagent委譲/メモリ設計/権限制御へ移動。売れ筋形式は「キット+仕組み一式」(Brain 3日¥9,800→¥19,800型) — 商品化済 claude-harness-kit | 出所: Hermes X 3クエリ市場調査 | 実証度: 出典付き調査 (URL未フェッチ検証) | 既ノート: ハーネス教材市場調査_2026-07"},{"date":"2026-07-07","text":"2026-07-07 | 自社ハーネスの棚卸しで判明: 教材価値が最も高いのは「規律を物理強制に格上げする」横断パターン (Self-test Q1/ng_tools非ロード/BLOCK偽陽性ゼロ二層/flock直列化/全submit自動prompt保存) + 事故台帳10件が説得力の核 | 出所: vault棚卸し (Explore agent) | 実証度: 実運用2ヶ月 | 既ノート: なし (商品 BLUEPRINT に反映済)"},{"date":"2026-07-07","text":"2026-07-07 | 「スキルは立派なのに実装が別の道を歩く」乖離の検出法: UIコード (Edit Lab SFXタブ=Hunyuan/ElevenLabs) とスキル正本 (Beatoven一本足) のツール選定を突合する — 96日放置の矛盾はスキル間grepでなく実装との照合で初めて見えた | 出所: SFXハーネスv2監査 | 実証度: 実測1件 | 既ノート: sfx_harness_v2_design_2026-07-07"},{"date":"2026-07-07","text":"2026-07-07 | AI SFXの2026市場: video→Foley第一=Mirelo v1.5 (唯一のブラインド実測優位67-77%・ゼロプロンプトが鉄則)、text→SFX第一=ElevenLabs (30s/ループ/48kHz)。現場主流は「V2A一次生成→T2A細部仕上げ」二段構成。AudioBox停止・DeepMind V2A非公開 | 出所: sfx-market-scout Web調査 | 実証度: 出典付き調査 | 既ノート: sfx_harness_v2_design_2026-07-07"},{"date":"2026-07-07","text":"2026-07-07 | TikTok Creative Centerトレンドセクションは停止中(「Q2復帰」表示のまま7月も停止・裏API要認証40101実測)、公式Research APIは学術限定=個人クリエイターの自動化経路ゼロ | 出所: Trend Radar設計調査(Web実測) | 実証度: 実機1回 | 既ノート: trend_radar_harness"},{"date":"2026-07-07","text":"2026-07-07 | Google Trends RSS geo=JPは認証不要で生存(実測200・概算ボリューム付き)=日本トレンドの最強無料cronソース。pytrendsは2025-04アーカイブ死亡、後継はtrendspyg | 出所: Trend Radar設計調査(Web実測) | 実証度: 実機1回 | 既ノート: trend_radar_harness"},{"date":"2026-07-07","text":"2026-07-07 | YouTube急上昇は2025-07廃止済でmostPopularは音楽/映画/ゲームチャート寄りに変質(1unit)。汎用velocity検知はsearch.list publishedAfter24h×viewCount順(100units)自作が定石。ニコニコSnapshot API v2は認証不要JSONで生存(RSSは26-04死亡) | 出所: Trend Radar設計調査(Web実測) | 実証度: 実機1回 | 既ノート: trend_radar_harness"},{"date":"2026-07-07","text":"2026-07-07 | Thariq「Field Guide to Fable」8テクニックで棚卸→Ryoハーネスは6つ既実装、残穴は quiz-gate検収(設計Fable/実装Sonnet体制の構造弱点)とGTM未知の未知(posted=0/conversion 0行)のみ | 出所: 会話(記事分析) | 実証度: 理論 | 既ノート: Thariq_unknowns記事×Ryoシステム棚卸_2026-07-07"},{"date":"2026-07-07","text":"2026-07-07 | スキル archive 台帳の候補23本中7本が 07-06 に archive 実行済みだったのに台帳は「未実行」と自称したままドリフト — 候補台帳は status 欄+実ディレクトリ weekly 突合が無いと必ず腐る (HANDOFF 肥大と同型の「台帳の腐敗」パターン) | 出所: スキル棚卸し実測 | 実証度: 実機1回 | 既ノート: トークン抑制とスケジュール自動化計画_2026-07-07"},{"date":"2026-07-07","text":"2026-07-07 | 07-04記録「codex exec 恒久ハング」の原因確定 = OAuth refresh token 失効 (`already used. Please log out and sign in again`)。execはエラーを吐きながら止まらず900s timeout×2、死活チェックは応答時間でなく stderr の refresh token エラー grep が確実。修理=`codex logout && codex login` (Ryo手番)。story-critique等 codex依存レーン全部に影響中 | 出所: hyoui-eval 審査障害の切り分け | 実証度: 実機3回 | 既ノート: なし"},{"date":"2026-07-06","text":"2026-07-06 | Fable5で音声インターフェース対応のメモアプリを構築したところ、期待以上にうまく動作し、メモ作成の仕組みが確立できた。 | 出所: Ryo発話(voice) 260706_1814_Fable5による音声メモアプリの実装成功_bc0b1213 | 実証度: 理論 | 既ノート: なし"},{"date":"2026-07-06","text":"2026-07-06 | `claude -p` を自動化パイプラインから呼ぶ時は `--setting-sources \"\" --no-session-persistence` + vault外cwd が必須 — 無指定だと user/project hooks (Renoise通知・critique催促等) がセッション注入され、モデルが本来タスクでなくhookへの応答を返す+起動300s超に激重化。フラグ適用で15s/正常YAML (20倍改善) | 出所: voice-memo-system 検収 | 実証度: 実機3回(失敗2様態+修正確認) | 既ノート: なし"},{"date":"2026-07-06","text":"2026-07-06 | LLM分類サブルーチンに「現在値をヒントとして渡す」と修復ループが死ぬ — reclassifyがfallback値(diary)をヒント扱い→「ヒント必ず尊重」ロジックが新分類を上書きし永遠にdiary。ヒントは人間由来入力(携帯チップ)専用に限定し、自動修復パスでは常にNoneが正解 | 出所: voice-memo-system 検収 | 実証度: 実機1回(再現+修正確認) | 既ノート: なし"},{"date":"2026-07-06","text":"2026-07-06 | WSL で `python3 -m venv` + pip install を vault 直下 (`/mnt/c/...` Windows drvfs) に作ると大量小ファイルI/Oが極端に遅く、`pip install --upgrade pip` だけで15分以上詰まった (faster-whisper install 実測)。`~/.venvs/<name>` などネイティブext4上に作って `.venv` をシンボリックリンクにしたら同じインストールが1分で完走 — WSL上のPython venv系セットアップは全て同パターンで高速化できる | 出所: voice-memo-system WS-C ingest構築 | 実証度: 実機1回(再現比較) | 既ノート: なし"},{"date":"2026-07-06","text":"2026-07-06 | ゲート系lintの落とし穴: 標準ライブラリ簡易YAMLパーサは `null` を文字列\"null\"として返し truthy 判定→G1未通過なのに vacuous PASS になる。ゲート実装は「未通過fixture」を必ずテストケースに含めること (正常系self-testだけでは検出不能だった) | 出所: product-content-funnel 検収 | 実証度: 実機1回(再現+修正確認) | 既ノート: なし"},{"date":"2026-07-06","text":"2026-07-06 | 「AIで作れる」と「実務で回る」の差は成果物でなくゲート構造 — 可逆作業(生成/照合)はAI・不可逆判断(事実/価格/公開)は人間、を approved フラグと exit code で物理強制すると1ソース4チャネル一貫制作が回る (core_message.yaml SSOT方式) | 出所: product-content-funnel 設計 | 実証度: E2Eダミー1周 | 既ノート: なし"},{"date":"2026-07-03","text":"2026-07-03 スキル棚卸で「参照数≠稼働」が定量化: story-critique 参照81件/実行5回、166本中34日間の実行実績があるのは十数本のみ — ドキュメント上の存在感と実働は別指標で見ないと棚卸を誤る (skill_dashboard.html)"},{"date":"2026-07-02","text":"2026-07-02 | 156スキル vs conversion_log 0行・deal_ledger lead 0件 — 律速は生産力でなく「値段付きask数/週」。是正はハーネス追加でなくask周辺の全自動化 (ask_kit_202607=送信ボタンだけ残す) | 出所: 敵対的vault監査の会話 | 実証度: 台帳実測 | 既ノート: マネタイズ観点_供給リッチ需要プア"},{"date":"2026-07-02","text":"2026-07-02 | サブエージェントAPI一斉529時はスクリプト抽出に切替 — 依存グラフ604エッジ/150スキルをPowerShell一発で抽出、むしろ再現可能になった | 出所: スキル監査セッション | 実証度: 実機1回 | 既ノート: なし"},{"date":"2026-07-02","text":"2026-07-02 | LLM評価器は「判定」させず「属性の報告」だけさせてローカル機械比較すると誤判定が激減する (キャラQC/HEX照合) | 出所: character-consistency-critique 設計 | 実証度: 設計+KAGIUTA傍証 | 既ノート: なし"},{"date":"2026-07-02","text":"2026-07-02 | Windows自動化の最恐罠=.cmdのUTF-8日本語。cmd.exeはCP932固定パース(chcp 65001無効・実証)で行吸い込み→Task 5本が2週間silent死。ログすら書けない故障はexit code監視でしか見えない | 出所: ハーネス診断→修理 | 実証度: 実機再現+修理完了 | 既ノート: lessons.md 2026-07-02"},{"date":"2026-07-02","text":"2026-07-02 | スキルdescription(常駐context)は114本が500字超で計19万字の常駐税だった。frontmatter=索引/本文=JITの分離規律は「増えた後の監査」が必要 — Sonnet並列7体で1パス刈り込み可能 | 出所: ハーネス診断 | 実証度: 実測 | 既ノート: なし"},{"date":"2026-07-02","text":"2026-07-02 | 自己進化執筆ループの設計則: 測定は機械(script+閾値json外部化)・解釈だけLLM・還流先を先に固定(voice-failures/winning_patterns/banger/勝ち基準)。「学習する仕組み」は生成器を増やさず既存ループに入口(コーパス)と出口(実測還流)を接続するだけで成立する | 出所: X自己進化システム構築 | 実証度: 設計+集計段は578投稿で実走 | 既ノート: なし"}],"archived":[{"date":"2026-07-09","text":"[2026-07-09] 集合ポスター(全7キャラ集結)**編集モデル**対決 GPT Image 2 Edit vs Seedream 5.0 Pro Edit (同一参照8枚・同一プロンプト・2シーン=ポスター縦/グランドシアター舞台横): **Seedream=環境/舞台の作り込み＋2K解像＋虹彩透明感で圧勝**(シャンデリア/緑大理石柱/スポット光条/被写界深度=映画スチル級・ファイル4.5MB)。**GPT=画中テキスト描画が唯一の明確な勝ち筋**(ミラの黒板に日本語「声は、世界の記憶。♪」を自動描き込み／Seedreamは黒板空白)＋暗め高コントラストの\"劇場ポスター\"寄り・ファイル1.3MB。キャラ同定は互角(ヘテロクロミア＋差し色オレンジ維持)、\"声の商人カナデ\"は両者とも仮面figureに解釈=参照(pattern_c)の抽象性が原因。**使い分け結論: 背景込みキーV/舞台集合絵=Seedream、文字入りポスター/字幕込み構図=GPT**。→ 260503_contest_kagiuta_pilot/poster_bakeoff/ 4枚"},{"date":"2026-07-09","text":"[2026-07-09] キャラデザ9モデル比較v2(クエビコ/案山子守り神): Seedream 5.0 Pro が2題連続で総合本命(厚塗り+パレット規律+設定資料感)。双璧Flux 2 Max。\"愛される\"読みはNano Banana 2(後光+穏やか面)。**Krea v2 Largeは重厚コンセプトアートでは中位**(審美は出るが仕上げsofter)。手法: 参照キャラの\"メタスタイルのみ\"(厚塗り/ミュート+差し色1/巨大シルエット/和×異物)を言語化しプロンプト化→全モデルがオリジナルに着地(非模倣)。timeless-character-designer 4力DNA併用で愛され設計。→ R2比較+GDrive 260709_kakashisama/kuebiko。"},{"date":"2026-07-09","text":"[2026-07-09] Seedream 5.0 Pro はアニメ・キャラ**リファレンスシート**用途でトップ層＝背景/全身/デザイン要素の忠実度＋躍動ポーズで同門V4.5/V5 Liteを上回り、双璧はFlux 2 Maxのみ。Kling(4K)/GPT Image 2は個性強だが指示外背景追加・洋画振り切りでモデルシートからは逸脱=キーV向き。検証: 9モデル横並び「カリン」→ R2比較ページ+GDrive 260709_spice/karin。"},{"date":"2026-07-08","text":"[2026-07-08] 長寿キャラ15体解剖で得た最重要パターン3つ: ①欠落の法則 (キティ=口/ドラえもん=耳 — 完全体は尊敬されるが愛されない、欠落は投影受け皿+保護欲+物語駆動の3役) ②不変核と可変殻 (ミッキーは耳2円と声だけ98年不変、残り全部を時代に売り渡した) ③物語エンジン6型 (道具/事件/収集/日常/空想/攻防) → century_case_studies.md P1〜P12"},{"date":"2026-07-08","text":"[2026-07-08] LLM品質ゲート自動化の一般解: 「採点」を「識別」タスクに変換する — 本命+LUT標準デコイを混ぜて文脈遮断審判に識別させると正解が存在するため自家採点バイアスが構造で消える (順序ブラインド: セリフ識別はDNA未読で先に実行)。timeless-character-designer Phase 1.5 で実装、他の主観ゲート (文体・構図・演出) にも転用可能"},{"date":"2026-07-08","text":"[2026-07-08] キャラ設計の「労力→魅力」因果を4力モデルに分解: 刻印(3秒で覚える)→共感(10分で心が動く)→愛着(10年推せる)→伝播(ファンが語る)。ビジュアル設計は刻印しか作らない — 感情移入は傷/want-need、ファン化は物語エンジン(反復装置)+余白(二次創作燃料)が担う。画像生成前の$0テキストゲート(3シチュエーション行動テスト/3行セリフテスト/推せる一文テスト)でDNA不足を検出可能 (timeless-character-designer v2 で実装)"},{"date":"2026-07-07","text":"[2026-07-07] winner-study#009 HEAVENLY//GHOST Ep0 (COLOTEK・15分AIアニメ) 解剖: 転用原理3件 ①世界観の疑似公文書化 (バクロニム定義タイポカットに用語説明を専任させ台詞は感情に専念) ②代償明示型パワーアップ (対価を会話内で会計処理してから変身) ③弱さ描写に尺の半分を割く配分 (回想+対峙47%・覚醒後は短く鮮烈に)。cliche_atlas CAM-008/DIR-013 追記済 → HEAVENLY_GHOST_再現ブループリント | 実証度: 書き起こしベース (video_source: unconfirmed)"},{"date":"2026-07-07","text":"2026-07-07 映像評価刷新の発見: 機械評価の2大欠落=演技違和感とストーリー意味整合 (人間keep/retakeが手動で埋めていた)。rubric化の勘所は採点anchorを「人間が捨てる理由の言葉」(『顔は演技しているが体がついてこない』等) で書くこと+人間判定との突合台帳で一致率を測ること → Skill_Catalog/evaluation/"},{"date":"2026-07-07","text":"[2026-07-07] headless=new は --window-size にUI分が含まれ実ビューポート約739px / html,body の overflow:hidden はルート伝播でビューポート境界クリップ→スライド下端白抜け。クリップは内側要素に置く+はみ出し検知は getBoundingClientRect 実測 (pptx-deck-forge 構築で実証)"},{"date":"2026-07-07","text":"[2026-07-07] 憑依 (上位→下位モデル再現) は「規律軸」と「内容深度軸」に分離できる — 第三者評価の実測で Opus素7.7→注入v2で9.2、自己検証/正直さは注入で9.5まで閉じるが「第三の翻訳軸・一次体験の生々しさ」は注入では埋まらない。量産=憑依Opus・勝負=P-lite/Fable の分業根拠が数値で立った (fable-mode hyoui-eval 260707_note、審査=独立claude -p。codex exec は900s timeout課題) | 実証度: 実機1周"},{"date":"2026-07-07","text":"[2026-07-07] 検収E2Eは「実装が正しい」だけでなく「設計の穴」を掴む — family-films v0.8 で peak直前カット短縮 (速→遅コントラスト) が peak=2カット目のとき opening を潰す条件漏れを、unit 26/26 PASS 通過後の E2E実測 (opening 1.53s) が検出。演出ルール同士の相互作用は unit の個別検証をすり抜ける — 合成E2Eで「出力波形」を見るのが安い保険"},{"date":"2026-07-07","text":"[2026-07-07] aHash (8x8平均閾値) は平坦単色画像で縮退し全画像が重複判定になる — E2Eフィクスチャは必ずseededテクスチャで作る。もう1つ: dedup のE2E検証は「成功/失敗で採用カット数が分離する素材数」を逆算して仕込む (family-films v0.8: 15枚なら成功N=6/失敗N=7で分離、14枚だと両方6で検出不能)。閾値系機能のテストは境界値が偶然一致しないか先に手計算 (family-films v0.8 検収実証、design§12-6)"},{"date":"2026-07-07","text":"[2026-07-07] Tips (tips.jp) は日本の有料記事プラットフォームで唯一の公式MCP提供 (https://tips.jp/mcp・OAuth・下書き/価格/タグ/販売履歴+公開操作まで)。note=非公式Cookie方式・Brain=API皆無と三者三様 — 「公開ツールを持つMCPは公開系だけ呼び出し禁止リストに載せる」が新しい運用パターン (出典 tips.jp/u/tipsinfo/a/kLTRjyN2)"},{"date":"2026-07-07","text":"[2026-07-07] fable_mode_guard が Fable 5 稼働セッションを「opus[1m]」と誤検出して毎ターン注入 (本セッション実証)。原因確定 = セッション初回ターンは transcript に assistant 行が無く settings.json の \"model\" へフォールバックしていた。**修正済** (初回ターンは注入見送り・2ターン目以降 transcript 実測が正、selftest 9/9)。教訓: モデル検出は「設定値」でなく「実測値」— 実測不能時は誤断定でなく沈黙が正解"},{"date":"2026-07-07","text":"[2026-07-07] HANDOFF.md が slim 契約 (v2.4) のまま 27.9K chars に肥大 — 「読むだけだと腐る」対策の逆流で書きすぎ、内容は memory topic file と二重常駐。要約ファイルには size gate (>8KB warn) が無いと必ず膨らむ — 圧縮ルールは物理ゲートとセットでないと維持されない"},{"date":"2026-07-07","text":"[2026-07-07] 資産化の欠落は「保管庫」でなく「流れ」— Audio庫は規約+Bases+hook完備でも資産0件のまま96日空回りしていた。捕獲(自動manifest 1486行)と収蔵規約が揃っていても、判定→回収(harvest)の接続工程が無いとライブラリは永遠に空。同型の診断は「契約ファイルの実適用件数を数える」で機械化できる (Asset Vault v1調査)"},{"date":"2026-07-07","text":"[2026-07-07] PreToolUse hook の permissionDecision:\"ask\" は「基本禁止・例外は人間承認」の物理実装として exit 2 block より優れる (blockだと承認後も通れない・askなら承認1回で実行継続) — gpt_image_fal_gate.py で初採用、vault内の既存gateはすべてexit 2方式だった"},{"date":"2026-07-07","text":"[2026-07-07] note.com のメール+パスワード自動ログインは死んでいる (note-mcp-server実測: Login succeeded but session cookie not found)。非公式API連携は「Cookie直貼り (note_session_v5)」だけが安定 — パスワード方式をコードに残すと黙って読み取り専用に落ちる罠"},{"date":"2026-07-07","text":"[2026-07-07] PixVerse CLI v1.0.7 の画像モデルは7つ (qwen/seedream×3/gemini×3) で gpt-image-2.0 は不在 — CLAUDE.md の第3経路記述はCLI実機と不一致だった。「ルールに書いた具体コマンドは四半期ごとに実機と突合」が必要 (dist難読化でAPI素通しかは未確定・初回フォールバック時に1発検証)"},{"date":"2026-07-07","text":"2026-07-07: WeeklyKnowledgeOps が claude.cmd ハードコードで7-05から黙死 (morning_command には fallback 済みなのに横展開漏れ) → claude_launcher.py に解決ロジック SSOT 化。「失敗したら個別でなくシステムを直す」の実例 (Anthropic loops 記事と同日適用)"},{"date":"2026-07-07","text":"[2026-07-07] スキル監査の型「在庫でなく配線を見る」: sound-design-director は高品質なのに参照ゼロの孤立部品、WF1(最頻用)は音響Phaseゼロ — grep -rl で「どこから呼ばれるか」を先に数えると宝の持ち腐れが機械的に見つかる (wf-audio-gap-scout調査)"},{"date":"2026-07-07","text":"[2026-07-07] AI生成BGMは指定bpmもLUFSも無検収で通っていた実証: 過去案件の実BGMが-33.5 LUFS (目安-18から15dB低)。生成物は「指定値でなく実測値を契約ファイル(music.yaml)に落とす」が音ハメ/整音の再現性の土台 (音楽ハーネスv3)"},{"date":"2026-07-06","text":"2026-07-06 yt-dlp縦ショート走査はジャンル依存が激烈: 副業/AIツール系=ショート出現率数%以下(長尺が検索を占有)・猫系=28%。YouTube検索URL+sp=EgIYAQ%3D%3D(4分未満フィルタ)で改善するが情報解説系の安定収集はData API必須 — shorts-forge実測 SHORTS_FORGE_DESIGN"},{"date":"2026-07-06","text":"[2026-07-06] Blenderノード名は環境言語でローカライズされ nodes.get(\"Background\")が黙ってNone (日本語環境=\"背景\")。node.type検索が唯一安全。ソケット名は英語のまま — arch3d-studioと blender3d.py の両方で踏んだ再現性のある罠"},{"date":"2026-07-06","text":"[2026-07-06] Blender 5.1 で compositor API が総破壊: scene.use_nodes/node_tree消滅→scene.compositing_node_group、Composite終端→NodeGroupOutput、MixRGB撤去(ShaderNodeMixRGBが代替可)、FileOutputの新file_output_itemsは設定が黙って無視される実機バグ→render.filepath+パス毎render()で回避。公式docに無く実機検証のみで確定 (blender3d.py 5.1移行で5件、README gotchas節に記録)"},{"date":"2026-07-06","text":"2026-07-06 Claude Code は同一イベントで project層+user層 の hook を並列実行する → state ファイルの mtime 比較による二重発火抑制はレースで両方出力される。fcntl.flock で read-modify-write を直列化+最終出力時刻を state 内に持つ方式が正解 (fable_mode_guard v3.1 で実測修正、selftest に並列2プロセスケースを常設)"},{"date":"2026-07-06","text":"[2026-07-06] HyperFrames Windows render は video フレームキャッシュの symlink で非管理者 EPERM (cli.js解読: メインパスだけ materializeSymlinks copy代替を渡していない)。回避=開発者モードON or --docker。動画クリップ無し composition は無傷。なお cmd/PS/WSLENV いずれも「空の環境変数」を Windows プロセスに渡せない (HYPERFRAMES_EXTRACT_CACHE_DIR= 無効化が不可能な理由)"},{"date":"2026-07-06","text":"[2026-07-06] HyperFrames 0.7.36 で WSL native FS レンダ完全復活 — 2026-04「WSL全滅」はブラウザ内video seek時代の話で、現行は ffmpeg 事前フレーム抽出に設計変更済 (video入り5s draftを69sで実証)。「ツールがダメ」の結論は数ヶ月でアーキテクチャごと無効化されうる — 却下判断には根拠となった内部方式を書き残すこと"},{"date":"2026-07-06","text":"[2026-07-06] pkill -f は自分のコマンド文字列にもマッチして自殺する — compound command内のpkillはパターンを [n]ext 形式で自己非マッチ化必須 (同一セッションで2回踏んだ)"},{"date":"2026-07-06","text":"[2026-07-06] 認証壁の内側UIをPMが無人検証する型: supabase admin generateLink→verifyOtp→@supabase/ssr形式Cookie自作→remotion同梱chrome-headless-shellにCDP直結でスクショ。パスワード不要・依存追加ゼロ (Node22 global WebSocket)"}],"beliefs":[{"date":"2026-07-04","text":"2026-07-04 | \"テーマは無言で届く設計。結末にタグラインを文字で出さない (didactic=蛇足)\" | 出所: KAGIUTA仕上げ確定判断 (タグライン「声がなくても、返事はできる。」の意図削除・retrospective_kagiuta_260704 で収穫) | 候補カテゴリ: 制作/美学 | → draft済 05_Beliefs/_drafts/テーマは無言で届く設計_didactic排除"},{"date":"2026-07-03","text":"2026-07-03 | \"本当に魅力的なアニメや映像は感情移入できて、入り込める作品、何かに共感するような作品だと思う。平均ではなく、より高みで突出した映像やストーリーを\" | 出所: 絵コンテシステム構築の対話 (ワンピース/鬼滅/VIVANT/リブートを例に) | 候補カテゴリ: 制作/美学 | → draft済 05_Beliefs/_drafts/突出した映像美学_共感より高み"},{"date":"2026-07-03","text":"2026-07-03 | \"これから本当に差がつくのは、AIに何を作らせるかではなく、AIにどう映像を理解させるかだ。Fableは単なる脚本作成ツールではなく、AIに映像の構成力や感情設計を教え込むための新しい制作パートナーになり得る\" | 出所: 同上 (scene_corpus 構想の原点) | 候補カテゴリ: 制作/AI活用 | → draft済 05_Beliefs/_drafts/AIに映像理解を教える_Fable制作パートナー論"},{"date":"2026-07-02","text":"2026-07-02 | \"どんどんQCチェックが洗練されてくる仕組みはどんどん取り入れていきたい\" | 出所: character-consistency-critique 新設直後の会話 (known_failures/tol が育つ設計への反応) | 候補カテゴリ: 制作/仕組み化 | → draft済 05_Beliefs/_drafts/QCチェック洗練を積極採用"},{"date":"2026-06-15","text":"2026-06-15 | \"「AIで作りました」自体に価値はない。生成で売るな、上流(企画→構成→制作→編集→SNS)を握って『課題解決の発注』として受注しろ。安さは武器であって売りではない\" | 出所: マネタイズ観点の対話 | 候補カテゴリ: 働き方/事業 | 拡張候補 → AI映像受託_生成で売るな上流を握れ_ドクトリン | → draft済 05_Beliefs/_drafts/AI映像受託_生成で売るな上流を握れ"},{"date":"2026-06-15","text":"2026-06-15 | \"全てのフォルダが一体となって資産形成していく仕組みにしたい。検証やチャットで出た信念・想いも貯めて資産にする\" | 出所: 本セッション | 候補カテゴリ: 働き方/知識経営 | → draft済 05_Beliefs/_drafts/知識資産形成システム_全フォルダ連動"},{"date":"","text":"\"Knowledge\""},{"date":"","text":"トリガー: 会話/検証で「自分は〜だと思う」「〜であるべき」「〜が大事」等、**価値判断・信条** が出た時"},{"date":"","text":"形式: `- [ ] {日付} | \"{Ryoの言葉の引用}\" | 出所: {どの会話/検証} | 候補カテゴリ: {仕事/制作/学び/人/働き方}`"},{"date":"","text":"解釈・脚色しない。発言(事実)だけ残す。"}],"health":{"score":35,"broken":353,"xns":63,"orphans":0}},"today_plan":{"date":"2026-07-10","week":2,"pace":{"last_posted":null,"days_gap":null,"month_actual_x":0,"month_target_x":20},"type_gap":[{"type":"rescue","target_pct":40,"actual_pct":0,"gap_pct":40},{"type":"verification","target_pct":30,"actual_pct":0,"gap_pct":30},{"type":"conversation","target_pct":15,"actual_pct":0,"gap_pct":15},{"type":"work","target /* ---- Toast ---- */
let toastTimer=null;
function toast(msg,opts){
  const t=document.getElementById('toast');
  t.innerHTML='';
  const span=document.createElement('span');span.textContent=msg;t.appendChild(span);
  if(opts&&opts.retry){
    const b=document.createElement('button');b.textContent=opts.label||'再試行';
    b.onclick=()=>{t.classList.remove('show');opts.retry()};
    t.appendChild(b);
  }
  t.classList.add('show');
  clearTimeout(toastTimer);
  const dur=(opts&&opts.duration)?opts.duration:(opts&&opts.retry?5000:2200);
  toastTimer=setTimeout(()=>t.classList.remove('show'),dur);
}

/* ---- Clipboard ---- */
async function copyText(text,btn){
  try{
    await navigator.clipboard.writeText(text);
    toast('コピーしました');
    return;
  }catch(e){}
  try{
    const ta=document.createElement('textarea');
    ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('コピーしました');
    return;
  }catch(e){}
  if(navigator.share){
    try{await navigator.share({text});return}catch(e){}
  }
  toast('コピーに失敗しました');
}

/* ---- Supabase write-back ---- */
const inflight=new Set();
async function sendAction(kind,target,action,extra,onOk,onFail){
  const key=kind+'|'+target+'|'+(extra&&extra.platform||'')+'|'+action;
  if(inflight.has(key))return;
  inflight.add(key);
  try{
    const body=Object.assign({kind,target,action},extra||{});
    const res=await fetch(SB_URL+'/rest/v1/mobile_actions',{
      method:'POST',
      headers:{
        'apikey':SB_ANON,'Authorization':'Bearer '+SB_ANON,
        'Content-Type':'application/json','Prefer':'return=minimal'
      },
      body:JSON.stringify(body)
    });
    if(!res.ok)throw new Error('HTTP '+res.status);
    inflight.delete(key);
    if(onOk)onOk();
  }catch(err){
    inflight.delete(key);
    toast('通信エラー：'+(err.message||'失敗'),{retry:()=>sendAction(kind,target,action,extra,onOk,onFail)});
    if(onFail)onFail();
  }
}

/* ---- Countdown ---- */
function countdown(iso){
  if(!iso)return null;
  const target=new Date(iso).getTime();
  if(isNaN(target))return null;
  const diff=target-Date.now();
  if(diff<=0)return '期限超過';
  const d=Math.floor(diff/86400000);
  const h=Math.floor((diff%86400000)/3600000);
  if(d>0)return 'あと '+d+'日 '+h+'時間';
  const m=Math.floor((diff%3600000)/60000);
  return 'あと '+h+'時間 '+m+'分';
}

function renderStrategy(){
  const zone=document.getElementById('strategy-body');
  if(!zone)return;
  zone.innerHTML='';
  try{
    const st=DATA.strategy;
    if(!st||typeof st!=='object'||!Array.isArray(st.weeks)){
      zone.innerHTML='<div class="card"><div class="empty-note">content_plan.yaml 未生成 &mdash; 戦略同期待ち</div></div>';
      return;
    }
    const wrap=document.createElement('div');
    const progress=(st.progress&&typeof st.progress==='object')?st.progress:{};
    const done=progress.done||0,pending=progress.pending||0,skipped=progress.skipped||0;
    const total=done+pending+skipped;
    const rate=total?Math.round(done/total*100):0;
    const cw=(st.current_week!=null)?st.current_week:'—';
    const progCard=document.createElement('div');progCard.className='card';
    progCard.innerHTML='<div class="prog-wrap">'+
      '<div class="prog-info"><span>'+esc(st.month||'今月')+' の計画進捗 &middot; 今週 Week'+esc(String(cw))+'</span><span>'+rate+'%</span></div>'+
      '<div class="prog-track"><div class="prog-fill" style="width:'+rate+'%"></div></div>'+
      '<div class="prog-num">'+done+'/'+total+' 完了 (未着手 '+pending+' &middot; スキップ '+skipped+')</div>'+
      '</div>';
    wrap.appendChild(progCard);

    if(!st.weeks.length){
      const e=document.createElement('div');e.className='card';
      e.innerHTML='<div class="empty-note">Week計画なし</div>';
      wrap.appendChild(e);
    }else{
      st.weeks.forEach(week=>{
        const isCurrent=(st.current_week!=null)&&(week.week===st.current_week);
        wrap.appendChild(renderStrategyWeek(week,isCurrent,st.current_week));
      });
    }
    zone.appendChild(wrap);
  }catch(e){
    console.error('renderStrategy failed',e);
    zone.innerHTML='<div class="card"><div class="empty-note">戦略タブの読み込みに失敗しました</div></div>';
  }
}

let vRecorder=null, vChunks=[], vStream=null, vTimerInt=null, vStartTs=0, vBlob=null, vMime='', vSelectedType='', vListInt=null;
let vPendingDiscard=null, vAutoStopMsg=null, vDurSecCache=0;

/* --- IndexedDB: 未送信録音の永続化 (再読込/送信失敗からの復帰用) --- */
const VDB_NAME='ryoops_voice', VDB_STORE='pending', VDB_KEY='current';
function _vdbOpen(){
  return new Promise((resolve,reject)=>{
    if(!window.indexedDB){reject(new Error('no indexeddb'));return}
    const req=indexedDB.open(VDB_NAME,1);
    req.onupgradeneeded=()=>{ req.result.createObjectStore(VDB_STORE); };
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
}
async function _vdbPut(record){
  try{
    const db=await _vdbOpen();
    await new Promise((res,rej)=>{
      const tx=db.transaction(VDB_STORE,'readwrite');
      tx.objectStore(VDB_STORE).put(record,VDB_KEY);
      tx.oncomplete=res; tx.onerror=()=>rej(tx.error);
    });
  }catch(e){}
}
async function _vdbGet(){
  try{
    const db=await _vdbOpen();
    return await new Promise((res,rej)=>{
      const tx=db.transaction(VDB_STORE,'readonly');
      const rq=tx.objectStore(VDB_STORE).get(VDB_KEY);
      rq.onsuccess=()=>res(rq.result||null);
      rq.onerror=()=>rej(rq.error);
    });
  }catch(e){ return null; }
}
async function _vdbDelete(){
  try{
    const db=await _vdbOpen();
    await new Promise((res,rej)=>{
      const tx=db.transaction(VDB_STORE,'readwrite');
      tx.objectStore(VDB_STORE).delete(VDB_KEY);
      tx.oncomplete=res; tx.onerror=()=>rej(tx.error);
    });
  }catch(e){}
}
function _voicePersist(){
  if(!vBlob)return;
  _vdbPut({blob:vBlob,mime:vMime,durSec:vDurSecCache,memoType:vSelectedType,savedAt:Date.now()});
}

function _voiceMime(){
  const cands=['audio/mp4','audio/webm;codecs=opus','audio/webm'];
  for(const c of cands){ if(window.MediaRecorder && MediaRecorder.isTypeSupported(c)) return c; }
  return '';
}
function _voiceExt(mime){
  if(mime.indexOf('mp4')>=0)return 'm4a';
  if(mime.indexOf('webm')>=0)return 'webm';
  return 'dat';
}
function _fmtTimer(sec){
  const m=Math.floor(sec/60), s=sec%60;
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function _voiceChipInit(){
  document.querySelectorAll('#voice-chips .chip').forEach(c=>{
    c.onclick=()=>{
      document.querySelectorAll('#voice-chips .chip').forEach(x=>x.classList.remove('on'));
      c.classList.add('on');
      vSelectedType=c.dataset.type||'';
      _voicePersist();
    };
  });
}
