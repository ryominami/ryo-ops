<style>
:root{--bg:#0b0d12;--card:#151821;--card2:#1b1f2b;--bd:#262b38;--tx:#e8eaf0;--sub:#8b91a3;
--accent:#5b7cfa;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--radius:16px;

body{margin:0;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;

button{font-family:inherit;cursor:pointer;-webkit-appearance:none;appearance:none;border:none;background:none;color:inherit}
.hidden{display:none!important}

/* Lock */
#lock{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;
justify-content:center;gap:14px;padding:24px;z-index:200;transition:opacity .25s}
#lock.off{opacity:0;pointer-events:none}
.lock-icon{font-size:44px}
#lock h2{margin:0;font-size:18px;font-weight:700}
#lock input{width:100%;max-width:280px;padding:14px 16px;border-radius:12px;border:1px solid var(--bd);
background:var(--card);color:var(--tx);font-size:16px;text-align:center}
#lock button.go{width:100%;max-width:280px;padding:14px;border-radius:12px;background:var(--accent);
color:#fff;font-weight:700;font-size:15px;min-height:44px}
.lock-err{color:var(--red);font-size:13px;min-height:18px}

/* App shell */
#app{display:none;padding-top:calc(14px + var(--safe-t));padding-bottom:calc(84px + var(--safe-b));min-height:100vh}
#app.on{display:block}
.wrap{padding:0 14px}
.top{display:flex;align-items:center;justify-content:space-between;padding:0 14px 14px}
.top h1{font-size:19px;margin:0;font-weight:800;letter-spacing:.2px}
.top small{color:var(--sub);font-size:11px}

.view{display:none}
.view.on{display:block}

/* Cards */
.card{background:var(--card);border:1px solid var(--bd);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.card.dim{opacity:.45}
.sec-h{font-size:12px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.6px;
margin:18px 0 8px;display:flex;align-items:center;gap:6px}
.sec-h:first-child{margin-top:0}
.empty-note{color:var(--sub);text-align:center;padding:30px 14px;font-size:13px}

/* Today: big tiles */
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.tile{background:var(--card);border:1px solid var(--bd);border-radius:var(--radius);padding:18px 14px;
text-align:center;min-height:88px;display:flex;flex-direction:column;justify-content:center;gap:4px}
.tile .n{font-size:32px;font-weight:800;line-height:1}
.tile .n.zero{color:var(--sub)}
.tile .n.hot{color:var(--amber)}
.tile .l{font-size:12px;color:var(--sub);font-weight:600}

.prog-wrap{margin-bottom:4px}
.prog-info{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-bottom:6px}
.prog-track{height:10px;background:var(--card2);border-radius:6px;overflow:hidden;border:1px solid var(--bd)}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#8b7cf6);border-radius:6px;transition:width .4s}
.prog-num{font-size:11px;color:var(--sub);margin-top:5px}

.deal-mini{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0;
border-bottom:1px solid var(--bd)}
.deal-mini:last-child{border-bottom:none}
.deal-mini .nm{font-weight:700;font-size:13px}
.deal-mini .na{font-size:12px;color:var(--sub);margin-top:2px}
.deal-mini .st{font-size:11px;background:var(--card2);border-radius:999px;padding:3px 9px;color:var(--accent);
font-weight:700;white-space:nowrap}

.cpp-box{display:flex;align-items:center;gap:12px}
.cpp-box .cnt{font-size:22px;font-weight:800;color:var(--amber)}
.cpp-box .lb{font-size:12px;color:var(--sub)}

/* Badges */
.badge{display:inline-block;font-size:10px;font-weight:800;padding:3px 8px;border-radius:999px;
background:var(--card2);color:var(--accent);letter-spacing:.3px}
.badge.rescue{color:#f472b6}.badge.verification{color:#38bdf8}.badge.conversation{color:#a3e635}
.badge.work{color:#fbbf24}
.qbadge{font-size:11px;font-weight:800;color:var(--green)}

/* Draft card */
.dcard-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.dcard-body{font-size:14px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
.dcard-thread{margin-top:8px;padding-top:8px;border-top:1px dashed var(--bd)}
.dcard-thread .tlabel{font-size:11px;color:var(--sub);font-weight:700;margin-bottom:4px}
.media-row{display:flex;gap:6px;margin:10px 0;overflow-x:auto}
.media-row img{height:64px;width:64px;object-fit:cover;border-radius:10px;border:1px solid var(--bd);flex:0 0 auto}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn{flex:1;min-height:44px;border-radius:12px;font-weight:700;font-size:14px;display:flex;
align-items:center;justify-content:center;gap:6px;border:1px solid var(--bd);background:var(--card2)}
.btn.approve{background:var(--green);color:#04240f;border-color:var(--green)}
.btn.reject{background:var(--card2);color:var(--red)}
.btn.copy{background:var(--card2);color:var(--tx);flex:0 0 auto;padding:0 14px}
.btn.wide{flex:none;width:100%}
.btn:disabled{opacity:.5}
.btn.small{min-height:36px;font-size:12px;padding:0 12px;flex:0 0 auto}
.status-note{font-size:12px;font-weight:700;color:var(--green);text-align:center;padding:8px 0}

/* Video card */
.vcard{display:flex;gap:12px}
.vcard img.thumb{width:76px;height:76px;object-fit:cover;border-radius:12px;border:1px solid var(--bd);
background:var(--card2);flex:0 0 auto}
.vcard-main{flex:1;min-width:0}
.vcard-main .slug{font-weight:700;font-size:14px}
.vcard-main .meta{font-size:11px;color:var(--sub);margin-top:2px}
.plat{margin-top:10px;border-top:1px solid var(--bd);padding-top:10px}
.plat-head{display:flex;justify-content:space-between;align-items:center;cursor:pointer;min-height:36px}
.plat-name{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.4px}
.plat-status{font-size:11px;color:var(--sub)}
.plat-cap{display:none;font-size:13px;line-height:1.6;color:var(--tx);margin-top:8px;

.plat-cap.open{display:block}
.tiktok-hot{background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(239,68,68,.1));
border:1px solid rgba(245,158,11,.35);border-radius:12px;padding:10px;margin-top:8px}
.tiktok-hot .hh{font-size:13px;font-weight:800;color:var(--amber)}

/* Distribute */
.dist-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:11px 0;
border-bottom:1px solid var(--bd)}
.dist-row:last-child{border-bottom:none}
.dist-row .main{min-width:0;flex:1}
.dist-row .ttl{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dist-row .sub{font-size:11px;color:var(--sub);margin-top:2px}
.pill{font-size:10px;font-weight:800;padding:3px 8px;border-radius:999px;white-space:nowrap}
.pill.approved{background:rgba(91,124,250,.15);color:var(--accent)}
.pill.queued{background:rgba(245,158,11,.15);color:var(--amber)}
.pill.posted{background:rgba(34,197,94,.15);color:var(--green)}
.pill.sent_to_inbox{background:rgba(245,158,11,.18);color:var(--amber)}

.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}

position:relative}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#8b7cf6);border-radius:6px}
.bar-fill.over{background:linear-gradient(90deg,var(--green),#4ade80)}
.bar-num{font-size:11px;color:var(--sub);width:110px;flex:0 0 auto;text-align:right}
.stage-h{display:flex;justify-content:space-between;align-items:center;margin:16px 0 8px}
.stage-h .st-name{font-size:13px;font-weight:800}
.stage-h .st-cnt{font-size:11px;color:var(--sub)}
.deal-card{padding:12px;background:var(--card2);border-radius:12px;margin-bottom:8px}
.deal-card .nm{font-weight:700;font-size:14px}
.deal-card .cl{font-size:12px;color:var(--sub)}
.deal-card .qt{font-size:15px;font-weight:800;color:var(--green);margin-top:4px}

display:flex;align-items:center;gap:10px;max-width:88vw}

/* Bottom nav */
nav.btm{position:fixed;left:0;right:0;bottom:0;display:flex;background:rgba(21,24,33,.92);

</style>

/* ---- Auth (salted SHA-256, same scheme/password as x-preview) ---- */
const H='878a3d842d2c56f1398de3090d65daf2fe7b9445743be4dccc330591f9bb6cc1';
const S='x-preview-2026-salt';
async function _sha256(s){const b=new TextEncoder().encode(s);const h=await crypto.subtle.digest('SHA-256',b);
  return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,'0')).join('')}
async function unlock(){
  const v=document.getElementById('pw').value;
  const e=document.getElementById('lockErr');
  e.textContent='確認中…';
  await new Promise(r=>setTimeout(r,300));
  const hv=await _sha256(S+v);
  if(hv===H){
    sessionStorage.setItem('ryoops_h',H);
    document.getElementById('lock').classList.add('off');
    document.getElementById('app').classList.add('on');
    e.textContent='';
    boot();
  }else{
    e.textContent='パスワードが違います';
    document.getElementById('pw').value='';
    setTimeout(()=>e.textContent='',2000);
  }
}
if(sessionStorage.getItem('ryoops_h')===H){
  document.getElementById('lock').classList.add('off');
  document.getElementById('app').classList.add('on');
}

ド（GPT Image 2 → NB2 Edit） | ストック |\n\n---","thread":[],"media":["null","図解1【生成済】: 「GPT Image 2でショートドラマ ぶつかる4つの壁」チェックリスト","図解2【未着手】: Before/After（参照なし4シーン顔バラバラ → 参照あり統一）visual-director発注候補","https://v3b.fal.media/files/b/0a98d20f/68MFU35mewvmsMZDMS24p_L5ROcmuE.png"],"created":"2026-05-04"},{"id":"2026-04-26-existing-summer-soft-vlog","path":"10_X-Marketing/drafts/posts/2026-04-26-existing-summer-soft-vlog.md","title":"2026-04-26-existing-summer-soft-vlog","post_type":"post-drafts-with-reply-chain","status":"legacy","quality":"","body":"AI動画にテキスト入れる時、毎回デジタル感が出てた。\n\nRemotion + Google Fonts の Caveat (英語手書き) と Klee One (日本語やわらか) を重ねて、\nwashi tape ・ハッシュタグステッカー・微回転（-2°〜+5°）で、Instagram旅Vlogみたいな手書き編集に振った。\n\n「夏のかけら」というMVを置いておきます。\n画像とプロンプトはリプ欄に。","thread":["4章のヒーロー画像（GPT Image 2 で T2I 生成）。\n朝の空港 / 古宇利の海 / 壺屋やちむん通り / サンセットビーチ。\n4枚とも Kodak Portra 400 + Fujifilm Pro 400H 質感プリセットで光が揃う。","4章のGPT Image 2プロンプト、共通部品＋章別パートで構成しました。\n\n▼ 共通質感プリセット（全章末尾に貼る）\n\"Faded Kodak Portra 400 + Fujifilm Pro 400H aesthetic, candid smartphone snapshot, handheld slight motion blur, fine grain, 35mm lens feel, creamy soft skin, milky highlights, slightly tilted composition. Photo-realistic, NOT illustration.\"\n\n▼ Ch1 朝・那覇空港 (5:47)\n\"Young Japanese couple at Naha Airport at 5:47 AM dawn. Soft golden first light through floor-to-ceiling windows. Girl in oversized white linen shirt holding iced latte. Boy in cream tee with navy cap backwards. Empty terminal, faded JAL/ANA signage softly blurred.\"\n\n▼ Ch2 昼・古宇利ビーチ (13:22)\n\"Same couple on Kouri Beach at 1:22 PM. Bright cobalt-blue Okinawan ocean, vivid white sand. Selfie angle: boy in front (close-up smile), girl walking toward water in background, white loose tee tucked into denim shorts, hair flying. Bright midday sun, palm shadows, ocean blue saturation pulled cyan.\"\n\n▼ Ch3 夕・壺屋やちむん通り (17:45)\n\"Same couple holding hands walking down a narrow Tsuboya pottery alley in Naha at 5:45 PM golden hour. Vintage red Coca-Cola vending machine glowing on the left, weathered shisa stone lion guardian on the wall. Honey-orange light, long shadows. Girl in white floral sundress, boy in black tee + cargo shorts.\"\n\n▼ Ch4 夜・サンセットビーチ (22:03)\n\"Same couple in cotton yukata (girl mint-wave / boy navy-stripe) sitting on dark sand at Sunset Beach at 10:03 PM. Both holding senko-hanabi sparklers, golden sparks falling. Distant moon over Pacific, paper lanterns on a fishing boat far out. Cinestill 800T + Kodak Portra 800 night film, halation around sparkler glow, deep teal shadows.\"\n\nquality=high / image_size=portrait_16_9 / 4枚並列で約2分・$0.20 でした。","Vlog風オーバーレイの仕掛けは @remotion/google-fonts で5本のフォントをロードするだけ:\n\nimport { loadFont as loadCaveat } from '@remotion/google-fonts/Caveat';\nimport { loadFont as loadKleeOne } from '@remotion/google-fonts/KleeOne';\nimport { loadFont as loadHachi } from '@remotion/google-fonts/HachiMaruPop';\n\n▼ 役割分担\n- Caveat → 英字手書き（dates, hashtags, EN副題）\n- KleeOne → 日本語やわらか毛筆（メインキャプション）\n- HachiMaruPop → 丸文字ポップ吹き出し（中央の「ついた〜」「ぶらぶら」）\n\n▼ 人間味の演出（4つだけ）\n1. washi tape: rgba(248,215,165,0.55) を1枚敷いて transform: rotate(2deg)\n2. 全要素に -2°〜+5° の微回転をランダムに振る\n3. Spring物理アニメで「ぴょこ」と着地（damping:14, stiffness:90）\n4. 強調語の下に弧型下線（borderRadius:50% rotate:-1deg）でhand-drawn感\n\nこれだけで「人が編集した感」になる。","60秒MVの章構成（参考用）:\n\nCh1 朝 / Ch2 昼 / Ch3 夕 / Ch4 夜 = 各15秒\n↓\ntitle 3s（夏のかけら）→ 15s × 4章 → reveal 5s（thanks for watching ♡）\n合計 64秒\n\nメタ告白の落としを「ぜんぶ、AIが見てた夢でした」に振ったら、急に余韻が出た。"],"media":["https://v3b.fal.media/files/b/0a97bab8/r9Gl_APme3OvNxJpPRP-8_existing_summer_mv_vlog.mp4","https://v3b.fal.media/files/b/0a97bab5/bfk7Lb95NJOtGzlFlkzfH_ch1_airport_dawn.png","https://v3b.fal.media/files/b/0a97bab6/3ItFKf7LtsXeKAit8q1jf_ch2_cobalt_beach.png","https://v3b.fal.media/files/b/0a97bab7/lFPssYIiBY4wNSOFZPITw_ch3_amber_alley.png","https://v3b.fal.media/files/b/0a97bab7/wYU_sMAHXRMBKuPgjY8FE_ch4_sparkler_night.png"],"created":"2026-04-26"},{"id":"2026-04-26-gpt-image2-golden-week-mv","path":"10_X-Marketing/drafts/posts/2026-04-26-gpt /* ---- Toast ---- */
let toastTimer=null;
function toast(msg,opts){
  const t=document.getElementById('toast');
  t.innerHTML='';
  const span=document.createElement('span');span.textContent=msg;t.appendChild(span);
  if(opts&&opts.retry){
    const b=document.createElement('button');b.textContent='再試行';
    b.onclick=()=>{t.classList.remove('show');opts.retry()};
    t.appendChild(b);
  }
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),opts&&opts.retry?5000:2200);
}

/* ---- Clipboard ---- */
async function copyText(text,btn){
  try{
    await navigator.clipboard.writeText(text);
    toast('コピーしました');
    return;
  }catch(e){}
  try{
    const ta=document.createElement('textarea');
    ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('コピーしました');
    return;
  }catch(e){}
  if(navigator.share){
    try{await navigator.share({text});return}catch(e){}
  }
  toast('コピーに失敗しました');
}

/* ---- View switching ---- */
function showView(id,el){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('nav .bt').forEach(b=>b.classList.remove('on'));
  document.getElementById('view-'+id).classList.add('on');
  const btn=el||document.querySelector('nav .bt[data-view="'+id+'"]');
  if(btn)btn.classList.add('on');
  window.scrollTo({top:0});
}

const inflight=new Set();
async function sendAction(kind,target,action,extra,onOk,onFail){
  const key=kind+'|'+target+'|'+(extra&&extra.platform||'')+'|'+action;
  if(inflight.has(key))return;
  inflight.add(key);
  try{
    const body=Object.assign({kind,target,action},extra||{});
    const res=await fetch(SB_URL+'/rest/v1/mobile_actions',{
      method:'POST',
      headers:{
        'apikey':SB_ANON,'Authorization':'Bearer '+SB_ANON,
        'Content-Type':'application/json','Prefer':'return=minimal'
      },
      body:JSON.stringify(body)
    });
    if(!res.ok)throw new Error('HTTP '+res.status);
    inflight.delete(key);
    if(onOk)onOk();
  }catch(err){
    inflight.delete(key);
    toast('通信エラー：'+(err.message||'失敗'),{retry:()=>sendAction(kind,target,action,extra,onOk,onFail)});
    if(onFail)onFail();
  }
}

/* ---- Countdown ---- */
function countdown(iso){
  if(!iso)return null;
  const target=new Date(iso).getTime();
  if(isNaN(target))return null;
  const diff=target-Date.now();
  if(diff<=0)return '期限超過';
  const d=Math.floor(diff/86400000);
  const h=Math.floor((diff%86400000)/3600000);
  if(d>0)return 'あと '+d+'日 '+h+'時間';
  const m=Math.floor((diff%3600000)/60000);
  return 'あと '+h+'時間 '+m+'分';
}

/* ---- Badges ---- */
const TYPE_LABEL={rescue:'救済',verification:'検証',conversation:'会話',work:'作品'};
const STATUS_LABEL={approved:'承認済み',queued:'配信キュー',posted:'投稿済み',sent_to_inbox:'公開待ち'};

/* ================= 今日 ================= */
function renderToday(){
  const c=DATA.counts||{};
  const an=document.getElementById('t-approve-n');
  const on=document.getElementById('t-onetap-n');
  an.textContent=c.approve_wait||0; an.className='n'+((c.approve_wait||0)===0?' zero':(c.approve_wait>=5?' hot':''));
  on.textContent=c.onetap_wait||0; on.className='n'+((c.onetap_wait||0)===0?' zero':(c.onetap_wait>=5?' hot':''));
  document.getElementById('dot-approve').classList.toggle('show',(c.approve_wait||0)+(c.onetap_wait||0)>0);

  const months=(DATA.money&&DATA.money.revenue_months)||[];
  const cur=months[months.length-1];
  if(cur){
    const rate=cur.goal?Math.min(100,Math.round(cur.total/cur.goal*100)):0;
    document.getElementById('rev-month-label').textContent=(cur.month||'今月')+' の売上';
    document.getElementById('rev-rate').textContent=rate+'%';
    document.getElementById('rev-fill').style.width=rate+'%';
    document.getElementById('rev-num').textContent=fmtYen(cur.total)+' / 目標 '+fmtYen(cur.goal);
  }else{
    document.getElementById('rev-num').textContent='データなし';
  }

  const deals=((DATA.money&&DATA.money.deals)||[]).filter(d=>d.next_action);
  const top3=deals.slice().sort((a,b)=>String(b.updated||'').localeCompare(String(a.updated||''))).slice(0,3);
  const naEl=document.getElementById('next-actions');
  naEl.innerHTML='';
  if(!top3.length){naEl.innerHTML='<div class="empty-note">次アクションなし</div>'}
  top3.forEach(d=>{
    const row=document.createElement('div');row.className='deal-mini';
    row.innerHTML='<div><div class="nm">'+esc(d.name||d.client||'案件')+'</div>'+
      '<div class="na">'+esc(d.next_action)+'</div></div>'+
      '<div class="st">'+esc(d.stage||'')+'</div>';
    naEl.appendChild(row);
  });

  const cpp=(DATA.money&&DATA.money.cpp)||{};
  const cd=countdown(cpp.next_deadline_utc);
  document.getElementById('cpp-cnt').textContent=cd||'&mdash;';
  document.getElementById('cpp-lb').textContent=(cpp.summary_lines&&cpp.summary_lines[0])||'締切情報なし';
}

/* ================= 承認 ================= */
function draftFullText(d){
  let t=d.body||'';
  (d.thread||[]).forEach((r,i)=>{t+='\n\n---リプ'+(i+1)+'---\n\n'+r});
  return t;
}
function renderApprove(){
  const xList=(DATA.x_drafts||[]).filter(d=>d.status==='review');
  const xEl=document.getElementById('approve-x-list');
  xEl.innerHTML='';
  if(!xList.length){xEl.innerHTML='<div class="card"><div class="empty-note">承認待ちの下書きはありません</div></div>'}
  xList.forEach(d=>{
    const card=document.createElement('div');card.className='card';card.id='xd-'+d.id;
    const badge=TYPE_LABEL[d.post_type]||d.post_type||'';
    let media='';
    if(d.media&&d.media.length){
      media='<div class="media-row">'+d.media.map(m=>'<img src="'+esc(m)+'" loading="lazy">').join('')+'</div>';
    }
    let thread='';
    if(d.thread&&d.thread.length){
      thread='<div class="dcard-thread">'+d.thread.map((r,i)=>
        '<div class="tlabel">リプ'+(i+1)+'</div><div class="dcard-body">'+esc(r)+'</div>').join('')+'</div>';
    }
    card.innerHTML=
      '<div class="dcard-head">'+
        '<span class="badge '+esc(d.post_type||'')+'">'+esc(badge)+'</span>'+
        (d.quality?'<span class="qbadge">'+esc(d.quality)+'</span>':'')+
      '</div>'+
      (d.title?'<div style="font-weight:700;font-size:13px;margin-bottom:6px">'+esc(d.title)+'</div>':'')+
      '<div class="dcard-body">'+esc(d.body||'')+'</div>'+
      media+thread+
      '<div class="btn-row">'+
        '<button class="btn approve" data-role="a">&#x2705; 承認</button>'+
        '<button class="btn reject" data-role="r">&#x274C; 却下</button>'+
        '<button class="btn copy" data-role="c">&#x1F4CB;</button>'+
      '</div>';
    card.querySelector('[data-role="a"]').onclick=(e)=>doDraftAction(d,'approve',e.target,card);
    card.querySelector('[data-role="r"]').onclick=(e)=>doDraftAction(d,'reject',e.target,card);
    card.querySelector('[data-role="c"]').onclick=()=>copyText(draftFullText(d));
    xEl.appendChild(card);
  });

  const vList=(DATA.video_releases||[]).filter(v=>Object.values(v.platforms||{}).some(p=>p.status==='review'));
  const vEl=document.getElementById('approve-v-list');
  vEl.innerHTML='';
  if(!vList.length){vEl.innerHTML='<div class="card"><div class="empty-note">承認待ちの動画はありません</div></div>'}
  vList.forEach(v=>{
    const card=document.createElement('div');card.className='card';card.id='vr-'+v.slug;
    const durMin=v.duration_s?Math.round(v.duration_s)+'s':'';
    card.innerHTML=
      '<div class="vcard">'+
        (v.thumb?'<img class="thumb" src="'+esc(v.thumb)+'" loading="lazy">':'<div class="thumb"></div>')+
        '<div class="vcard-main">'+
          '<div class="slug">'+esc(v.slug||'')+'</div>'+
          '<div class="meta">'+esc(durMin)+(v.created?' &middot; '+esc(v.created):'')+'</div>'+
        '</div>'+
      '</div><div class="plats"></div>';
    const platsEl=card.querySelector('.plats');
    Object.entries(v.platforms||{}).forEach(([pname,p])=>{
      if(p.status!=='review')return;
      const box=document.createElement('div');box.className='plat';
      box.innerHTML=
        '<div class="plat-head" data-toggle="1">'+
          '<span class="plat-name">'+esc(pname)+'</span>'+
          '<span class="plat-status">&#x25BE; '+esc(p.status||'')+'</span>'+
        '</div>'+
        '<div class="plat-cap">'+esc(p.caption||'')+'</div>'+
        '<div class="btn-row">'+
          '<button class="btn approve" data-role="a">&#x2705; 承認</button>'+
          '<button class="btn reject" data-role="r">&#x23ED; スキップ</button>'+
          '<button class="btn copy" data-role="c">&#x1F4CB;</button>'+
        '</div>';
      box.querySelector('.plat-head').onclick=()=>box.querySelector('.plat-cap').classList.toggle('open');
      box.querySelector('[data-role="a"]').onclick=(e)=>doVideoAction(v,pname,'approve',e.target,box);
      box.querySelector('[data-role="r"]').onclick=(e)=>doVideoAction(v,pname,'reject',e.target,box);
      box.querySelector('[data-role="c"]').onclick=()=>copyText(p.caption||'');
      platsEl.appendChild(box);
    });
    vEl.appendChild(card);
  });
}
function doDraftAction(d,action,btnEl,card){
  const row=btnEl.closest('.btn-row');
  row.querySelectorAll('button').forEach(b=>b.disabled=true);
  sendAction('x_draft',d.id,action,{},()=>{
    card.classList.add('dim');
    row.outerHTML='<div class="status-note">'+(action==='approve'?'承認済み':'却下済み')+'（次回同期で反映）</div>';
  },()=>{row.querySelectorAll('button').forEach(b=>b.disabled=false)});
}
function doVideoAction(v,platform,action,btnEl,box){
  const row=btnEl.closest('.btn-row');
  row.querySelectorAll('button').forEach(b=>b.disabled=true);
  sendAction('video_platform',v.slug,action,{platform},()=>{
    box.classList.add('dim');
    row.outerHTML='<div class="status-note">'+(action==='approve'?'承認済み':'スキップ済み')+'（次回同期で反映）</div>';
  },()=>{row.querySelectorAll('button').forEach(b=>b.disabled=false)});
}

/* ================= 配信 ================= */
function renderDistribute(){
  const xEl=document.getElementById('dist-x-list');
  xEl.innerHTML='';
  const order=['approved','queued','posted'];
  const buckets={};
  (DATA.x_drafts||[]).filter(d=>d.status!=='review').forEach(d=>{
    (buckets[d.status]=buckets[d.status]||[]).push(d);
  });
  const keys=order.filter(k=>buckets[k]).concat(Object.keys(buckets).filter(k=>!order.includes(k)));
  if(!keys.length){xEl.innerHTML='<div class="card"><div class="empty-note">配信データなし</div></div>'}
  keys.forEach(k=>{
    const items=buckets[k].slice(0,5);
    const card=document.createElement('div');card.className='card';
    card.innerHTML='<div class="stage-h"><span class="st-name">'+esc(STATUS_LABEL[k]||k)+'</span>'+
      '<span class="st-cnt">'+buckets[k].length+'件</span></div>';
    items.forEach(d=>{
      const row=document.createElement('div');row.className='dist-row';
      row.innerHTML='<div class="main"><div class="ttl">'+esc(d.title||d.body||'')+'</div>'+
        '<div class="sub">'+esc(d.post_type||'')+(d.created?' &middot; '+esc(d.created):'')+'</div></div>'+
        '<span class="pill '+esc(k)+'">'+esc(STATUS_LABEL[k]||k)+'</span>';
      card.appendChild(row);
    });
    xEl.appendChild(card);
  });

  const vEl=document.getElementById('dist-v-list');
  vEl.innerHTML='';
  const hot=[],posted=[];
  (DATA.video_releases||[]).forEach(v=>{
    Object.entries(v.platforms||{}).forEach(([pname,p])=>{
      if(p.status==='sent_to_inbox')hot.push({v,pname,p});
      else if(p.status==='posted')posted.push({v,pname,p});
    });
  });
  if(hot.length){
    const card=document.createElement('div');card.className='card';
    card.innerHTML='<div class="stage-h"><span class="st-name">公開待ち</span><span class="st-cnt">'+hot.length+'件</span></div>';
    hot.forEach(({v,pname,p})=>{
      const box=document.createElement('div');box.className='tiktok-hot';
      box.innerHTML='<div class="hh">'+esc(pname)+'アプリで公開待ち &mdash; '+esc(v.slug)+'</div>'+
        '<div class="btn-row"><button class="btn wide" data-role="rec">&#x1F517; 投稿URLを記録</button></div>';
      box.querySelector('[data-role="rec"]').onclick=(e)=>{
        const url=prompt(pname+'の投稿URLを入力してください');
        if(!url)return;
        e.target.disabled=true;
        sendAction('video_platform',v.slug,'mark_posted',{platform:pname,note:url},()=>{
          box.innerHTML='<div class="status-note">記録しました（次回同期で反映）</div>';
        },()=>{e.target.disabled=false});
      };
      card.appendChild(box);
    });
    vEl.appendChild(card);
  }
  const pcard=document.createElement('div');pcard.className='card';
  pcard.innerHTML='<div class="stage-h"><span class="st-name">投稿済み</span><span class="st-cnt">'+posted.length+'件</span></div>';
  if(!posted.length){pcard.innerHTML+='<div class="empty-note">まだありません</div>'}
  posted.slice(0,8).forEach(({v,pname})=>{
    const row=document.createElement('div');row.className='dist-row';
    row.innerHTML='<div class="main"><div class="ttl">'+esc(v.slug)+'</div>'+
      '<div class="sub">'+esc(pname)+'</div></div><span class="pill posted">投稿済み</span>';
    pcard.appendChild(row);
  });
  vEl.appendChild(pcard);
  if(!hot.length&&!posted.length){vEl.innerHTML='<div class="card"><div class="empty-note">配信データなし</div></div>'}
}

/* ================= 売上 ================= */
function renderMoney(){
  const months=(DATA.money&&DATA.money.revenue_months)||[];
  const barsEl=document.getElementById('money-bars');
  barsEl.innerHTML='';
  if(!months.length){barsEl.innerHTML='<div class="empty-note">データなし</div>'}
  months.slice(-6).forEach(m=>{
    const rate=m.goal?Math.round(m.total/m.goal*100):0;
    const row=document.createElement('div');row.className='bar-row';
    row.innerHTML='<div class="m-label">'+esc(m.month||'')+'</div>'+
      '<div class="bar-track"><div class="bar-fill'+(rate>=100?' over':'')+'" style="width:'+Math.min(100,rate)+'%"></div></div>'+
      '<div class="bar-num">'+fmtYen(m.total)+' ('+rate+'%)</div>';
    barsEl.appendChild(row);
  });

  const deals=(DATA.money&&DATA.money.deals)||[];
  const dEl=document.getElementById('money-deals');
  dEl.innerHTML='';
  if(!deals.length){dEl.innerHTML='<div class="card"><div class="empty-note">案件なし</div></div>'}
  const groups={};
  deals.forEach(d=>{(groups[d.stage||'その他']=groups[d.stage||'その他']||[]).push(d)});
  Object.entries(groups).forEach(([stage,items])=>{
    const card=document.createElement('div');card.className='card';
    card.innerHTML='<div class="stage-h"><span class="st-name">'+esc(stage)+'</span><span class="st-cnt">'+items.length+'件</span></div>';
    items.forEach(d=>{
      const dc=document.createElement('div');dc.className='deal-card';
      dc.innerHTML='<div class="nm">'+esc(d.name||'')+'</div>'+
        '<div class="cl">'+esc(d.client||'')+'</div>'+
        (d.quote?'<div class="qt">'+fmtYen(d.quote)+(d.confirmed?' &#x2705;':'')+'</div>':'')+
        (d.next_action?'<div class="na">'+esc(d.next_action)+'</div>':'');
      card.appendChild(dc);
    });
    dEl.appendChild(card);
  });

  const convs=(DATA.money&&DATA.money.conversions)||[];
  const cEl=document.getElementById('money-conv');
  cEl.innerHTML='';
  if(!convs.length){cEl.innerHTML='<div class="empty-note">データなし</div>'}
  convs.slice(0,10).forEach(c=>{
    const row=document.createElement('div');row.className='conv-row';
    const label=c.name||c.client||c.label||'成約';
    const amt=c.amount!=null?fmtYen(c.amount):'';
    const date=c.date||c.updated||'';
    row.innerHTML='<span>'+esc(label)+'</span><span>'+esc(amt)+' '+esc(date)+'</span>';
    cEl.appendChild(row);
  });

  const cpp=(DATA.money&&DATA.money.cpp)||{};
  const cppEl=document.getElementById('money-cpp');
  const lines=cpp.summary_lines||[];
  cppEl.innerHTML= lines.length
    ? '<ul class="cpp-lines">'+lines.map(l=>'<li>'+esc(l)+'</li>').join('')+'</ul>'
    : '<div class="empty-note">データなし</div>';
  if(cpp.next_deadline_utc){
    cppEl.innerHTML+='<div class="prog-num">次回締切: '+esc(countdown(cpp.next_deadline_utc)||'')+'</div>';
  }
}

/* ---- Boot ---- */
function boot(){
  document.getElementById('updatedAt').textContent='Updated '+(DATA.generated_at||'');
  renderToday();
  renderApprove();
  renderDistribute();
  renderMoney();
  setInterval(renderToday,60000);
}
if(document.getElementById('app').classList.contains('on'))boot();
</script>
