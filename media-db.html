<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Media Asset DB</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --border:#2a3140;
    --txt:#e6edf3; --mut:#8b97a7; --acc:#58a6ff; --acc2:#3fb950; --warn:#d29922;
    --img:#58a6ff; --video:#bc8cff; --audio:#3fb950; --other:#8b97a7;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font:14px/1.5 -apple-system,"Segoe UI",Roboto,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif}
  header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  header h1{font-size:18px;margin:0;letter-spacing:.5px}
  header .gen{color:var(--mut);font-size:12px}
  #stats{display:flex;gap:8px;flex-wrap:wrap;padding:14px 24px}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:8px 14px;min-width:84px}
  .stat b{display:block;font-size:20px}
  .stat span{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  #toolbar{position:sticky;top:0;z-index:5;background:rgba(13,17,23,.92);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border);padding:12px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  #q{flex:1;min-width:220px;background:var(--panel2);border:1px solid var(--border);color:var(--txt);
    border-radius:8px;padding:9px 12px;font-size:14px}
  #q:focus{outline:none;border-color:var(--acc)}
  select{background:var(--panel2);border:1px solid var(--border);color:var(--txt);border-radius:8px;padding:9px 10px}
  .chips{display:flex;gap:6px}
  .chip{cursor:pointer;border:1px solid var(--border);background:var(--panel2);color:var(--mut);
    border-radius:999px;padding:6px 12px;font-size:12px;user-select:none}
  .chip.on{color:#fff;border-color:var(--acc);background:#1f6feb33}
  #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;padding:18px 24px 80px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;
    display:flex;flex-direction:column;transition:transform .08s,border-color .12s}
  .card:hover{transform:translateY(-2px);border-color:var(--acc)}
  .thumb{aspect-ratio:1/1;background:#0a0d12;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
  .thumb img,.thumb video{width:100%;height:100%;object-fit:cover}
  .thumb .icon{font-size:42px;color:var(--mut)}
  .badge{position:absolute;top:8px;left:8px;font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;
    background:#000a;text-transform:uppercase;letter-spacing:.4px}
  .badge.image{color:var(--img)} .badge.video{color:var(--video)} .badge.audio{color:var(--audio)} .badge.other{color:var(--other)}
  .dupflag{position:absolute;top:8px;right:8px;font-size:10px;background:#000a;color:var(--warn);padding:3px 7px;border-radius:6px}
  .meta{padding:10px 12px;display:flex;flex-direction:column;gap:6px}
  .model{font-size:11px;color:var(--acc);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pr{font-size:12.5px;color:var(--txt);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .pr.empty{color:var(--mut);font-style:italic}
  .sub{font-size:11px;color:var(--mut);display:flex;gap:8px;flex-wrap:wrap}
  /* modal */
  #modal{position:fixed;inset:0;background:#000c;display:flex;align-items:center;justify-content:center;z-index:50;padding:24px}
  #modal.hidden{display:none}
  .box{background:var(--panel);border:1px solid var(--border);border-radius:14px;max-width:1040px;width:100%;
    max-height:90vh;overflow:auto;display:grid;grid-template-columns:1fr 1fr;gap:0}
  @media(max-width:760px){.box{grid-template-columns:1fr}}
  .mview{background:#06090d;display:flex;align-items:center;justify-content:center;padding:18px;min-height:280px}
  .mview img,.mview video{max-width:100%;max-height:74vh;border-radius:8px}
  .minfo{padding:20px 22px;display:flex;flex-direction:column;gap:14px}
  .minfo h2{margin:0;font-size:15px;color:var(--acc)}
  .field label{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
  .promptbox{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;
    font-size:13px;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow:auto}
  table.params{width:100%;border-collapse:collapse;font-size:12.5px}
  table.params td{padding:4px 8px;border-bottom:1px solid var(--border);vertical-align:top}
  table.params td:first-child{color:var(--mut);width:38%}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  button.act{cursor:pointer;border:1px solid var(--border);background:var(--panel2);color:var(--txt);
    border-radius:8px;padding:8px 12px;font-size:12.5px}
  button.act:hover{border-color:var(--acc);color:#fff}
  a.urlref{color:var(--acc);font-size:12px;word-break:break-all}
  .close{position:absolute;top:18px;right:24px;font-size:26px;color:#fff;cursor:pointer;z-index:60}
  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--acc2);color:#04140a;
    padding:10px 18px;border-radius:10px;font-weight:600;opacity:0;transition:opacity .2s;pointer-events:none;z-index:80}
  #toast.show{opacity:1}
  .empty-note{padding:40px;text-align:center;color:var(--mut)}
  code.mono{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;color:var(--mut)}
  #gate{position:fixed;inset:0;background:#0d1117;display:flex;align-items:center;justify-content:center;z-index:100}
  .gatebox{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:32px;width:min(360px,90vw);text-align:center;display:flex;flex-direction:column;gap:14px}
  .gatebox h2{margin:0;font-size:17px}
  .gatebox input{background:var(--panel2);border:1px solid var(--border);color:var(--txt);border-radius:10px;padding:12px;font-size:16px}
  .gatebox button{background:var(--acc);color:#04140a;border:0;border-radius:10px;padding:12px;font-size:15px;font-weight:700;cursor:pointer}
  #pwerr{color:#f85149;font-size:13px;min-height:16px}
  .ghint{color:var(--mut);font-size:11px}
</style>
</head>
<body>
<header>
  <h1>🎬 Media Asset DB</h1>
  <span class="gen">generated 2026-05-31 12:05 · prompt × params × fal-url の履歴 / 再利用ハブ</span>
</header>
<div id="stats"></div>
<div id="toolbar">
  <input id="q" placeholder="検索: プロンプト / モデル / seed / パラメータ / request_id …">
  <div class="chips" id="typechips"></div>
  <select id="modelsel"></select>
  <select id="sortsel">
    <option value="new">新しい順</option>
    <option value="old">古い順</option>
  </select>
</div>
<div id="grid"></div>

<div id="modal" class="hidden">
  <span class="close" id="mclose">×</span>
  <div class="box" id="mbox"></div>
</div>
<div id="toast"></div>
<div id="gate"><div class="gatebox"><h2>🔒 Media Asset DB</h2><input id="pwin" type="password" placeholder="パスワード" autocomplete="current-password"><button id="pwbtn">開く</button><div id="pwerr"></div><div class="ghint">URLとパスワードを知る人だけが閲覧できます</div></div></div>

<script>
let DATA = [];
let STATE = {q:"", type:"all", model:"all", sort:"new"};

function fmtBytes(n){ if(!n) return ""; const u=["B","KB","MB","GB"]; let i=0,x=n; while(x>=1024&&i<3){x/=1024;i++} return x.toFixed(x<10&&i>0?1:0)+u[i]; }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function src(r){ return r.rel ? encodeURI(r.rel) : r.url; }
function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1400); }
function copy(text,label){ navigator.clipboard.writeText(text).then(()=>toast((label||"コピー")+" ✓")).catch(()=>toast("コピー失敗")); }

function thumb(r){
  const s=src(r);
  if(r.type==="image") return `<img loading="lazy" src="${esc(s)}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'icon',textContent:'🖼'}))">`;
  if(r.type==="video") return `<video src="${esc(s)}#t=0.1" muted preload="metadata"></video>`;
  if(r.type==="audio") return `<div class="icon">🎵</div>`;
  return `<div class="icon">📄</div>`;
}

function renderStats(){
  const by=t=>DATA.filter(r=>r.type===t).length;
  const models=new Set(DATA.map(r=>r.model)).size;
  const bytes=DATA.reduce((a,r)=>a+(r.bytes||0),0);
  const days=DATA.map(r=>(r.ts||"").slice(0,10)).filter(Boolean).sort();
  const range=days.length?`${days[0]} → ${days[days.length-1]}`:"-";
  const cards=[["総数",DATA.length],["画像",by("image")],["動画",by("video")],["音声",by("audio")],
    ["モデル",models],["容量",fmtBytes(bytes)||"0"],["期間",range]];
  document.getElementById("stats").innerHTML=cards.map(([s,b])=>`<div class="stat"><b>${esc(b)}</b><span>${esc(s)}</span></div>`).join("");
}

function buildControls(){
  const types=["all","image","video","audio","other"];
  document.getElementById("typechips").innerHTML=types.map(t=>`<span class="chip${t==="all"?" on":""}" data-type="${t}">${t==="all"?"すべて":t}</span>`).join("");
  document.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{
    STATE.type=c.dataset.type;
    document.querySelectorAll(".chip").forEach(x=>x.classList.toggle("on",x===c));
    render();
  });
  const models=["all",...Array.from(new Set(DATA.map(r=>r.model))).sort()];
  document.getElementById("modelsel").innerHTML=models.map(m=>`<option value="${esc(m)}">${m==="all"?"全モデル":esc(m)}</option>`).join("");
  document.getElementById("modelsel").onchange=e=>{STATE.model=e.target.value;render();};
  document.getElementById("sortsel").onchange=e=>{STATE.sort=e.target.value;render();};
  document.getElementById("q").oninput=e=>{STATE.q=e.target.value.toLowerCase();render();};
}

function filtered(){
  let rows=DATA.filter(r=>{
    if(STATE.type!=="all"&&r.type!==STATE.type) return false;
    if(STATE.model!=="all"&&r.model!==STATE.model) return false;
    if(STATE.q){
      const hay=(r.prompt+" "+r.model+" "+r.type+" "+(r.seed??"")+" "+r.request_id+" "+JSON.stringify(r.params)).toLowerCase();
      if(!hay.includes(STATE.q)) return false;
    }
    return true;
  });
  rows.sort((a,b)=> STATE.sort==="new" ? (b.ts||"").localeCompare(a.ts||"") : (a.ts||"").localeCompare(b.ts||""));
  return rows;
}

function render(){
  const rows=filtered();
  const g=document.getElementById("grid");
  if(!rows.length){ g.innerHTML=`<div class="empty-note">該当なし。生成するとここに溜まります。</div>`; return; }
  g.innerHTML=rows.map(r=>{
    const i=DATA.indexOf(r);
    const pr=r.prompt?`<div class="pr">${esc(r.prompt)}</div>`:`<div class="pr empty">(プロンプト未取得)</div>`;
    const sub=[r.seed!=null&&r.seed!==""?`seed ${esc(r.seed)}`:"",r.size?esc(r.size):"",fmtBytes(r.bytes),(r.ts||"").replace("T"," ").slice(5,16)].filter(Boolean);
    return `<div class="card" data-i="${i}">
      <div class="thumb">${thumb(r)}<span class="badge ${r.type}">${r.type}</span>${r.dup?'<span class="dupflag">dup</span>':''}</div>
      <div class="meta"><div class="model" title="${esc(r.tool)}">${esc(r.model)}</div>${pr}
      <div class="sub">${sub.map(s=>`<span>${s}</span>`).join("")}</div></div></div>`;
  }).join("");
  g.querySelectorAll(".card").forEach(c=>c.onclick=()=>openModal(+c.dataset.i));
}

function openModal(i){
  const r=DATA[i], s=src(r);
  let view;
  if(r.type==="image") view=`<img src="${esc(s)}">`;
  else if(r.type==="video") view=`<video src="${esc(s)}" controls autoplay loop></video>`;
  else if(r.type==="audio") view=`<audio src="${esc(s)}" controls style="width:100%"></audio>`;
  else view=`<div class="icon" style="font-size:64px">📄</div>`;
  const reuse=JSON.stringify(Object.assign({_submit_tool:(r.tool||"").replace("_result","_submit"),prompt:r.prompt},r.params),null,2);
  const params=r.params&&Object.keys(r.params).length
    ? `<table class="params">${Object.entries(r.params).map(([k,v])=>`<tr><td>${esc(k)}</td><td>${esc(typeof v==="object"?JSON.stringify(v):v)}</td></tr>`).join("")}</table>`
    : `<div class="sub">パラメータなし</div>`;
  document.getElementById("mbox").innerHTML=`
    <div class="mview">${view}</div>
    <div class="minfo">
      <h2>${esc(r.model)} · ${r.type}</h2>
      <div class="field"><label>Prompt</label><div class="promptbox">${r.prompt?esc(r.prompt):"(未取得)"}</div></div>
      <div class="row">
        <button class="act" data-copy="prompt">📋 プロンプト</button>
        <button class="act" data-copy="params">📋 パラメータ JSON</button>
        <button class="act" data-copy="reuse">♻️ 再生成スニペット</button>
      </div>
      <div class="field"><label>Parameters</label>${params}</div>
      <div class="field"><label>fal URL</label><a class="urlref" href="${esc(r.url)}" target="_blank">${esc(r.url)||"-"}</a>
        <div class="row" style="margin-top:6px">
          <button class="act" data-copy="url">📋 URL</button>
          <button class="act" data-copy="local">📋 ローカルパス</button>
        </div></div>
      <div class="field"><label>Meta</label><code class="mono">${esc(r.ts)} · req ${esc(r.request_id||"-")} · ${fmtBytes(r.bytes)||"?"} · sha ${esc((r.sha256||"").slice(0,12))}</code></div>
    </div>`;
  document.getElementById("mbox").querySelectorAll("[data-copy]").forEach(b=>b.onclick=ev=>{
    ev.stopPropagation();
    const k=b.dataset.copy;
    if(k==="prompt") copy(r.prompt,"プロンプト");
    else if(k==="params") copy(JSON.stringify(r.params,null,2),"パラメータ");
    else if(k==="reuse") copy(reuse,"再生成スニペット");
    else if(k==="url") copy(r.url,"URL");
    else if(k==="local") copy(r.local,"ローカルパス");
  });
  document.getElementById("modal").classList.remove("hidden");
}
document.getElementById("mclose").onclick=()=>document.getElementById("modal").classList.add("hidden");
document.getElementById("modal").onclick=e=>{if(e.target.id==="modal")document.getElementById("modal").classList.add("hidden");};
document.addEventListener("keydown",e=>{if(e.key==="Escape")document.getElementById("modal").classList.add("hidden");});

function init(d){ DATA=d; renderStats(); buildControls(); render(); }

async function _decrypt(pw){
  const ek=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  const k=await crypto.subtle.deriveKey({name:"PBKDF2",salt:_S,iterations:_IT,hash:"SHA-256"},ek,{name:"AES-GCM",length:256},false,["decrypt"]);
