<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>記事レビュー | RYO STUDIO</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--bd:#30363d;--fg:#e6edf3;--mut:#8b949e;--ac:#58a6ff;--ok:#3fb950;--warn:#d29922}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--fg);font-family:-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;font-size:16px;line-height:1.8}
header{position:sticky;top:0;background:rgba(13,17,23,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--bd);padding:10px 14px;display:flex;align-items:center;gap:10px;z-index:5}
header h1{font-size:15px;margin:0;font-weight:600}
#search{flex:1;max-width:220px;background:var(--card);border:1px solid var(--bd);border-radius:8px;color:var(--fg);padding:6px 10px;font-size:14px}
main{max-width:760px;margin:0 auto;padding:12px 14px 80px}
.card{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:13px 14px;margin-bottom:10px;cursor:pointer}
.card:active{border-color:var(--ac)}
.row1{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.badge{font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid var(--bd);color:var(--mut);white-space:nowrap}
.badge.pub{color:#c9a7ff;border-color:#6e40c9}.badge.free{color:var(--ok);border-color:#238636}
.badge.paid{color:var(--warn);border-color:#9e6a03}.badge.guide{color:var(--ac);border-color:#1f6feb}
.price{font-size:12px;color:var(--warn)}
.ttl{font-size:14.5px;font-weight:600;line-height:1.5}
.meta{font-size:11.5px;color:var(--mut);margin-top:5px;display:flex;gap:12px;flex-wrap:wrap}
.clean{color:var(--ok)} .dirty{color:#f85149}
#reader{display:none}
#reader article{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:18px 16px;word-break:break-word}
#reader img{max-width:100%;border-radius:8px}
#reader h1{font-size:20px;line-height:1.5}#reader h2{font-size:17px;border-bottom:1px solid var(--bd);padding-bottom:6px;margin-top:28px}
#reader h3{font-size:15.5px}#reader p{margin:.9em 0}
#reader blockquote{border-left:3px solid var(--ac);margin:1em 0;padding:2px 12px;color:var(--mut)}
#reader pre{background:#0a0d12;border:1px solid var(--bd);border-radius:8px;padding:12px;overflow-x:auto;font-size:12.5px;line-height:1.5}
#reader code{background:#0a0d12;border-radius:4px;padding:1px 5px;font-size:.9em}
#reader pre code{background:none;padding:0}
#reader hr{border:0;border-top:1px solid var(--bd);margin:24px 0}
.toolbar{position:sticky;bottom:0;display:flex;gap:8px;padding:10px 0;background:linear-gradient(transparent,var(--bg) 30%)}
.toolbar button{flex:1;background:var(--card);border:1px solid var(--bd);border-radius:10px;color:var(--fg);padding:11px 6px;font-size:13px;cursor:pointer}
.toolbar button:active{border-color:var(--ac)}
#back{background:none;border:1px solid var(--bd);border-radius:8px;color:var(--mut);padding:5px 12px;font-size:13px;cursor:pointer}
.gatewrap{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:99}
.gatebox{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:28px 24px;width:min(320px,86vw);text-align:center}
.gatebox h2{margin:0 0 16px;font-size:17px}
.gatebox input{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:8px;color:var(--fg);padding:10px;font-size:15px;margin-bottom:10px}
.gatebox button{width:100%;background:#238636;border:0;border-radius:8px;color:#fff;padding:10px;font-size:14px;cursor:pointer}
#pwerr{color:#f85149;font-size:12px;min-height:16px;margin-top:8px}
.ghint{color:var(--mut);font-size:11px;margin-top:10px}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 18px;border-radius:999px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:50}
.section{font-size:12px;color:var(--mut);margin:18px 2px 8px;letter-spacing:.05em}
</style></head><body>
<div class="gatewrap" id="gate"><div class="gatebox"><h2>🔒 記事レビュー</h2><input id="pwin" type="password" placeholder="パスワード" autocomplete="current-password"><button id="pwbtn">開く</button><div id="pwerr"></div><div class="ghint">URLとパスワードを知る人だけが閲覧できます</div></div></div>
<header><h1>📚 記事レビュー</h1><input id="search" placeholder="検索…" style="display:none"></header>
<main><div id="list"></div>
<div id="reader"><article id="artbody"></article>
<div class="toolbar">
<button id="btn-copy">📋 本文コピー</button>
<button id="btn-fix">✍️ 修正依頼</button>
<button id="btn-next">▶ 次の記事</button>
</div></div></main>
<div class="toast" id="toast"></div>
<script>
let DATA=[],cur=-1;
const CATCLS={"公開用":"pub","無料F":"free","有料L":"paid","ガイドG":"guide"};
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.style.opacity=1;setTimeout(()=>t.style.opacity=0,1600);}
async function copy(s,msg){try{await navigator.clipboard.writeText(s);toast(msg);}catch(e){const ta=document.createElement("textarea");ta.value=s;document.body.appendChild(ta);ta.select();document.execCommand("copy");ta.remove();toast(msg);}}
function renderList(q){
  const list=document.getElementById("list");list.innerHTML="";
  let lastCat=null;
  DATA.forEach((r,i)=>{
    if(q && !(r.title+r.id+r.path).toLowerCase().includes(q.toLowerCase()))return;
    if(r.cat!==lastCat){lastCat=r.cat;const s=document.createElement("div");s.className="section";s.textContent="― "+r.cat+" ―";list.appendChild(s);}
    const d=document.createElement("div");d.className="card";
    const smell=r.emdash<=1?'<span class="clean">✓ AI臭チェック済</span>':'<span class="dirty">⚠ em-dash '+r.emdash+'</span>';
    d.innerHTML='<div class="row1"><span class="badge '+(CATCLS[r.cat]||"")+'">'+r.id+'</span>'+(r.price?'<span class="price">¥'+Number(r.price).toLocaleString()+'</span>':'')+'<span class="meta">'+r.updated+'</span></div><div class="ttl">'+r.title+'</div><div class="meta"><span>'+Math.round(r.chars/100)/10+'k字</span>'+smell+'</div>';
    d.onclick=()=>openArt(i);list.appendChild(d);
  });
}
function openArt(i){
  cur=i;const r=DATA[i];
  document.getElementById("list").style.display="none";
  document.getElementById("search").style.display="none";
  const rd=document.getElementById("reader");rd.style.display="block";
  document.getElementById("artbody").innerHTML='<div class="meta" style="margin-bottom:10px">'+r.path+'</div>'+r.html;
  let back=document.getElementById("back");
  if(!back){back=document.createElement("button");back.id="back";back.textContent="← 一覧";back.onclick=closeArt;document.querySelector("header").appendChild(back);}
  window.scrollTo(0,0);history.replaceState(null,"","#"+r.id);
}
function closeArt(){
  document.getElementById("reader").style.display="none";
  document.getElementById("list").style.display="block";
  document.getElementById("search").style.display="";
  const b=document.getElementById("back");if(b)b.remove();
  history.replaceState(null,""," ");
}
document.getElementById("btn-copy").onclick=()=>{if(cur>=0)copy(DATA[cur].md,"本文をコピーしました (noteに貼れます)");};
document.getElementById("btn-fix").onclick=()=>{if(cur<0)return;const r=DATA[cur];
  copy("【記事修正依頼】\nファイル: "+r.path+"\n記事: "+r.title+"\n---\n修正したい点:\n・","修正依頼テンプレをコピー → Claudeに貼って指示");};
document.getElementById("btn-next").onclick=()=>{if(cur<DATA.length-1)openArt(cur+1);else toast("最後の記事です");};
document.getElementById("search").addEventListener("input",e=>renderList(e.target.value));
function init(data){
  DATA=data;renderList("");
  document.getElementById("search").style.display="";
  const h=location.hash.replace("#","");
  if(h){const i=DATA.findIndex(r=>r.id===h);if(i>=0)openArt(i);}
}

const _IT=210000;
async function _decrypt(pw){
  const ek=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  const k=await crypto.subtle.deriveKey({name:"PBKDF2",salt:_S,iterations:_IT,hash:"SHA-256"},ek,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:_I},k,_C);
  return JSON.parse(new TextDecoder().decode(pt));
}
const _LSK="articles_session";
async function _tryOpen(pw,silent){
  try{
    const data=await _decrypt(pw);
    try{localStorage.setItem(_LSK,pw);}catch(e){}
    const g=document.getElementById("gate"); if(g) g.remove();
    init(data); return true;
  }catch(e){
    if(silent){ try{localStorage.removeItem(_LSK);}catch(_){} }
    else{ document.getElementById("pwerr").textContent="パスワードが違います"; }
    return false;
  }
}
(async()=>{
  let saved=null; try{saved=localStorage.getItem(_LSK);}catch(e){}
  if(saved && await _tryOpen(saved,true)) return;
  document.getElementById("pwbtn").onclick=()=>_tryOpen(document.getElementById("pwin").value,false);
  document.getElementById("pwin").addEventListener("keydown",e=>{if(e.key==="Enter")_tryOpen(document.getElementById("pwin").value,false);});
  document.getElementById("pwin").focus();
})();
